<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Classement XP par année d'inscription</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
}

.wrap{
width:1100px;
max-width:calc(100% - 40px);
margin:60px auto;
}

.panel{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.title{
background:#3a3a3a;
color:#fff;
padding:14px 16px;
font-size:20px;
font-weight:900;
}

table{
width:100%;
border-collapse:collapse;
}

thead th{
padding:12px;
border-bottom:1px solid #ccc;
font-weight:900;
}

tbody td{
padding:12px;
border-bottom:1px solid #ccc;
}

tbody tr:nth-child(odd){
background:#f2f2f2;
}

.rank{
font-weight:900;
font-size:18px;
text-align:center;
}

.center{
text-align:center;
}

.move-up{color:#0a7c2f;font-weight:900;}
.move-down{color:#c62828;font-weight:900;}
.move-entry{color:#1565c0;font-weight:900;}
.move-flat{color:#777;font-weight:900;}

.avatar img{
width:38px;
height:38px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="wrap">
<div class="panel">
<div class="title">Classement XP — évolution annuelle</div>
<div id="years"></div>
</div>
</div>

<script>

const CURRENT_URL="data/players_pages.json"
const INDEX_URL="data/history_paris/index.json"

function slug(name){
return name
.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
.replace(/[^a-zA-Z0-9]/g,"")
.toLowerCase()
}

function normalizePlayers(json){

if(Array.isArray(json)) return json

if(json.players) return json.players

return []

}

async function loadJSON(url){

const r=await fetch(url,{cache:"no-store"})
if(!r.ok) throw new Error(url)

return r.json()

}

function sortPlayers(list){

return list.sort((a,b)=>b.xp-a.xp)

}

function playerKey(p){

return slug(p.nom)

}

function movement(now,base){

if(base==null) return {type:"entry",value:"Entrée"}

const diff=base-now

if(diff>0) return {type:"up",value:"+"+diff}

if(diff<0) return {type:"down",value:String(diff)}

return {type:"flat",value:"0"}

}

function movementHTML(m){

if(m.type=="entry") return `<span class="move-entry">Entrée</span>`
if(m.type=="up") return `<span class="move-up">↑ ${m.value}</span>`
if(m.type=="down") return `<span class="move-down">↓ ${m.value}</span>`

return `<span class="move-flat">0</span>`

}

async function loadYearBaseline(year,index){

let dates=index.filter(d=>d.startsWith(year))

dates.sort()

if(!dates.length) return new Map()

let start=dates.find(d=>d.endsWith("01-01"))

if(!start) start=dates[0]

const json=await loadJSON(`data/history_paris/${start}.json`)

const players=sortPlayers(normalizePlayers(json))

const map=new Map()

players.forEach((p,i)=>{

map.set(playerKey(p),i+1)

})

console.log("baseline",year,start)

return map

}

async function render(){

const host=document.getElementById("years")

const players=sortPlayers(normalizePlayers(await loadJSON(CURRENT_URL)))

const index=await loadJSON(INDEX_URL)

const rows=players.map(p=>({

nom:p.nom,
xp:p.xp,
niveau:p.niveau,
rang:p.rank,
avatar:p.avatar,
inscription:p.inscription,
year:p.inscription.split("-")[2],
key:playerKey(p)

}))

const years=[...new Set(rows.map(r=>r.year))]

const baselineByYear={}

for(const y of years){

baselineByYear[y]=await loadYearBaseline(y,index)

}

rows.forEach((r,i)=>{

r.current=i+1

const base=baselineByYear[r.year].get(r.key)

r.move=movement(r.current,base)

})

const byYear={}

rows.forEach(r=>{

if(!byYear[r.year]) byYear[r.year]=[]

byYear[r.year].push(r)

})

let html=""

Object.keys(byYear).sort((a,b)=>b-a).forEach(year=>{

const top=byYear[year].slice(0,10)

html+=`<h2 style="padding:10px">${year}</h2>`

html+=`
<table>
<thead>
<tr>
<th>#</th>
<th></th>
<th>Nom</th>
<th>XP</th>
<th>Niveau</th>
<th>Rang</th>
<th>Évolution</th>
<th>Inscription</th>
</tr>
</thead>
<tbody>
`

top.forEach((p,i)=>{

html+=`
<tr>
<td class="rank">${i+1}</td>
<td class="avatar"><img src="${p.avatar}"></td>
<td>${p.nom}</td>
<td class="center">${p.xp.toLocaleString("fr-FR")}</td>
<td class="center">${p.niveau}</td>
<td class="center">${p.rang}</td>
<td class="center">${movementHTML(p.move)}</td>
<td class="center">${p.inscription}</td>
</tr>
`

})

html+=`</tbody></table>`

})

host.innerHTML=html

}

render()

</script>

</body>
</html>
