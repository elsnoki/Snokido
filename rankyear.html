<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Classement XP par année d'inscription</title>

<link rel="stylesheet" href="style.css" />
<script src="header.js" defer></script>
<script src="xp_widget.js" defer></script>

<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
  }

  .wrap{
    width:1100px;
    max-width: calc(100% - 40px);
    margin:60px auto;
  }

  .panel{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,.35);
    margin-bottom:16px;
  }

  .title{
    background:#3a3a3a;
    color:#fff;
    padding:14px 16px;
    font-size:20px;
    font-weight:900;
  }

  .hint{
    background:#ffffff;
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:14px;
    box-shadow: 0 10px 25px rgba(0,0,0,.20);
    border:1px solid rgba(0,0,0,.10);
    color:#222;
    font-weight:900;
  }
  .hint small{ display:block; margin-top:4px; font-weight:900; color:#666; }

  .yearBox{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,.22);
    border:1px solid rgba(0,0,0,.10);
    margin-bottom:14px;
  }

  .yearHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 16px;
    background:#f6f6f6;
    border-bottom:1px solid #e2e2e2;
    cursor:pointer;
    user-select:none;
    font-weight:900;
    color:#222;
  }

  .yearMeta{
    font-weight:900;
    color:#666;
    font-size:12px;
    margin-left:10px;
  }

  .caret{
    font-weight:900;
    color:#333;
    margin-left:10px;
  }

  .yearBody{ display:none; }
  .yearBox.open .yearBody{ display:block; }

  table{ width:100%; border-collapse:separate; border-spacing:0; }
  thead th{
    background:#fff;
    padding:12px 10px;
    text-align:left;
    font-size:13px;
    font-weight:900;
    border-bottom:1px solid #cfcfcf;
  }
  tbody td{
    padding:14px 10px;
    border-bottom:1px solid #cfcfcf;
    vertical-align:middle;
    font-size:14px;
  }
  tbody tr:nth-child(odd){ background:#f2f2f2; }

  .rank{ font-weight:900; font-size:18px; width:60px; text-align:center; color:#444; }
  .avatar{ width:70px; text-align:center; }
  .avatar .frame{
    width:44px; height:44px; margin:0 auto;
    background:#e9e9e9; border:1px solid #bdbdbd; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
  }
  .avatar img{
    width:38px; height:38px; object-fit:cover;
    border:2px solid #8f8f8f; border-radius:10px; background:#ddd; display:block;
  }

  .name a{ color:#2c6fb7; font-weight:900; text-decoration:none; }
  .name a:hover{ text-decoration:underline; }

  .center{ text-align:center; white-space:nowrap; }

  .modeBadge{
    display:inline-block;
    padding:4px 8px;
    border-radius:999px;
    font-weight:900;
    font-size:12px;
    background:#efefef;
    border:1px solid rgba(0,0,0,.10);
    color:#333;
  }

  .errorBox{
    padding:14px 16px;
    font-weight:900;
    color:#b00020;
  }
</style>
</head>

<body>
<div class="wrap">

  <div class="hint">
    Classement XP par <b>année d'inscription</b> (Top 10 max par année).
    <small>Données chargées depuis <code>data/players_pages.json</code>. Tri : XP décroissante (meilleure XP du joueur).</small>
  </div>

  <div class="panel">
    <div class="title">Classement XP — par année d'inscription</div>
    <div id="years" style="padding:14px;"></div>
  </div>

</div>

<script>
  const DATA_URL = "data/players_pages.json"; // ✅ ton dossier data

  function slugify2(name){
    return String(name || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  function extractYear(inscription){
    if(!inscription) return null;
    const s = String(inscription).trim();

    // format "DD-MM-YYYY"
    const parts = s.split("-");
    if(parts.length === 3){
      const y = Number(parts[2]);
      return Number.isFinite(y) ? y : null;
    }

    // fallback regex
    const m = s.match(/(19\d{2}|20\d{2}|2100)/);
    return m ? Number(m[1]) : null;
  }

  function fmtInt(n){
    if(n == null) return "—";
    try { return new Intl.NumberFormat("fr-FR").format(n); }
    catch(e){ return String(n); }
  }

  // XP max parmi tous les modes
  function bestXPAndMode(player){
    const modes = player?.modes && typeof player.modes === "object" ? player.modes : null;
    if(!modes) return { xp:null, mode:null, rang:null };

    let best = { xp: null, mode: null, rang: null };
    for(const modeKey of Object.keys(modes)){
      const m = modes[modeKey];
      const xp = (m && typeof m.xp === "number") ? m.xp : null;
      if(xp == null) continue;

      if(best.xp == null || xp > best.xp){
        best.xp = xp;
        best.mode = modeKey;
        best.rang = m.rang ?? null; // ex "1/23" ou "200/2500"
      }
    }
    return best;
  }

  // Supporte beaucoup de formats possibles:
  // - [players]
  // - {players:[...]}
  // - {pages:[[...],[...]]}
  // - {pages:[{players:[...]}, ...]}
  // - {"page1":[...], "page2":[...]}
  function normalizePlayers(json){
    if(Array.isArray(json)) return json;

    if(json && Array.isArray(json.players)) return json.players;

    if(json && Array.isArray(json.pages)){
      const out = [];
      for(const p of json.pages){
        if(Array.isArray(p)) out.push(...p);
        else if(p && Array.isArray(p.players)) out.push(...p.players);
        else if(p && Array.isArray(p.joueurs)) out.push(...p.joueurs);
      }
      return out;
    }

    if(json && typeof json === "object"){
      const out = [];
      for(const k of Object.keys(json)){
        if(Array.isArray(json[k])) out.push(...json[k]);
      }
      if(out.length) return out;
    }

    return [];
  }

  async function loadAllPlayers(){
    const res = await fetch(DATA_URL, { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    const list = normalizePlayers(json);
    if(!list.length) throw new Error("Format JSON non reconnu ou liste vide");
    return list;
  }

  function renderByYear(players){
    const host = document.getElementById("years");

    const rows = players.map(p => {
      const year = extractYear(p.inscription);
      const best = bestXPAndMode(p);
      return {
        p,
        year,
        xp: best.xp,
        bestMode: best.mode,
        rang: best.rang,
        niveau: (typeof p.gen === "number") ? p.gen : null,
        inscription: p.inscription ?? "—"
      };
    }).filter(r => r.year != null);

    const byYear = new Map();
    for(const r of rows){
      if(!byYear.has(r.year)) byYear.set(r.year, []);
      byYear.get(r.year).push(r);
    }

    const years = Array.from(byYear.keys()).sort((a,b) => b - a);

    if(!years.length){
      host.innerHTML = `<div class="errorBox">Aucune année d'inscription exploitable.</div>`;
      return;
    }

    host.innerHTML = "";

    years.forEach((year, idx) => {
      const list = byYear.get(year) || [];

      // tri XP décroissant (null à la fin)
      list.sort((a,b) => {
        const ax = (a.xp == null) ? -Infinity : a.xp;
        const bx = (b.xp == null) ? -Infinity : b.xp;
        if(bx !== ax) return bx - ax;
        return String(a.p.nom || "").localeCompare(String(b.p.nom || ""), "fr", { sensitivity:"base" });
      });

      const top = list.slice(0, 10);

      const box = document.createElement("div");
      box.className = "yearBox" + (idx === 0 ? " open" : "");

      const head = document.createElement("div");
      head.className = "yearHead";
      head.innerHTML = `
        <div>
          Année ${year}
          <span class="yearMeta">(Top ${Math.min(10, list.length)} / ${list.length})</span>
        </div>
        <div class="caret">${idx === 0 ? "▾" : "▸"}</div>
      `;

      const body = document.createElement("div");
      body.className = "yearBody";
      body.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width:60px;"></th>
              <th style="width:70px;"></th>
              <th>Nom du joueur</th>
              <th class="center">XP</th>
              <th class="center">Meilleur mode</th>
              <th class="center">Niveau</th>
              <th class="center">Rang (Top 2500)</th>
              <th class="center">Inscription</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      `;

      const tbody = body.querySelector("tbody");

      for(let i=0;i<top.length;i++){
        const r = top[i];
        const p = r.p;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="rank">${i+1}</td>
          <td class="avatar">
            <div class="frame">
              <img src="${p.avatar || "avatar/1.jpg"}" alt="${p.nom || ""}">
            </div>
          </td>
          <td class="name">
            <a href="profil.html?mode=nv100&u=${encodeURIComponent(slugify2(p.nom))}">
              ${p.nom ?? "—"}
            </a>
          </td>
          <td class="center">${fmtInt(r.xp)}</td>
          <td class="center">${r.bestMode ? `<span class="modeBadge">${r.bestMode}</span>` : "—"}</td>
          <td class="center">${r.niveau == null ? "—" : fmtInt(r.niveau)}</td>
          <td class="center">${r.rang ?? "—"}</td>
          <td class="center">${r.inscription}</td>
        `;
        tbody.appendChild(tr);
      }

      head.addEventListener("click", () => {
        const isOpen = box.classList.toggle("open");
        head.querySelector(".caret").textContent = isOpen ? "▾" : "▸";
      });

      box.appendChild(head);
      box.appendChild(body);
      host.appendChild(box);
    });

    const tab = document.querySelector(".tab-year");
    if(tab) tab.classList.add("is-active");
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const host = document.getElementById("years");
    host.innerHTML = `<div style="padding:12px 2px;font-weight:900;color:#444;">Chargement des joueurs...</div>`;

    try{
      const players = await loadAllPlayers();
      renderByYear(players);
    }catch(e){
      host.innerHTML = `
        <div class="errorBox">
          Impossible de charger <code>${DATA_URL}</code> : ${String(e.message || e)}<br>
          <span style="color:#444;font-weight:900;">
            Vérifie le chemin et que GitHub Pages sert bien le JSON (et qu'il s'appelle exactement pareil).
          </span>
        </div>
      `;
      console.error(e);
    }
  });
</script>

</body>
</html>
