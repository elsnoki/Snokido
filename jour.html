<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement Jour — XP gagnée</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>

  <style>
    body{ margin:0; font-family:Arial,sans-serif; background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%); }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{ background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.10); }
    .titlebar{ background:#3b3b3b; color:#fff; padding:14px 16px; font-size:22px; font-weight:900; }
    .sub{ padding:10px 16px; font-weight:900; color:#444; border-bottom:1px solid #e6e6e6; background:#fafafa; }
    .warn{ margin:12px 16px 0; padding:10px 12px; background:#fff3cd; border:1px solid #ffe69c; border-radius:10px; font-weight:900; color:#664d03; display:none; white-space:pre-wrap; }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{ background:#fff; padding:14px 12px; text-align:left; font-size:15px; font-weight:900; border-bottom:1px solid #cfcfcf; }
    tbody td{ padding:18px 12px; border-bottom:1px solid #cfcfcf; vertical-align:middle; font-size:16px; }
    tbody tr:nth-child(odd){ background:#f2f2f2; }

    .rank{ width:70px; text-align:center; font-weight:900; font-size:26px; color:#444; }
    .avatarCell{ width:110px; text-align:center; }
    .frame{ width:64px; height:64px; margin:0 auto; background:#e9e9e9; border:1px solid #bdbdbd; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .frame img{ width:56px; height:56px; object-fit:cover; border:2px solid #8f8f8f; border-radius:10px; background:#ddd; display:block; }

    .name a{ color:#2c6fb7; font-weight:900; text-decoration:none; font-size:18px; }
    .center{ text-align:center; white-space:nowrap; font-weight:900; }
    .small{ font-weight:700; font-size:13px; color:#666; }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="titlebar">Classement Jour — XP gagnée</div>
      <div class="sub" id="rangeTxt">Chargement…</div>
      <div id="warn" class="warn"></div>

      <table>
        <thead>
          <tr>
            <th></th>
            <th></th>
            <th>Joueur</th>
            <th class="center">Δ XP (jour)</th>
            <th class="center">XP actuel</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

<script>
  function warn(msg){
    const w = document.getElementById("warn");
    w.style.display = "block";
    w.textContent = msg;
  }

  function slugify(name){
    return String(name || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  function profileIdFromHref(href){
    if(!href) return null;
    try{
      const u = new URL(href, location.origin);
      const m = u.pathname.match(/\/player\/([^\/?#]+)/i);
      return m ? m[1].toLowerCase() : null;
    }catch{
      const m = String(href).match(/\/player\/([^\/?#]+)/i);
      return m ? m[1].toLowerCase() : null;
    }
  }

  function playerKey(p){
    const id = profileIdFromHref(p && p.profileHref);
    if(id) return "id:" + id;
    return "name:" + slugify(p && p.nom);
  }

  function repoBasePrefix(){
    // GitHub Pages "project": /<repo>/...
    // GitHub Pages "user/org": /...
    // On tente de déduire /<repo> si présent.
    const parts = location.pathname.split("/").filter(Boolean);
    if(parts.length >= 2 && parts[0] !== "data"){
      return "/" + parts[0];
    }
    return "";
  }

  function buildCandidates(relPath){
    const repo = repoBasePrefix();
    const p = relPath.replace(/^\/+/, ""); // enlever leading /
    const out = [
      relPath,            // "data/..."
      "./" + p,           // "./data/..."
      "/" + p,            // "/data/..."
    ];
    if(repo){
      out.push(repo + "/" + p); // "/repo/data/..."
    }
    // dédoublonnage
    return Array.from(new Set(out));
  }

  async function fetchJsonAny(relPath){
    const candidates = buildCandidates(relPath);
    const tries = [];

    for(const c of candidates){
      const url = c + (c.includes("?") ? "&" : "?") + "t=" + Date.now();
      try{
        const res = await fetch(url, { cache: "no-store" });
        tries.push(`${res.status} ${c}`);
        if(!res.ok) continue;
        const data = await res.json().catch(() => null);
        if(data != null) return { data, okFrom: c, tries };
      }catch(e){
        tries.push(`ERR ${c}`);
      }
    }
    return { data: null, okFrom: null, tries };
  }

  async function loadCurrentPlayers(){
    // ✅ on cherche players_pages en premier (50 pages)
    const bigA = await fetchJsonAny("data/players_pages.json");
    if(Array.isArray(bigA.data) && bigA.data.length >= 200) return { players: bigA.data, dbg: bigA };

    const bigB = await fetchJsonAny("data/period/players_pages.json");
    if(Array.isArray(bigB.data) && bigB.data.length >= 200) return { players: bigB.data, dbg: bigB };

    // fallback top50
    const topA = await fetchJsonAny("data/snokido_top50.json");
    if(Array.isArray(topA.data)) return { players: topA.data, dbg: topA, limitedTop50: true, bigTries: [...bigA.tries, ...bigB.tries] };

    const topB = await fetchJsonAny("data/period/snokido_top50.json");
    if(Array.isArray(topB.data)) return { players: topB.data, dbg: topB, limitedTop50: true, bigTries: [...bigA.tries, ...bigB.tries] };

    return { players: null, dbg: { bigTries: [...bigA.tries, ...bigB.tries], topTries: [...topA.tries, ...topB.tries] } };
  }

  async function loadIndex(){
    const a = await fetchJsonAny("data/history_paris/index.json");
    if(Array.isArray(a.data)) return { index: a.data, dbg: a };

    const b = await fetchJsonAny("data/period/history_paris/index.json");
    if(Array.isArray(b.data)) return { index: b.data, dbg: b };

    return { index: null, dbg: { tries: [...a.tries, ...b.tries] } };
  }

  async function loadSnapPlayers(day){
    const a = await fetchJsonAny("data/history_paris/" + day + ".json");
    if(a.data){
      if(Array.isArray(a.data)) return { players: a.data, dbg: a };
      if(Array.isArray(a.data.players)) return { players: a.data.players, dbg: a };
    }

    const b = await fetchJsonAny("data/period/history_paris/" + day + ".json");
    if(b.data){
      if(Array.isArray(b.data)) return { players: b.data, dbg: b };
      if(Array.isArray(b.data.players)) return { players: b.data.players, dbg: b };
    }

    return { players: null, dbg: { tries: [...a.tries, ...b.tries] } };
  }

  function formatSigned(n){
    const v = Number(n || 0);
    return (v >= 0 ? "+" : "") + v.toLocaleString("fr-FR");
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const tbody = document.getElementById("tbody");
    const rangeTxt = document.getElementById("rangeTxt");

    const cur = await loadCurrentPlayers();
    if(!cur.players){
      warn(
        "Impossible de charger players_pages.json ni snokido_top50.json.\n\n" +
        "Essais players_pages:\n" + (cur.dbg.bigTries || []).join("\n") + "\n\n" +
        "Essais top50:\n" + (cur.dbg.topTries || []).join("\n")
      );
      return;
    }

    if(cur.limitedTop50){
      warn(
        "players_pages.json introuvable → résultat limité au Top50.\n\n" +
        "Essais players_pages:\n" + (cur.bigTries || []).join("\n")
      );
    }

    const idx = await loadIndex();
    if(!idx.index){
      warn("history_paris/index.json introuvable.\n\nEssais:\n" + (idx.dbg.tries || []).join("\n"));
      return;
    }

    const index = idx.index
      .filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d))
      .filter(d => d !== "YYYY-MM-DD")
      .sort();

    if(index.length < 1){
      warn("history_paris/index.json est vide après filtrage.");
      return;
    }

    const latestDay = index[index.length - 1];
    const baseDay = latestDay;

    // ✅ EXACT comme tu veux
    rangeTxt.textContent = "Période : " + baseDay + " → live (MAJ à chaque workflow)";

    const snap = await loadSnapPlayers(baseDay);
    if(!snap.players){
      warn("Snapshot du jour introuvable : " + baseDay + "\n\nEssais:\n" + (snap.dbg.tries || []).join("\n"));
      return;
    }

    const baseline = snap.players;
    const current = cur.players;

    const baseMap = new Map();
    for(const p of baseline){
      baseMap.set(playerKey(p), Number(p.xp || 0));
    }

    let rows = [];
    for(const p of current){
      const key = playerKey(p);
      const bXp = baseMap.get(key);
      if(bXp == null) continue;

      const curXp = Number(p.xp || 0);
      const dx = curXp - bXp;

      rows.push({ nom: p.nom, avatar: p.avatar, xp: curXp, dx });
    }

    rows = rows.filter(r => Number(r.dx) !== 0);
    rows.sort((a,b)=> b.dx - a.dx);

    tbody.innerHTML = "";
    const shown = rows.slice(0, 300);

    for(let i=0;i<shown.length;i++){
      const r = shown[i];
      const tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="rank">' + (i+1) + '</td>' +
        '<td class="avatarCell"><div class="frame"><img src="' + (r.avatar || "avatar/1.jpg") + '" alt="' + r.nom + '"></div></td>' +
        '<td class="name"><a href="profil.html?mode=nv100&u=' + encodeURIComponent(slugify(r.nom)) + '">' + r.nom + '</a>' +
        '<div class="small">' + r.xp.toLocaleString("fr-FR") + ' XP</div></td>' +
        '<td class="center">' + formatSigned(r.dx) + '</td>' +
        '<td class="center">' + r.xp.toLocaleString("fr-FR") + '</td>';
      tbody.appendChild(tr);
    }

    if(shown.length === 0){
      tbody.innerHTML =
        '<tr><td colspan="5" style="padding:16px;font-weight:900;color:#666;">Personne n’a gagné d’XP sur la période.</td></tr>';
    }
  });
</script>
</body>
</html>
