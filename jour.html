<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement Jour — XP gagnée</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>

  <style>
    body{ margin:0; font-family:Arial,sans-serif; background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%); }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{ background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.10); }
    .titlebar{ background:#3b3b3b; color:#fff; padding:14px 16px; font-size:22px; font-weight:900; }
    .sub{ padding:10px 16px; font-weight:900; color:#444; border-bottom:1px solid #e6e6e6; background:#fafafa; }
    .warn{ margin:12px 16px 0; padding:10px 12px; background:#fff3cd; border:1px solid #ffe69c; border-radius:10px; font-weight:900; color:#664d03; display:none; white-space:pre-wrap; }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{ background:#fff; padding:14px 12px; text-align:left; font-size:15px; font-weight:900; border-bottom:1px solid #cfcfcf; }
    tbody td{ padding:18px 12px; border-bottom:1px solid #cfcfcf; vertical-align:middle; font-size:16px; }
    tbody tr:nth-child(odd){ background:#f2f2f2; }

    .rank{ width:70px; text-align:center; font-weight:900; font-size:26px; color:#444; }
    .avatarCell{ width:110px; text-align:center; }
    .frame{ width:64px; height:64px; margin:0 auto; background:#e9e9e9; border:1px solid #bdbdbd; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .frame img{ width:56px; height:56px; object-fit:cover; border:2px solid #8f8f8f; border-radius:10px; background:#ddd; display:block; }

    .name a{ color:#2c6fb7; font-weight:900; text-decoration:none; font-size:18px; }
    .center{ text-align:center; white-space:nowrap; font-weight:900; }
    .small{ font-weight:700; font-size:13px; color:#666; }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="titlebar">Classement Jour — XP gagnée</div>
      <div class="sub" id="rangeTxt">Chargement…</div>
      <div id="warn" class="warn"></div>

      <table>
        <thead>
          <tr>
            <th></th>
            <th></th>
            <th>Joueur</th>
            <th class="center">Δ XP (jour)</th>
            <th class="center">XP actuel</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

<script>
  function warn(msg){
    const w = document.getElementById("warn");
    w.style.display = "block";
    w.textContent = msg;
  }

  function slugify(name){
    return String(name || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  function profileIdFromHref(href){
    if(!href) return null;
    try{
      const u = new URL(href, location.origin);
      const m = u.pathname.match(/\/player\/([^\/?#]+)/i);
      return m ? m[1].toLowerCase() : null;
    }catch{
      const m = String(href).match(/\/player\/([^\/?#]+)/i);
      return m ? m[1].toLowerCase() : null;
    }
  }

  function playerKey(p){
    const id = profileIdFromHref(p && p.profileHref);
    if(id) return "id:" + id;
    return "name:" + slugify(p && p.nom);
  }

  // ---- fetch robuste: lit en texte, JSON.parse, détecte HTML ----
  async function fetchJsonRobust(relPath){
    const url = relPath + (relPath.includes("?") ? "&" : "?") + "t=" + Date.now();
    try{
      const res = await fetch(url, { cache: "no-store" });
      const ctype = (res.headers.get("content-type") || "").toLowerCase();
      const text = await res.text();

      // tentative JSON parse
      let data = null;
      let parseErr = null;
      try{
        data = JSON.parse(text);
      }catch(e){
        parseErr = e;
      }

      // si c'est du HTML, on le détecte
      const looksHtml = /^\s*</.test(text);

      return {
        url: relPath,
        status: res.status,
        ok: res.ok,
        ctype,
        parseOk: data !== null && parseErr === null,
        looksHtml,
        sample: text.slice(0, 120),
        data
      };
    }catch(e){
      return { url: relPath, status: 0, ok: false, ctype: "", parseOk: false, looksHtml: false, sample: String(e), data: null };
    }
  }

  // accepte: [...] OU {players:[...]} OU {rows:[...]}
  function extractArray(maybe){
    if(Array.isArray(maybe)) return maybe;
    if(maybe && Array.isArray(maybe.players)) return maybe.players;
    if(maybe && Array.isArray(maybe.rows)) return maybe.rows;
    return null;
  }

  async function loadBigPlayers(){
    // Chez toi, ça répond 200 sur data/players_pages.json, donc on commence par là.
    const r = await fetchJsonRobust("data/players_pages.json");
    const arr = extractArray(r.data);
    if(r.ok && r.parseOk && Array.isArray(arr) && arr.length >= 200){
      return { players: arr, dbg: r };
    }

    // fallback projet GH pages (si besoin)
    const r2 = await fetchJsonRobust("/Snokido/data/players_pages.json");
    const arr2 = extractArray(r2.data);
    if(r2.ok && r2.parseOk && Array.isArray(arr2) && arr2.length >= 200){
      return { players: arr2, dbg: r2 };
    }

    return { players: null, dbg: [r, r2] };
  }

  async function loadTop50(){
    const r = await fetchJsonRobust("data/snokido_top50.json");
    const arr = extractArray(r.data);
    if(r.ok && r.parseOk && Array.isArray(arr) && arr.length){
      return { players: arr, dbg: r };
    }
    const r2 = await fetchJsonRobust("/Snokido/data/snokido_top50.json");
    const arr2 = extractArray(r2.data);
    if(r2.ok && r2.parseOk && Array.isArray(arr2) && arr2.length){
      return { players: arr2, dbg: r2 };
    }
    return { players: null, dbg: [r, r2] };
  }

  async function loadIndex(){
    const r = await fetchJsonRobust("data/history_paris/index.json");
    const arr = extractArray(r.data) || (Array.isArray(r.data) ? r.data : null);
    if(r.ok && r.parseOk && Array.isArray(arr)) return { index: arr, dbg: r };

    const r2 = await fetchJsonRobust("/Snokido/data/history_paris/index.json");
    const arr2 = extractArray(r2.data) || (Array.isArray(r2.data) ? r2.data : null);
    if(r2.ok && r2.parseOk && Array.isArray(arr2)) return { index: arr2, dbg: r2 };

    return { index: null, dbg: [r, r2] };
  }

  async function loadSnapPlayers(day){
    const r = await fetchJsonRobust("data/history_paris/" + day + ".json");
    const arr = extractArray(r.data) || (Array.isArray(r.data) ? r.data : null);
    if(r.ok && r.parseOk && Array.isArray(arr)) return { players: arr, dbg: r };

    const r2 = await fetchJsonRobust("/Snokido/data/history_paris/" + day + ".json");
    const arr2 = extractArray(r2.data) || (Array.isArray(r2.data) ? r2.data : null);
    if(r2.ok && r2.parseOk && Array.isArray(arr2)) return { players: arr2, dbg: r2 };

    return { players: null, dbg: [r, r2] };
  }

  function formatSigned(n){
    const v = Number(n || 0);
    return (v >= 0 ? "+" : "") + v.toLocaleString("fr-FR");
  }

  function debugLine(r){
    const c = r.ctype ? ` (${r.ctype})` : "";
    const p = r.parseOk ? "JSON_OK" : "JSON_KO";
    const h = r.looksHtml ? " HTML?" : "";
    return `${r.status} ${r.url}${c} → ${p}${h} | sample: ${r.sample.replace(/\s+/g," ").slice(0,80)}`;
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const tbody = document.getElementById("tbody");
    const rangeTxt = document.getElementById("rangeTxt");

    // 1) joueurs actuels : BIG sinon top50
    const big = await loadBigPlayers();
    let current = big.players;
    let limited = false;

    if(!current){
      const top = await loadTop50();
      current = top.players;
      limited = true;

      if(!current){
        const dbg = [].concat(big.dbg || [], top.dbg || []);
        warn(
          "Impossible de charger players_pages.json ni snokido_top50.json.\n\n" +
          dbg.map(debugLine).join("\n")
        );
        return;
      }

      warn(
        "players_pages.json non utilisable → résultat limité au Top50.\n\n" +
        (big.dbg || []).map(debugLine).join("\n")
      );
    }

    // 2) index history
    const idx = await loadIndex();
    if(!idx.index){
      const dbg = idx.dbg || [];
      warn("history_paris/index.json introuvable ou non-JSON.\n\n" + dbg.map(debugLine).join("\n"));
      return;
    }

    const index = idx.index
      .filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d))
      .filter(d => d !== "YYYY-MM-DD")
      .sort();

    if(index.length < 1){
      warn("history_paris/index.json est vide après filtrage.");
      return;
    }

    const latestDay = index[index.length - 1];
    const baseDay = latestDay;

    // ✅ EXACT comme tu veux
    rangeTxt.textContent = "Période : " + baseDay + " → live (MAJ à chaque workflow)";

    // 3) baseline snapshot
    const snap = await loadSnapPlayers(baseDay);
    if(!snap.players){
      const dbg = snap.dbg || [];
      warn("Snapshot introuvable/non-JSON : " + baseDay + "\n\n" + dbg.map(debugLine).join("\n"));
      return;
    }

    const baseline = snap.players;

    const baseMap = new Map();
    for(const p of baseline){
      baseMap.set(playerKey(p), Number(p.xp || 0));
    }

    let rows = [];
    for(const p of current){
      const key = playerKey(p);
      const bXp = baseMap.get(key);
      if(bXp == null) continue;

      const curXp = Number(p.xp || 0);
      const dx = curXp - bXp;

      rows.push({ nom: p.nom, avatar: p.avatar, xp: curXp, dx });
    }

    rows = rows.filter(r => Number(r.dx) !== 0);
    rows.sort((a,b)=> b.dx - a.dx);

    tbody.innerHTML = "";
    const shown = rows.slice(0, 300);

    for(let i=0;i<shown.length;i++){
      const r = shown[i];
      const tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="rank">' + (i+1) + '</td>' +
        '<td class="avatarCell"><div class="frame"><img src="' + (r.avatar || "avatar/1.jpg") + '" alt="' + r.nom + '"></div></td>' +
        '<td class="name"><a href="profil.html?mode=nv100&u=' + encodeURIComponent(slugify(r.nom)) + '">' + r.nom + '</a>' +
        '<div class="small">' + r.xp.toLocaleString("fr-FR") + ' XP</div></td>' +
        '<td class="center">' + formatSigned(r.dx) + '</td>' +
        '<td class="center">' + r.xp.toLocaleString("fr-FR") + '</td>';
      tbody.appendChild(tr);
    }

    if(shown.length === 0){
      tbody.innerHTML =
        '<tr><td colspan="5" style="padding:16px;font-weight:900;color:#666;">Personne n’a gagné d’XP sur la période.</td></tr>';
    }
  });
</script>
</body>
</html>
