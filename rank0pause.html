<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NV100 sans pause</title>

<link rel="stylesheet" href="style.css">

<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
  }

  .box{
    width: 1000px;
    max-width: calc(100% - 40px);
    margin: 60px auto;
    background:#ffffff;
    border-radius:8px;
    overflow:hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,.35);
  }

  .title{
    background:#3a3a3a;
    color:white;
    padding:14px 16px;
    font-size:20px;
    font-weight:700;
  }

  table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
  }

  thead th{
    background:#ffffff;
    padding:12px 10px;
    text-align:left;
    font-size:13px;
    font-weight:700;
    border-bottom:1px solid #cfcfcf;
  }

  tbody td{
    padding:16px 10px;
    border-bottom:1px solid #cfcfcf;
    vertical-align:middle;
    font-size:14px;
  }

  tbody tr:nth-child(odd){ background:#f2f2f2; }
  tbody tr:nth-child(even){ background:#ffffff; }

  .rank{
    font-weight:700;
    font-size:22px;
    width:60px;
    text-align:center;
    color:#444;
  }

  .avatar{
    width:90px;
    text-align:center;
  }

  .avatar .frame{
    width:64px;
    height:64px;
    margin:0 auto;
    background:#e9e9e9;
    border:1px solid #bdbdbd;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .avatar img{
    width:56px;
    height:56px;
    object-fit:cover;
    border:2px solid #8f8f8f;
    border-radius:6px;
    background:#ddd;
    display:block;
  }

  .name{
    width:260px;
  }

  .name a{
    color:#2c6fb7;
    font-weight:700;
    text-decoration:none;
  }

  .name a:hover{ text-decoration:underline; }

  .center{
    text-align:center;
    white-space:nowrap;
  }
</style>
</head>

<body>

<div class="box">
  <div class="title">NV100 théorique — sans pause</div>

  <table id="leaderboard">
    <thead>
      <tr>
        <th></th>
        <th></th>
        <th>Nom du joueur</th>
        <th class="center">Niveau 100 théorique</th>
        <th class="center">Date d'inscription</th>
        <th class="center">Date d'arrivée</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  function slugify(name){
    return name.normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  // ⚠️ Mets ici TES valeurs "sans pause"
  // Si tu n’as pas encore les jours théoriques, tu peux les mettre temporairement = jours réel
  let joueurs = [
    {nom:"Ko0pa", jours:23,  insc:"24-01-2026", arrivee:"16-02-2026", avatar:"avatar/17.jpg"},
    {nom:"TheGladiator", jours:54,  insc:"23-05-2020", arrivee:"16-07-2020", avatar:"avatar/4.jpg"},
    {nom:"redbot", jours:55,  insc:"07-08-2022", arrivee:"01-10-2022", avatar:"avatar/20.jpg"},
    {nom:"cirpacha", jours:94,  insc:"03-02-2020", arrivee:"07-05-2020", avatar:"avatar/11.jpg"},
    {nom:"LargoJunior", jours:100, insc:"10-02-2026", arrivee:"20-05-2026", avatar:"avatar/35.jpg"},
    {nom:"Tellor", jours:170, insc:"10-04-2020", arrivee:"17-09-2020", avatar:"avatar/18.jpg"},
    {nom:"Abelard", jours:325, insc:"27-02-2016", arrivee:"17-01-2017", avatar:"avatar/5.jpg"},
    {nom:"Jordan.io", jours:387, insc:"16-03-2019", arrivee:"06-04-2020", avatar:"avatar/6.jpg"},
    {nom:"Alexis279", jours:522, insc:"07-10-2018", arrivee:"12-03-2020", avatar:"avatar/9.jpg"},
    {nom:"Largo672", jours:610, insc:"10-02-2014", arrivee:"10-10-2015", avatar:"avatar/15.jpg"},
    {nom:"Unit", jours:636, insc:"13-07-2018", arrivee:"09-04-2020", avatar:"avatar/14.jpg"},
    {nom:"alex.c2109", jours:645, insc:"24-06-2017", arrivee:"31-03-2019", avatar:"avatar/2.jpg"},
    {nom:"djabrail", jours:693, insc:"07-08-2014", arrivee:"30-06-2016", avatar:"avatar/16.jpg"},
    {nom:"Esdras950", jours:727, insc:"01-05-2018", arrivee:"27-04-2020", avatar:"avatar/12.jpg"},
    {nom:"josué455", jours:778, insc:"15-08-2014", arrivee:"01-10-2016", avatar:"avatar/8.jpg"},
    {nom:"Golder", jours:980, insc:"24-07-2017", arrivee:"30-03-2020", avatar:"avatar/13.jpg"},
    {nom:"Talk Takashi", jours:1013, insc:"13-04-2014", arrivee:"20-01-2017", avatar:"avatar/1.jpg"},
    {nom:"francoeur", jours:1203, insc:"18-12-2015", arrivee:"04-04-2019", avatar:"avatar/3.jpg"},
    {nom:"lumia", jours:1226, insc:"01-01-2019", arrivee:"15-05-2022", avatar:"avatar/10.jpg"},
    {nom:"hoopa", jours:1277, insc:"19-11-2015", arrivee:"19-05-2019", avatar:"avatar/7.jpg"},
    {nom:"dude", jours:1866, insc:"22-03-2013", arrivee:"~Mai 2018", avatar:"avatar/37.jpg"},
    {nom:"Pingu", jours:1953, insc:"12-05-2019", arrivee:"15-09-2024", avatar:"avatar/19.jpg"},
    {nom:"Korben", jours:1958, insc:"22-03-2013", arrivee:"~Août 2018", avatar:"avatar/38.jpg"}
  ];

  joueurs.sort((a,b)=>a.jours-b.jours);

  const tbody = document.querySelector("#leaderboard tbody");

  joueurs.forEach((j,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="rank">${i+1}</td>
      <td class="avatar">
        <div class="frame"><img src="${j.avatar}" alt="${j.nom}"></div>
      </td>
      <td class="name">
  <span>${j.nom}</span>
</td>
      <td class="center">${j.jours} jours</td>
      <td class="center">${j.insc}</td>
      <td class="center">${j.arrivee ?? ""}</td>
    `;
    tbody.appendChild(tr);
  });
</script>

<script src="header.js"></script>
</body>
</html>
