<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>NV100 sans pause</title>

  <!-- Ton CSS global -->
  <link rel="stylesheet" href="style.css">
  <style>
    /* juste le fond bleu + layout de la box comme ton rank */
    body{
      margin:0;
      background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
      font-family: Arial, sans-serif;
    }

    .box{
      width: 900px;
      margin: 50px auto;
      background:#ffffff;
      border-radius:6px;
      overflow:hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }

    .title{
      background:#3a3a3a;
      color:white;
      padding:12px 14px;
      font-size:20px;
      font-weight:700;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
    }
    thead th{
      background:#ffffff;
      padding:12px 10px;
      text-align:left;
      font-size:13px;
      font-weight:700;
      border-bottom:1px solid #cfcfcf;
    }
    tbody td{
      padding:16px 10px;
      border-bottom:1px solid #cfcfcf;
      vertical-align:middle;
      font-size:14px;
    }
    tbody tr:nth-child(odd){ background:#f2f2f2; }
    tbody tr:nth-child(even){ background:#ffffff; }

    .rank{
      font-weight:700;
      font-size:22px;
      width:60px;
      text-align:center;
      color:#444;
    }

    .avatar{
      width:90px;
      text-align:center;
    }
    .avatar .frame{
      width:64px;
      height:64px;
      margin:0 auto;
      background:#e9e9e9;
      border:1px solid #bdbdbd;
      border-radius:6px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.6);
    }
    .avatar img{
      width:56px;
      height:56px;
      object-fit:cover;
      border:2px solid #8f8f8f;
      border-radius:6px;
      background:#ddd;
      display:block;
    }

    .name{
      width:260px;
    }
    /* PAS de lien ici */
    .name span{
      color:#2c6fb7;
      font-weight:700;
    }

    .center{
      text-align:center;
      white-space:nowrap;
    }

    .col-days{ width:140px; }
    .col-date{ width:170px; }
    .col-arr{ width:170px; }
    .col-games{ width:180px; }
  </style>
</head>

<body>

  <!-- Header injecté (nav + sous-menu pause) -->
  <script src="header.js"></script>

  <div class="box">
    <div class="title">NV100 sans pause</div>

    <table id="leaderboard">
      <thead>
        <tr>
          <th></th>
          <th></th>
          <th>Nom du joueur</th>
          <th class="col-days">NV100 sans pause</th>
          <th class="col-date">Date d'inscription</th>
          <th class="col-arr">Date d'arrivée</th>
          <th class="col-games">Jeux notés au niveau 100</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Données -->
  <script src="data.js"></script>
  <script>
    // Helper : récupère les infos NV100 si elles existent
    function getNv100Stats(j){
      return j?.modes?.nv100 || null;
    }

    // calc jours sans pause : nv100.jours - nv100.pauses_total.jours
    function daysNoPause(j){
      const st = getNv100Stats(j);
      if (!st || !st.atteint_le) return null;
      const total = st?.jours ?? j?.jours ?? 0;
      const pause = st?.pauses_total?.jours ?? 0;
      return Math.max(0, total - pause);
    }

    const tbody = document.querySelector("#leaderboard tbody");
    const jeuxNotes = {
  "largo672": "~1800",
  "djabrail": "~1700",
  "josué455": "≈1920",
  "abelard": "4",
  "talktakashi": "1973",
  "dude": "0",
  "korben": "0",
  "alexc2109": "2205",
  "francoeur": "1",
  "hoopa": "2266",
  "alexis279": "",
  "golder": "70",
  "jordanio": "2261",
  "unit": "4",
  "esdras950": "2174",
  "cirpacha": "~2348",
  "thegladiator": "0",
  "tellor": "2270",
  "lumia": "969",
  "redbot": "2",
  "pingu": "0",
  "ko0pa": "3696",
  "houka": "0",
  "justice": "24",
  "blackout": "196"
};

    // On prend la liste "joueurs" depuis data.js
    // Tri du plus rapide au plus lent (sans pause)
    const list = [...joueurs]
  .filter(j => {
    const st = getNv100Stats(j);
    return st && st.jours && st.jours > 0;
  })
  .sort((a,b)=>daysNoPause(a)-daysNoPause(b));

    list.forEach((j,i)=>{
      const st = getNv100Stats(j);

      const insc = j.inscription ?? j.insc ?? "";
      const arrivee = st?.atteint_le ?? j.arrivee ?? "";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank">${i+1}</td>
        <td class="avatar">
          <div class="frame">
            <img src="${j.avatar}" alt="${j.nom}">
          </div>
        </td>
        <td class="name"><span>${j.nom}</span></td>
        <td class="center">${daysNoPause(j)} jours</td>
        <td class="center">${insc}</td>
        <td class="center">${arrivee}</td>
        <td class="center">${jeuxNotes[slugify(j.nom)] ?? ""}</td>
      `;
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>
