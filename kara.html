<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement Kara — Top 50 + Snokido</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>

  <style>
    body{ margin:0; font-family:Arial,sans-serif; background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%); }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{ background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.10); }
    .titlebar{ background:#3b3b3b; color:#fff; padding:14px 16px; font-size:22px; font-weight:900; }
    .sub{ padding:10px 16px; font-weight:900; color:#444; border-bottom:1px solid #e6e6e6; background:#fafafa; }
    .warn{ margin:12px 16px 0; padding:10px 12px; background:#fff3cd; border:1px solid #ffe69c; border-radius:10px; font-weight:900; color:#664d03; display:none; }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{ background:#fff; padding:14px 12px; text-align:left; font-size:15px; font-weight:900; border-bottom:1px solid #cfcfcf; }
    tbody td{ padding:18px 12px; border-bottom:1px solid #cfcfcf; vertical-align:middle; font-size:16px; }
    tbody tr:nth-child(odd){ background:#f2f2f2; }

    .rank{ width:70px; text-align:center; font-weight:900; font-size:26px; color:#444; }
    .avatarCell{ width:110px; text-align:center; }
    .frame{ width:64px; height:64px; margin:0 auto; background:#e9e9e9; border:1px solid #bdbdbd; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .frame img{ width:56px; height:56px; object-fit:cover; border:2px solid #8f8f8f; border-radius:10px; background:#ddd; display:block; }

    .name a{ color:#2c6fb7; font-weight:900; text-decoration:none; font-size:18px; }
    .center{ text-align:center; white-space:nowrap; font-weight:900; }
    .small{ font-weight:700; font-size:13px; color:#666; }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="titlebar">Classement Kara — Top 50 + Snokido</div>
      <div class="sub" id="rangeTxt">Chargement…</div>
      <div id="warn" class="warn"></div>

      <table>
        <thead>
          <tr>
            <th></th>
            <th></th>
            <th>Joueur</th>
            <th class="center">Karas</th>
            <th class="center">Niveau</th>
            <th class="center">XP</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

<script>
  function warn(msg){
    const w = document.getElementById("warn");
    w.style.display = "block";
    w.textContent = msg;
  }

  function slugify(name){
    return String(name || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  async function fetchJson(path){
    const url = path + (path.includes("?") ? "&" : "?") + "t=" + Date.now();
    const res = await fetch(url, { cache:"no-store" });
    if(!res.ok) return null;
    try { return await res.json(); } catch { return null; }
  }

  function bySlug(p){
    return (p && p.slug) ? String(p.slug).toLowerCase().trim() : slugify(p && p.nom);
  }

  function fmt(n){
    const v = Number(n);
    if(!Number.isFinite(v)) return "—";
    return v.toLocaleString("fr-FR");
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const tbody = document.getElementById("tbody");
    const rangeTxt = document.getElementById("rangeTxt");

    // 1) Top 50
    const top50 = await fetchJson("data/snokido_top50.json");
    if(!Array.isArray(top50)){
      warn("Impossible de charger data/snokido_top50.json");
      rangeTxt.textContent = "Erreur chargement.";
      return;
    }

    // 2) Players pages (pour récupérer snokido & snokido-2 + corriger infos)
    const pages = await fetchJson("data/players_pages.json");
    const pagesArr = Array.isArray(pages) ? pages : null;

    const pagesMap = new Map();
    if(pagesArr){
      for(const p of pagesArr){
        pagesMap.set(bySlug(p), p);
      }
    }

    // 3) Construire la liste: top50 + snokido + snokido-2 (sans doublons)
    const wanted = new Set(["snokido","snokido-2"]);

    const list = [];
    const seen = new Set();

    // a) top50
    for(const p of top50){
      const k = bySlug(p);
      if(!k || seen.has(k)) continue;
      seen.add(k);

      const better = pagesMap.get(k) || p; // préfère players_pages si dispo
      list.push({
        nom: better.nom || p.nom,
        slug: k,
        avatar: better.avatar || p.avatar || "avatar/1.jpg",
        profileHref: better.profileHref || p.profileHref || ("profil.html?mode=nv100&u=" + encodeURIComponent(k)),
        karas: (better.karas != null) ? Number(better.karas) : ((p.karas != null) ? Number(p.karas) : null),
        niveau: (better.niveau != null) ? Number(better.niveau) : ((p.niveau != null) ? Number(p.niveau) : null),
        xp: (better.xp != null) ? Number(better.xp) : ((p.xp != null) ? Number(p.xp) : null),
      });
    }

    // b) snokido + snokido-2
    for(const s of wanted){
      if(seen.has(s)) continue;
      const p = pagesMap.get(s);
      if(!p) continue; // s'il n'est pas dans players_pages, on ne peut pas l'ajouter
      seen.add(s);

      list.push({
        nom: p.nom || s,
        slug: s,
        avatar: p.avatar || "avatar/1.jpg",
        profileHref: p.profileHref || ("profil.html?mode=nv100&u=" + encodeURIComponent(s)),
        karas: (p.karas != null) ? Number(p.karas) : null,
        niveau: (p.niveau != null) ? Number(p.niveau) : null,
        xp: (p.xp != null) ? Number(p.xp) : null,
      });
    }

    // 4) Trier par karas décroissant (null => en bas)
    list.sort((a,b)=>{
      const ak = (a.karas == null) ? -1 : a.karas;
      const bk = (b.karas == null) ? -1 : b.karas;
      if(bk !== ak) return bk - ak;
      // tie-break: xp
      const ax = (a.xp == null) ? -1 : a.xp;
      const bx = (b.xp == null) ? -1 : b.xp;
      return bx - ax;
    });


    // 5) Render
    tbody.innerHTML = "";
    if(list.length === 0){
      tbody.innerHTML = '<tr><td colspan="6" style="padding:16px;font-weight:900;color:#666;">Aucune donnée.</td></tr>';
      return;
    }

    for(let i=0;i<list.length;i++){
      const r = list[i];
      const tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="rank">' + (i+1) + '</td>' +
        '<td class="avatarCell"><div class="frame"><img src="' + r.avatar + '" alt="' + (r.nom||"") + '"></div></td>' +
        '<td class="name"><a target="_blank" rel="noopener" href="' + r.profileHref + '">' + (r.nom || "—") + '</a>' +
          '<div class="small">' + (r.xp != null ? fmt(r.xp) + " XP" : "—") + '</div></td>' +
        '<td class="center">' + (r.karas != null ? fmt(r.karas) : "—") + '</td>' +
        '<td class="center">' + (r.niveau != null ? fmt(r.niveau) : "—") + '</td>' +
        '<td class="center">' + (r.xp != null ? fmt(r.xp) : "—") + '</td>';
      tbody.appendChild(tr);
    }
  });
</script>
</body>
</html>
