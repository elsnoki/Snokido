<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>XP par année (générations)</title>

<link rel="stylesheet" href="style.css">

<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    color:#222;
  }

  .wrap{
    max-width:1180px;
    margin:26px auto 40px;
    padding:0 12px;
  }

  .panel{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,.28);
    border:1px solid rgba(0,0,0,.10);
  }

  .titlebar{
    background:#3b3b3b;
    color:#fff;
    padding:14px 16px;
    font-size:22px;
    font-weight:900;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }

  .subtitle{
    padding:12px 16px;
    background:#f6f6f6;
    border-bottom:1px solid #d9d9d9;
    color:#444;
    font-size:13px;
    font-weight:700;
  }

  table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
  }

  thead th{
    background:#ffffff;
    padding:14px 12px;
    text-align:left;
    font-size:14px;
    font-weight:900;
    border-bottom:2px solid #d9d9d9;
  }

  tbody td{
    padding:16px 12px;
    border-bottom:1px solid #e6e6e6;
    vertical-align:top;
    font-size:15px;
  }

  tbody tr:nth-child(odd){ background:#fafafa; }

  .rank{
    width:70px;
    font-weight:900;
    font-size:18px;
    color:#444;
    text-align:center;
  }

  .year{
    width:120px;
    font-weight:900;
    font-size:16px;
  }

  .total{
    width:180px;
    font-weight:900;
    font-size:16px;
    color:#111;
    white-space:nowrap;
  }

  .players{
    padding-top:2px;
  }

  .pillWrap{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    border-radius:999px;
    border:1px solid #d2d2d2;
    background:#fff;
    box-shadow:0 2px 0 rgba(0,0,0,.05);
    font-size:13px;
    font-weight:900;
    color:#222;
    white-space:nowrap;
  }

  /* ✅ Skin à côté du pseudo */
  .pill .skin{
    width:22px;
    height:22px;
    border-radius:8px;
    object-fit:cover;
    border:1px solid #bbb;
    background:#ddd;
    flex:0 0 auto;
  }

  .pill .xp{
    font-weight:900;
    color:#2b2b2b;
    opacity:.9;
  }

  .muted{
    color:#666;
    font-weight:700;
    font-size:12px;
    margin-top:8px;
  }

  /* petit effet top 1 */
  tr.firstRow td{
    background: linear-gradient(rgba(255,212,77,.18), rgba(255,255,255,.10));
    border-bottom-color:#e9d28a;
  }
  tr.firstRow .total{
    color:#7a5200;
  }
</style>
</head>

<body>

<script src="header.js"></script>

<main class="wrap">
  <section class="panel">
    <div class="titlebar">
      <div>XP par année (générations)</div>
      <div id="meta" style="font-size:13px; font-weight:900; color:#bfe6ff;">
        Chargement…
      </div>
    </div>

    <div class="subtitle">
      Données live depuis <code>data/players_pages.json</code> — joueurs affichés uniquement si <b>XP ≥ 40&nbsp;000</b>.
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Année</th>
          <th>Total XP</th>
          <th>Joueurs (XP individuel)</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </section>
</main>

<script>
  // NOTE: on ignore "fluffy" comme demandé.
  // NOTE: On ne touche pas à rankyear.html. Ici, on lit le même JSON que ton scrap met à jour.

  const DATA_URL = "data/players_pages.json";
  const MIN_XP = 40000;

  // (Legacy) Tes données manuelles restent ici (non utilisées désormais),
  // mais on ne les supprime pas.
  const years = [
    { year: 2013, total: 192596, players: [ { nom: "Dude", xp: 100258 }, { nom: "Korben", xp: 92406 } ] },
  ];

  function fmtInt(n){
    if(n == null) return "—";
    try { return new Intl.NumberFormat("fr-FR").format(n); }
    catch(e){ return String(n); }
  }

  function toNumber(v){
    if(v == null) return null;
    if(typeof v === "number" && Number.isFinite(v)) return v;

    const s = String(v).trim();
    if(!s) return null;

    const m = s.replace(/\u00A0/g, " ").match(/-?\d[\d\s]*/);
    if(!m) return null;

    const cleaned = m[0].replace(/\s/g, "");
    const n = Number(cleaned);
    return Number.isFinite(n) ? n : null;
  }

  function deepFindValue(obj, keyNames, maxDepth = 7){
    const keysSet = new Set(keyNames.map(k => String(k).toLowerCase()));
    const seen = new Set();

    function walk(node, depth){
      if(!node || depth > maxDepth) return null;
      if(typeof node !== "object") return null;
      if(seen.has(node)) return null;
      seen.add(node);

      for(const k of Object.keys(node)){
        if(keysSet.has(k.toLowerCase())){
          const v = node[k];
          if(v != null && v !== "") return v;
        }
      }
      for(const k of Object.keys(node)){
        const v = node[k];
        if(v && typeof v === "object"){
          const r = walk(v, depth + 1);
          if(r != null) return r;
        }
      }
      return null;
    }
    return walk(obj, 0);
  }

  function deepFindNumber(obj, keyNames, maxDepth = 7){
    const v = deepFindValue(obj, keyNames, maxDepth);
    return toNumber(v);
  }

  function extractYear(inscription){
    if(!inscription) return null;
    const s = String(inscription).trim();

    // "DD-MM-YYYY"
    const parts = s.split("-");
    if(parts.length === 3){
      const y = Number(parts[2]);
      return Number.isFinite(y) ? y : null;
    }

    // "YYYY-MM-DD" ou autre
    const m = s.match(/(19\d{2}|20\d{2}|2100)/);
    return m ? Number(m[1]) : null;
  }

  function normalizePlayers(json){
    if(Array.isArray(json)) return json;
    if(json && Array.isArray(json.players)) return json.players;

    if(json && Array.isArray(json.pages)){
      const out = [];
      for(const p of json.pages){
        if(Array.isArray(p)) out.push(...p);
        else if(p && Array.isArray(p.players)) out.push(...p.players);
        else if(p && Array.isArray(p.joueurs)) out.push(...p.joueurs);
        else if(p && Array.isArray(p.items)) out.push(...p.items);
      }
      return out;
    }

    if(json && typeof json === "object"){
      const out = [];
      for(const k of Object.keys(json)){
        if(Array.isArray(json[k])) out.push(...json[k]);
      }
      if(out.length) return out;
    }

    return [];
  }

  async function loadAllPlayers(){
    const res = await fetch(DATA_URL, { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    const list = normalizePlayers(json);
    if(!list.length) throw new Error("Format JSON non reconnu ou liste vide");
    return list;
  }

  // 1) Si "modes" existe: meilleur xp = max(modes[*].xp)
  // 2) Sinon: XP via deepFindNumber(...)
  function bestXP(player){
    if(player && player.modes && typeof player.modes === "object"){
      let best = { xp: null };
      for(const modeKey of Object.keys(player.modes)){
        const m = player.modes[modeKey];
        const xp = (m && typeof m.xp === "number") ? m.xp : toNumber(m?.xp);
        if(xp == null) continue;
        if(best.xp == null || xp > best.xp){
          best.xp = xp;
        }
      }
      if(best.xp != null) return best;
    }

    const xp = deepFindNumber(player, [
      "xp","xptotal","xp_total","total_xp","totalxp",
      "experience","exp","points_xp","pointsxp"
    ]);
    return { xp };
  }

  function getName(player){
    return deepFindValue(player, ["nom","name","pseudo","username","player","player_name"]) ?? "—";
  }

  function getAvatar(player){
    return deepFindValue(player, ["avatar","img","image","photo","pfp","avatar_url","avatarUrl"]) ?? "avatar/1.jpg";
  }

  function getInscription(player){
    return deepFindValue(player, ["inscription","registered","register_date","registration","created","created_at","createdAt","date_inscription"]) ?? null;
  }

  function buildYearsFromPlayers(players){
    // Parse + filtre XP >= MIN_XP + année valide
    const rows = players.map(pl => {
      const nom = getName(pl);
      const avatar = getAvatar(pl);
      const inscription = getInscription(pl);
      const year = extractYear(inscription);
      const xp = bestXP(pl).xp;

      return { nom, avatar, inscription, year, xp };
    }).filter(r =>
      r.year != null &&
      r.xp != null &&
      r.xp >= MIN_XP &&
      String(r.nom).trim().toLowerCase() !== "fluffy"
    );

    // Group by year
    const byYear = new Map();
    for(const r of rows){
      if(!byYear.has(r.year)){
        byYear.set(r.year, { year: r.year, total: 0, players: [] });
      }
      const g = byYear.get(r.year);
      g.players.push({ nom: r.nom, xp: r.xp, avatar: r.avatar });
      g.total += r.xp;
    }

    // Sort players inside each year by xp desc
    const list = Array.from(byYear.values());
    for(const y of list){
      y.players.sort((a,b)=> (b.xp||0) - (a.xp||0));
    }

    return { years: list, keptPlayers: rows.length };
  }

  function renderTable(yearsArr){
    // Tri décroissant par total
    const sorted = yearsArr.slice().sort((a,b)=> (b.total||0) - (a.total||0));

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    sorted.forEach((y, idx) => {
      const totalStr = fmtInt(y.total) + " xp";
      const players = (y.players || []);

      const pills = players.map(p => `
        <span class="pill" title="${p.nom} — ${fmtInt(p.xp)} xp">
          <img class="skin" src="${p.avatar}" alt="${p.nom}">
          ${p.nom}
          <span class="xp">${fmtInt(p.xp)} xp</span>
        </span>
      `).join("");

      const tr = document.createElement("tr");
      if(idx === 0) tr.classList.add("firstRow");

      tr.innerHTML = `
        <td class="rank">${idx+1}</td>
        <td class="year">${y.year}</td>
        <td class="total">${totalStr}</td>
        <td class="players">
          <div class="pillWrap">${pills || `<span class="muted">Aucun joueur ≥ ${fmtInt(MIN_XP)} xp</span>`}</div>
          <div class="muted">${players.length} joueur(s)</div>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const meta = document.getElementById("meta");
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = `<tr><td colspan="4" style="padding:14px 12px;font-weight:900;color:#444;">Chargement des joueurs…</td></tr>`;

    try{
      const players = await loadAllPlayers();
      const built = buildYearsFromPlayers(players);

      meta.textContent = `${built.keptPlayers} joueur(s) ≥ ${fmtInt(MIN_XP)} xp`;
      renderTable(built.years);
    }catch(e){
      meta.textContent = "Erreur de chargement";
      tbody.innerHTML = `
        <tr>
          <td colspan="4" style="padding:14px 12px;font-weight:900;color:#b00020;">
            Impossible de charger <code>${DATA_URL}</code> : ${String(e.message || e)}
          </td>
        </tr>
      `;
      console.error(e);
    }
  });
</script>

</body>
</html>
