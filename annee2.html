<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>XP par année (générations)</title>

<link rel="stylesheet" href="style.css">

<style>
  :root{
    --bg1:#2a88ad;
    --bg2:#0b3551;
    --bg3:#062638;

    --card:#ffffff;
    --text:#101418;
    --muted:#667085;
    --line:rgba(16,24,40,.10);

    --shadow: 0 18px 48px rgba(0,0,0,.30);
    --shadow2: 0 10px 24px rgba(0,0,0,.20);

    --accent:#66ccff;
    --gold:#ffd44d;
  }

  body{
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(1100px 600px at 25% 15%, var(--bg1) 0%, var(--bg2) 60%, var(--bg3) 100%);
    color:var(--text);
  }

  .wrap{
    max-width:1180px;
    margin:26px auto 40px;
    padding:0 12px;
  }

  .hero{
    border-radius:16px;
    padding:16px;
    background: rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.18);
    box-shadow: 0 14px 40px rgba(0,0,0,.25);
    backdrop-filter: blur(6px);
    margin-bottom:14px;
  }

  .heroTop{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
  }

  .heroTitle{
    color:#fff;
    font-weight:900;
    font-size:22px;
    letter-spacing:.2px;
  }

  .heroSub{
    margin-top:4px;
    color:rgba(255,255,255,.85);
    font-weight:800;
    font-size:13px;
  }

  .heroActions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:flex-end;
  }

  .ctrl{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    border-radius:12px;
    padding:8px 10px;
    color:#fff;
    font-weight:900;
    box-shadow: inset 0 -3px 0 rgba(255,255,255,.10);
  }

  .ctrl input{
    border:0;
    outline:0;
    background:transparent;
    color:#fff;
    font-weight:900;
    width:210px;
  }

  .ctrl input::placeholder{
    color:rgba(255,255,255,.70);
    font-weight:900;
  }

  .ctrl select{
    border:0;
    outline:0;
    background:transparent;
    color:#fff;
    font-weight:900;
    cursor:pointer;
  }

  .btn{
    border:0;
    cursor:pointer;
    background: rgba(255,255,255,.14);
    color:#fff;
    font-weight:900;
    padding:10px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.18);
    box-shadow: inset 0 -3px 0 rgba(255,255,255,.10);
  }

  .btn:hover{
    background: rgba(255,255,255,.18);
  }

  .stats{
    display:grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap:10px;
    margin-top:12px;
  }

  .stat{
    background: rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.18);
    border-radius:14px;
    padding:10px 12px;
    color:#fff;
    box-shadow: inset 0 -3px 0 rgba(255,255,255,.10);
  }

  .stat .k{
    font-size:12px;
    font-weight:900;
    opacity:.9;
  }

  .stat .v{
    margin-top:2px;
    font-size:18px;
    font-weight:900;
  }

  @media (max-width: 760px){
    .ctrl input{ width:160px; }
    .stats{ grid-template-columns: 1fr; }
  }

  .panel{
    background:var(--card);
    border-radius:16px;
    overflow:hidden;
    box-shadow: var(--shadow);
    border:1px solid rgba(255,255,255,.20);
  }

  .panelHead{
    padding:14px 16px;
    background: linear-gradient(#3b3b3b,#2a2a2a);
    color:#fff;
    font-size:18px;
    font-weight:900;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }

  .panelHead small{
    font-size:12px;
    color:#cfeeff;
    font-weight:900;
  }

  .content{
    padding:14px;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap:12px;
  }

  @media (max-width: 980px){
    .grid{ grid-template-columns: 1fr; }
  }

  .yearCard{
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
    box-shadow: var(--shadow2);
    background:#fff;
  }

  .yearTop{
    padding:12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    background: linear-gradient(rgba(102,204,255,.14), rgba(255,255,255,.0));
    border-bottom:1px solid var(--line);
  }

  .yearLeft{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:34px;
    height:34px;
    border-radius:12px;
    font-weight:900;
    background:#111;
    color:#fff;
  }

  .yearMeta .y{
    font-size:18px;
    font-weight:900;
  }

  .yearMeta .s{
    margin-top:2px;
    font-size:12px;
    font-weight:900;
    color:var(--muted);
  }

  .yearTotal{
    text-align:right;
    font-weight:900;
  }

  .yearTotal .t{
    font-size:16px;
  }

  .yearTotal .sub{
    margin-top:2px;
    font-size:12px;
    color:var(--muted);
    font-weight:900;
  }

  .players{
    padding:12px 14px 14px;
  }

  .pillWrap{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    border-radius:999px;
    border:1px solid rgba(0,0,0,.12);
    background:#fff;
    box-shadow:0 2px 0 rgba(0,0,0,.05);
    font-size:13px;
    font-weight:900;
    color:#222;
    white-space:nowrap;
    transition: transform .08s ease, box-shadow .08s ease;
  }

  .pill:hover{
    transform: translateY(-1px);
    box-shadow:0 8px 18px rgba(0,0,0,.12);
  }

  .pill .skin{
    width:22px;
    height:22px;
    border-radius:8px;
    object-fit:cover;
    border:1px solid #bbb;
    background:#ddd;
    flex:0 0 auto;
  }

  .pill .xp{
    font-weight:900;
    color:#2b2b2b;
    opacity:.9;
  }

  .mutedRow{
    margin-top:10px;
    color:var(--muted);
    font-weight:900;
    font-size:12px;
  }

  .yearCard.first{
    border:1px solid rgba(255,212,77,.70);
    box-shadow: 0 16px 42px rgba(255,212,77,.18), var(--shadow2);
  }

  .yearCard.first .badge{
    background: linear-gradient(#ffd44d,#f0b300);
    color:#111;
  }

  .navYear{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }

  .navBtn{
    display:inline-block;
    padding:10px 14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.12);
    color:#fff;
    font-weight:900;
    text-decoration:none;
    cursor:pointer;
    backdrop-filter: blur(4px);
  }

  .navBtn:hover{
    background:rgba(255,255,255,.18);
  }

  .navBtn.primary{
    background:#66ccff;
    color:#003347;
    border:1px solid rgba(0,0,0,.15);
  }
</style>
</head>

<body>
<script src="header.js"></script>

<main class="wrap">

  <div class="navYear">
    <button class="navBtn" onclick="history.back()">← Retour</button>

    <a class="navBtn primary" href="annee.html">
      Classement des années →
    </a>
  </div>

  <section class="hero">
    <div class="heroTop">
      <div>
        <div class="heroTitle">XP par année (générations)</div>
        <div class="heroSub"></div>
      </div>

      <div class="heroActions">
        <div class="ctrl" title="Rechercher un joueur">
          🔎 <input id="q" type="text" placeholder="Rechercher un pseudo…">
        </div>

        <div class="ctrl" title="Seuil XP minimum">
          ⚙️
          <select id="minxp">
            <option value="40000" selected>40 000+</option>
            <option value="50000">50 000+</option>
            <option value="75000">75 000+</option>
            <option value="100000">100 000+</option>
          </select>
        </div>

        <button class="btn" id="refreshBtn" type="button">↻ Recharger</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="k">Joueurs affichés</div>
        <div class="v" id="statPlayers">—</div>
      </div>
      <div class="stat">
        <div class="k">Années</div>
        <div class="v" id="statYears">—</div>
      </div>
      <div class="stat">
        <div class="k">Total XP (sur joueurs filtrés)</div>
        <div class="v" id="statTotal">—</div>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="panelHead">
      <div>Classement par année</div>
      <small id="meta">Chargement…</small>
    </div>

    <div class="content">
      <div id="grid" class="grid"></div>
    </div>
  </section>

</main>

<script>
  const DATA_URL = "data/players_pages.json";

  const years = [
    { year: 2013, total: 192596, players: [ { nom: "Dude", xp: 100258 }, { nom: "Korben", xp: 92406 } ] },
  ];

  function fmtInt(n){
    if(n == null) return "—";
    try { return new Intl.NumberFormat("fr-FR").format(n); }
    catch(e){ return String(n); }
  }

  function toNumber(v){
    if(v == null) return null;
    if(typeof v === "number" && Number.isFinite(v)) return v;
    const s = String(v).trim();
    if(!s) return null;
    const m = s.replace(/\u00A0/g, " ").match(/-?\d[\d\s]*/);
    if(!m) return null;
    const cleaned = m[0].replace(/\s/g, "");
    const n = Number(cleaned);
    return Number.isFinite(n) ? n : null;
  }

  function deepFindValue(obj, keyNames, maxDepth = 7){
    const keysSet = new Set(keyNames.map(k => String(k).toLowerCase()));
    const seen = new Set();

    function walk(node, depth){
      if(!node || depth > maxDepth) return null;
      if(typeof node !== "object") return null;
      if(seen.has(node)) return null;
      seen.add(node);

      for(const k of Object.keys(node)){
        if(keysSet.has(k.toLowerCase())){
          const v = node[k];
          if(v != null && v !== "") return v;
        }
      }
      for(const k of Object.keys(node)){
        const v = node[k];
        if(v && typeof v === "object"){
          const r = walk(v, depth + 1);
          if(r != null) return r;
        }
      }
      return null;
    }
    return walk(obj, 0);
  }

  function deepFindNumber(obj, keyNames, maxDepth = 7){
    const v = deepFindValue(obj, keyNames, maxDepth);
    return toNumber(v);
  }

  function extractYear(inscription){
    if(!inscription) return null;
    const s = String(inscription).trim();

    const parts = s.split("-");
    if(parts.length === 3){
      const y = Number(parts[2]);
      return Number.isFinite(y) ? y : null;
    }

    const m = s.match(/(19\d{2}|20\d{2}|2100)/);
    return m ? Number(m[1]) : null;
  }

  function normalizePlayers(json){
    if(Array.isArray(json)) return json;
    if(json && Array.isArray(json.players)) return json.players;

    if(json && Array.isArray(json.pages)){
      const out = [];
      for(const p of json.pages){
        if(Array.isArray(p)) out.push(...p);
        else if(p && Array.isArray(p.players)) out.push(...p.players);
        else if(p && Array.isArray(p.joueurs)) out.push(...p.joueurs);
        else if(p && Array.isArray(p.items)) out.push(...p.items);
      }
      return out;
    }

    if(json && typeof json === "object"){
      const out = [];
      for(const k of Object.keys(json)){
        if(Array.isArray(json[k])) out.push(...json[k]);
      }
      if(out.length) return out;
    }

    return [];
  }

  async function loadAllPlayers(){
    const res = await fetch(DATA_URL, { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    const list = normalizePlayers(json);
    if(!list.length) throw new Error("Format JSON non reconnu ou liste vide");
    return list;
  }

  function bestXP(player){
    if(player && player.modes && typeof player.modes === "object"){
      let best = { xp: null };
      for(const modeKey of Object.keys(player.modes)){
        const m = player.modes[modeKey];
        const xp = (m && typeof m.xp === "number") ? m.xp : toNumber(m?.xp);
        if(xp == null) continue;
        if(best.xp == null || xp > best.xp){
          best.xp = xp;
        }
      }
      if(best.xp != null) return best;
    }

    const xp = deepFindNumber(player, [
      "xp","xptotal","xp_total","total_xp","totalxp",
      "experience","exp","points_xp","pointsxp"
    ]);
    return { xp };
  }

  function getName(player){
    return deepFindValue(player, ["nom","name","pseudo","username","player","player_name"]) ?? "—";
  }

  function getAvatar(player){
    return deepFindValue(player, ["avatar","img","image","photo","pfp","avatar_url","avatarUrl"]) ?? "avatar/1.jpg";
  }

  function getInscription(player){
    return deepFindValue(player, ["inscription","registered","register_date","registration","created","created_at","createdAt","date_inscription"]) ?? null;
  }

  function buildYearsFromPlayers(players, minXp){
    const rows = players.map(pl => {
      const nom = getName(pl);
      const avatar = getAvatar(pl);
      const inscription = getInscription(pl);
      const year = extractYear(inscription);
      const xp = bestXP(pl).xp;
      return { nom, avatar, inscription, year, xp };
    }).filter(r =>
      r.year != null &&
      r.xp != null &&
      r.xp >= minXp &&
      String(r.nom).trim().toLowerCase() !== "fluffy"
    );

    const byYear = new Map();
    for(const r of rows){
      if(!byYear.has(r.year)){
        byYear.set(r.year, { year: r.year, total: 0, players: [] });
      }
      const g = byYear.get(r.year);
      g.players.push({ nom: r.nom, xp: r.xp, avatar: r.avatar });
      g.total += r.xp;
    }

    const list = Array.from(byYear.values());
    for(const y of list){
      y.players.sort((a,b)=> (b.xp||0) - (a.xp||0));
    }

    return { years: list, keptPlayers: rows.length };
  }

  function applySearch(yearsArr, query){
    const q = String(query || "").trim().toLowerCase();
    if(!q) return yearsArr;

    return yearsArr.map(y => {
      const players = (y.players || []).filter(p => String(p.nom||"").toLowerCase().includes(q));
      const total = players.reduce((s,p)=> s + (p.xp||0), 0);
      return { year:y.year, players, total };
    }).filter(y => (y.players || []).length > 0);
  }

  function renderCards(yearsArr){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const sorted = yearsArr.slice().sort((a,b)=> (b.total||0) - (a.total||0));

    sorted.forEach((y, idx) => {
      const card = document.createElement("div");
      card.className = "yearCard" + (idx === 0 ? " first" : "");

      const pills = (y.players || []).map(p => `
        <span class="pill" title="${p.nom} — ${fmtInt(p.xp)} xp">
          <img class="skin" src="${p.avatar}" alt="${p.nom}">
          ${p.nom}
          <span class="xp">${fmtInt(p.xp)} xp</span>
        </span>
      `).join("");

      card.innerHTML = `
        <div class="yearTop">
          <div class="yearLeft">
            <div class="badge">${idx+1}</div>
            <div class="yearMeta">
              <div class="y">Année ${y.year}</div>
              <div class="s">${(y.players||[]).length} joueur(s)</div>
            </div>
          </div>
          <div class="yearTotal">
            <div class="t">${fmtInt(y.total)} xp</div>
            <div class="sub">Total (filtré)</div>
          </div>
        </div>

        <div class="players">
          <div class="pillWrap">
            ${pills || `<span class="mutedRow">Aucun joueur pour ce filtre.</span>`}
          </div>
        </div>
      `;

      grid.appendChild(card);
    });
  }

  let RAW_PLAYERS = [];
  let LAST_BUILT = [];

  function updateUI(){
    const meta = document.getElementById("meta");
    const q = document.getElementById("q").value || "";
    const minxp = Number(document.getElementById("minxp").value || 40000);

    const built = buildYearsFromPlayers(RAW_PLAYERS, minxp);
    const searched = applySearch(built.years, q);

    const totalAll = searched.reduce((s,y)=> s + (y.total||0), 0);
    const playersCount = searched.reduce((s,y)=> s + ((y.players||[]).length), 0);

    document.getElementById("statPlayers").textContent = fmtInt(playersCount);
    document.getElementById("statYears").textContent = fmtInt(searched.length);
    document.getElementById("statTotal").textContent = fmtInt(totalAll);

    meta.textContent = `${fmtInt(built.keptPlayers)} joueur(s) ≥ ${fmtInt(minxp)} xp (avant recherche)`;

    LAST_BUILT = searched;
    renderCards(searched);
  }

  async function refresh(){
    const meta = document.getElementById("meta");
    meta.textContent = "Rechargement…";
    try{
      RAW_PLAYERS = await loadAllPlayers();
      updateUI();
      meta.textContent += " — OK";
    }catch(e){
      meta.textContent = "Erreur de chargement";
      const grid = document.getElementById("grid");
      grid.innerHTML = `
        <div style="padding:14px; font-weight:900; color:#b00020; background:#fff; border-radius:14px; border:1px solid rgba(0,0,0,.12);">
          Impossible de charger <code>${DATA_URL}</code> : ${String(e.message || e)}
        </div>
      `;
      console.error(e);
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    document.getElementById("q").addEventListener("input", updateUI);
    document.getElementById("minxp").addEventListener("change", updateUI);
    document.getElementById("refreshBtn").addEventListener("click", refresh);
    refresh();
  });
</script>

</body>
</html>
