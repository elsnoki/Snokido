<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créateur Snoki</title>

<link rel="stylesheet" href="style.css">
<script src="header.js" defer></script>

<style>

/* ===== PAGE ===== */

body{
    background:#eef4ff;
}

.createur-page{
    margin-top: 100px;
    padding: 30px;
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:28px;
    font-weight:900;
}

/* layout */
.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:40px;
    flex-wrap:wrap;
}

/* zone avatar */
.snoki-zone{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

#snoki{
    position:relative;
    width:450px;
    height:450px;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
}

/* pièces */
.piece{
    position:absolute;
    user-select:none;
    cursor:move;
}

/* UI */
.options{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    min-width:320px;
}

.section{
    margin-bottom:20px;
}

.section h2{
    font-size:16px;
    margin-bottom:10px;
    font-weight:900;
}

.thumb{
    width:60px;
    height:60px;
    object-fit:contain;
    border-radius:10px;
    border:2px solid #ddd;
    background:#fafafa;
    cursor:pointer;
    margin:4px;
}

.thumb:hover{
    border-color:#4f7cff;
}

</style>
</head>

<body>

<div class="createur-page">

<h1>Créateur Snoki</h1>

<div class="container">

<!-- ===== AVATAR ===== -->
<div class="snoki-zone">
<div id="snoki">

    <!-- BODY -->
    <img id="body" class="piece" src="createur/body/body1.png">

    <!-- HAIR -->
    <img id="hair" class="piece" src="createur/hair/hair1.png">

    <!-- EYES -->
    <img id="eyeL" class="piece" src="createur/eyes/eyeL1.png">
    <img id="eyeR" class="piece" src="createur/eyes/eyeR1.png">

    <!-- MOUTH -->
    <img id="mouth" class="piece" src="createur/mouth/mouth1.png">

    <!-- HANDS -->
    <img id="handL" class="piece" src="createur/hands/handL1.png">
    <img id="handR" class="piece" src="createur/hands/handR1.png">

</div>
</div>

<!-- ===== OPTIONS ===== -->
<div class="options">

<!-- BODY -->
<div class="section">
<h2>Corps</h2>
<img class="thumb" src="createur/body/body1.png"
onclick="setPart('body','createur/body/body1.png')">
<img class="thumb" src="createur/body/body2.png"
onclick="setPart('body','createur/body/body2.png')">
</div>

<!-- HAIR -->
<div class="section">
<h2>Cheveux</h2>
<img class="thumb" src="createur/hair/hair1.png"
onclick="setPart('hair','createur/hair/hair1.png')">
<img class="thumb" src="createur/hair/hair2.png"
onclick="setPart('hair','createur/hair/hair2.png')">
</div>

<!-- EYES -->
<div class="section">
<h2>Yeux gauche</h2>
<img class="thumb" src="createur/eyes/eyeL1.png"
onclick="setPart('eyeL','createur/eyes/eyeL1.png')">
<img class="thumb" src="createur/eyes/eyeL2.png"
onclick="setPart('eyeL','createur/eyes/eyeL2.png')">
</div>

<div class="section">
<h2>Yeux droit</h2>
<img class="thumb" src="createur/eyes/eyeR1.png"
onclick="setPart('eyeR','createur/eyes/eyeR1.png')">
<img class="thumb" src="createur/eyes/eyeR2.png"
onclick="setPart('eyeR','createur/eyes/eyeR2.png')">
</div>

<!-- MOUTH -->
<div class="section">
<h2>Bouche</h2>
<img class="thumb" src="createur/mouth/mouth1.png"
onclick="setPart('mouth','createur/mouth/mouth1.png')">
<img class="thumb" src="createur/mouth/mouth2.png"
onclick="setPart('mouth','createur/mouth/mouth2.png')">
</div>

<!-- HANDS -->
<div class="section">
<h2>Mains gauche</h2>
<img class="thumb" src="createur/hands/handL1.png"
onclick="setPart('handL','createur/hands/handL1.png')">
<img class="thumb" src="createur/hands/handL2.png"
onclick="setPart('handL','createur/hands/handL2.png')">
</div>

<div class="section">
<h2>Mains droite</h2>
<img class="thumb" src="createur/hands/handR1.png"
onclick="setPart('handR','createur/hands/handR1.png')">
<img class="thumb" src="createur/hands/handR2.png"
onclick="setPart('handR','createur/hands/handR2.png')">
</div>

</div>

</div>

</div>

<script>

// ===== changer image =====
function setPart(id, file){
    document.getElementById(id).src = file;
}

// ===== drag system =====
document.querySelectorAll(".piece").forEach(el => {

    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    el.addEventListener("mousedown", (e) => {
        dragging = true;
        offsetX = e.clientX - el.offsetLeft;
        offsetY = e.clientY - el.offsetTop;
        el.style.zIndex = 9999;
    });

    document.addEventListener("mousemove", (e) => {
        if (!dragging) return;

        el.style.left = (e.clientX - offsetX) + "px";
        el.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", () => {
        dragging = false;
    });

});

</script>

</body>
</html>
