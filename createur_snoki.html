<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créateur Snoki</title>

<link rel="stylesheet" href="style.css">
<script src="header.js" defer></script>

<style>

/* ===== PAGE ===== */

body{
    background:#eef4ff;
}

.createur-page{
    margin-top: 100px;
    padding: 30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:28px;
    font-weight:900;
}

/* layout */
.container{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:40px;
    flex-wrap:wrap;
}

/* zone perso */
.snoki-zone{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

/* avatar */
#snoki{
    position:relative;
    width:400px;
    height:400px;
}

.layer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:contain;
}

/* options */
.options{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    min-width:280px;
}

.section{
    margin-bottom:25px;
}

.section h2{
    margin-bottom:10px;
    font-size:18px;
    font-weight:900;
}

button{
    margin:4px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#4f7cff;
    color:white;
    cursor:pointer;
    font-weight:900;
}

button:hover{
    background:#315ee6;
}

</style>
</head>

<body>

<!-- HEADER injecté -->

<div class="createur-page">

<h1>Créateur de Snoki</h1>

<div class="container">

    <!-- AVATAR -->
    <div class="snoki-zone">
        <div id="snoki">

            <!-- base -->
            <img src="avatar/base.png" class="layer" style="z-index:1">

            <!-- corps -->
            <img id="body" class="layer" src="avatar/body/body1.png" style="z-index:2">

            <!-- tête -->
            <img id="head" class="layer" src="avatar/head/head1.png" style="z-index:3">

            <!-- yeux -->
            <img id="eyeL" class="layer" src="avatar/eyes/eyeL1.png" style="z-index:4">
            <img id="eyeR" class="layer" src="avatar/eyes/eyeR1.png" style="z-index:4">

            <!-- bouche -->
            <img id="mouth" class="layer" src="avatar/mouth/mouth1.png" style="z-index:5">

            <!-- bras -->
            <img id="armL" class="layer" src="avatar/arms/armL1.png" style="z-index:6">
            <img id="armR" class="layer" src="avatar/arms/armR1.png" style="z-index:6">

            <!-- mains / objets -->
            <img id="handL" class="layer" src="avatar/hands/handL1.png" style="z-index:7">
            <img id="handR" class="layer" src="avatar/hands/handR1.png" style="z-index:7">

            <!-- accessoires -->
            <img id="hat" class="layer" src="avatar/accessories/hat1.png" style="z-index:8">
            <img id="glasses" class="layer" src="avatar/accessories/glasses1.png" style="z-index:9">
            <img id="band" class="layer" src="avatar/accessories/band1.png" style="z-index:10">

        </div>
    </div>

    <!-- OPTIONS -->
    <div class="options">

        <div class="section">
            <h2>👁 Yeux gauche</h2>
            <button onclick="setPart('eyeL','avatar/eyes/eyeL1.png')">Style 1</button>
            <button onclick="setPart('eyeL','avatar/eyes/eyeL2.png')">Style 2</button>
        </div>

        <div class="section">
            <h2>👁 Yeux droit</h2>
            <button onclick="setPart('eyeR','avatar/eyes/eyeR1.png')">Style 1</button>
            <button onclick="setPart('eyeR','avatar/eyes/eyeR2.png')">Style 2</button>
        </div>

        <div class="section">
            <h2>😊 Bouche</h2>
            <button onclick="setPart('mouth','avatar/mouth/mouth1.png')">Smile</button>
            <button onclick="setPart('mouth','avatar/mouth/mouth2.png')">Grin</button>
        </div>

        <div class="section">
            <h2>🧍 Corps</h2>
            <button onclick="setPart('body','avatar/body/body1.png')">Normal</button>
            <button onclick="setPart('body','avatar/body/body2.png')">Fort</button>
        </div>

        <div class="section">
            <h2>🎩 Accessoires</h2>
            <button onclick="setPart('hat','avatar/accessories/hat1.png')">Casquette</button>
            <button onclick="setPart('glasses','avatar/accessories/glasses1.png')">Lunettes</button>
            <button onclick="setPart('band','avatar/accessories/band1.png')">Bandeau</button>
        </div>

        <div class="section">
            <h2>✋ Mains</h2>
            <button onclick="setPart('handL','avatar/hands/swordL.png')">Main gauche épée</button>
            <button onclick="setPart('handR','avatar/hands/swordR.png')">Main droite épée</button>
        </div>

    </div>

</div>

</div>

<script>
function setPart(id, path){
    const el = document.getElementById(id);
    if(el) el.src = path;
}
</script>

</body>
</html>
