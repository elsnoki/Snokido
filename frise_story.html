<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Frise racontée — Chronologie vivante</title>

  <link rel="stylesheet" href="style.css">

  <script src="header.js" defer></script>
  <script src="data.js" defer></script>
  <script src="frise_data.js" defer></script>

  <style>
    :root{
      --bg1:#071b2a;
      --bg2:#0d3551;
      --bg3:#114e6a;
      --card:#ffffffee;
      --ink:#0f172a;
      --muted:#4b5563;
      --line:#7dd3fc;
      --lineGlow:rgba(125,211,252,.28);
      --accent:#38bdf8;
      --accent2:#0ea5e9;
      --gold:#fbbf24;
      --good:#16a34a;
      --bad:#dc2626;
      --shadow:0 25px 60px rgba(0,0,0,.28);
      --shadow2:0 12px 30px rgba(0,0,0,.18);
      --ring:0 0 0 8px rgba(125,211,252,.12);
      --zoom:1;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:white;
      background:
        radial-gradient(900px 500px at 10% 0%, rgba(56,189,248,.22), transparent 60%),
        radial-gradient(900px 500px at 100% 20%, rgba(251,191,36,.12), transparent 55%),
        linear-gradient(180deg, var(--bg2), var(--bg1) 55%, #06111c 100%);
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,.45), transparent 55%),
        radial-gradient(1.5px 1.5px at 70% 20%, rgba(255,255,255,.35), transparent 55%),
        radial-gradient(1.8px 1.8px at 85% 70%, rgba(255,255,255,.32), transparent 55%),
        radial-gradient(1.2px 1.2px at 30% 75%, rgba(255,255,255,.28), transparent 55%),
        radial-gradient(1.6px 1.6px at 50% 50%, rgba(255,255,255,.22), transparent 55%);
      opacity:.8;
    }

    .wrap{
      width:min(1360px, calc(100% - 28px));
      margin:24px auto 56px;
      position:relative;
      z-index:1;
    }

    .hero{
      position:relative;
      padding:30px 24px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:auto -80px -120px auto;
      width:320px;
      height:320px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(56,189,248,.24), transparent 65%);
      filter:blur(8px);
    }

    .heroTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      flex-wrap:wrap;
    }

    .hero h1{
      margin:0;
      font-size:clamp(30px, 4vw, 52px);
      line-height:1;
      letter-spacing:-.03em;
    }

    .hero p{
      margin:12px 0 0;
      max-width:900px;
      font-size:16px;
      line-height:1.6;
      color:rgba(255,255,255,.84);
    }

    .backLink{
      color:#d9f3ff;
      text-decoration:none;
      font-weight:800;
      border:1px solid rgba(217,243,255,.2);
      padding:12px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      transition:.18s ease;
      white-space:nowrap;
    }

    .backLink:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.12);
    }

    .stats{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:18px;
    }

    .stat{
      padding:12px 14px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      min-width:140px;
    }

    .stat b{
      display:block;
      font-size:22px;
      color:white;
    }

    .stat span{
      font-size:13px;
      color:rgba(255,255,255,.7);
    }

    .toolbar{
      margin-top:16px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
    }

    .zoomBox{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 14px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    .zoomBox label{
      font-size:13px;
      font-weight:900;
      color:#e0f2fe;
      white-space:nowrap;
    }

    .zoomBox input[type="range"]{
      width:180px;
      accent-color:#7dd3fc;
      cursor:pointer;
    }

    .zoomValue{
      min-width:48px;
      text-align:right;
      font-weight:900;
      color:white;
    }

    .helperPill{
      padding:12px 14px;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      font-size:13px;
      color:rgba(255,255,255,.84);
    }

    .layout{
      display:grid;
      grid-template-columns: 1fr 360px;
      gap:22px;
      margin-top:22px;
      align-items:start;
    }

    .story{
      position:relative;
      padding:28px 0 10px;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.1);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .storyInner{
      transform:scale(var(--zoom));
      transform-origin:top center;
      transition:transform .16s ease;
    }

    .storyLine{
      position:absolute;
      top:0;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:8px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(125,211,252,.15), var(--line), rgba(125,211,252,.3));
      box-shadow:0
