<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Classement des gangs</title>

<link rel="stylesheet" href="style.css">
<script src="header.js"></script>
<script src="gangdata.js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
}
.wrap{max-width:1180px;margin:26px auto;padding:0 12px;}
.panel{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,.28);
}
.titlebar{
  background:#3b3b3b;
  color:#fff;
  padding:14px 16px;
  font-size:22px;
  font-weight:900;
}
table{width:100%;border-collapse:collapse;}
th,td{padding:14px;border-bottom:1px solid #ccc;}
.rank{text-align:center;font-weight:900;font-size:22px;}
.name a{color:#2c6fb7;font-weight:900;text-decoration:none;}
</style>
</head>

<body>

<main class="wrap">
<section class="panel">
<div class="titlebar">Classement des gangs</div>

<table>
<thead>
<tr>
<th></th>
<th>Nom du gang</th>
<th>Membres</th>
<th>XP totale</th>
<th>Kara totale</th>
<th>Profil</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</section>
</main>

<script>
function slugify(name){
  return name.normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9]/g,"")
    .toLowerCase();
}

const tbody = document.getElementById("tbody");

gangsData.forEach((g,i)=>{
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="rank">${i+1}</td>
    <td class="name">
      <a href="gang_profil.html?g=${slugify(g.name)}">${g.name}</a>
    </td>
    <td>${g.members.length}</td>
    <td>${g.xp.toLocaleString("fr-FR")} xp</td>
    <td>${g.kara.toLocaleString("fr-FR")} Kara</td>
    <td><a href="gang_profil.html?g=${slugify(g.name)}">Ouvrir</a></td>
  `;
  tbody.appendChild(tr);
});
</script>

</body>
</html>
