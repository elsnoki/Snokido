<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement des gangs</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      border:1px solid rgba(0,0,0,.10);
    }
    .titlebar{
      background:#3b3b3b;
      color:#fff;
      padding:14px 16px;
      font-size:22px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .topInfo{ font-size:12px; font-weight:900; opacity:.85; white-space:nowrap; }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{
      background:#fff;
      padding:14px 12px;
      text-align:left;
      font-size:15px;
      font-weight:900;
      border-bottom:1px solid #cfcfcf;
    }
    tbody td{
      padding:18px 12px;
      border-bottom:1px solid #cfcfcf;
      vertical-align:middle;
      font-size:16px;
    }
    tbody tr:nth-child(odd){ background:#f2f2f2; }
    tbody tr:nth-child(even){ background:#fff; }

    .rank{ width:70px; text-align:center; font-weight:900; font-size:26px; color:#444; }
    .logoCell{ width:130px; }
    .logoFrame{
      width:96px; height:96px; margin:0 auto;
      background:#e9e9e9; border:1px solid #bdbdbd; border-radius:16px;
      display:flex; align-items:center; justify-content:center;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.6);
    }
    .logoFrame img{
      width:86px; height:86px; object-fit:cover;
      border:2px solid #8f8f8f; border-radius:16px; background:#ddd;
      display:block;
    }

    .name a{
      color:#2c6fb7;
      font-weight:900;
      text-decoration:none;
      font-size:18px;
    }
    .name a:hover{ text-decoration:underline; }

    .center{ text-align:center; white-space:nowrap; }

    .xpTxt{ font-weight:900; }
    .karaTxt{ color:#444; font-weight:700; font-size:14px; margin-top:4px; }

    .btnOpen{
      display:inline-block;
      padding:10px 14px;
      border-radius:12px;
      background:#fff;
      border:1px solid #cfcfcf;
      text-decoration:none;
      font-weight:900;
      color:#333;
      font-size:14px;
    }
    .btnOpen:hover{ background:#f3f3f3; }

    .warn{
      display:none;
      padding:10px 16px;
      background:#fff3cd;
      border-bottom:1px solid #e7d59a;
      font-weight:900;
      color:#6b5600;
    }
  </style>
</head>

<body>
  <script src="header.js"></script>

  <main class="wrap">
    <section class="panel">
      <div class="titlebar">
        <span>Classement des gangs</span>
        <span class="topInfo" id="topInfo">Top50: chargement…</span>
      </div>
      <div class="warn" id="warn">⚠️ Impossible de charger data/snokido_top50.json (XP Top50 = 0)</div>

      <table>
        <thead>
          <tr>
            <th></th>
            <th></th>
            <th>Nom du gang</th>
            <th class="center">Membres</th>
            <th>Expérience</th>
            <th class="center">Profil</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="gangdata.js"></script>

  <script>
  (async function(){

    function slugify(s){
      return (s||"")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[^a-zA-Z0-9]/g,"")
        .toLowerCase();
    }

    // alias pour matcher des pseudos différents
    const alias = {
      "talk":"talktakashi",
      "talktakashi":"talktakashi",

      "alex":"alexc2109",
      "alexc":"alexc2109",
      "alex.c":"alexc2109",
      "alexc2109":"alexc2109",
      "alexis279":"alexc2109",

      "jordan":"jordanio",
      "jordanio":"jordanio",
      "jordan.io":"jordanio",

      "josue":"josue455",
      "josué":"josue455",
      "josue455":"josue455",

      "esdras":"esdras950",
      "esdras950":"esdras950",

      "thegladiator":"thegladiator",
    };

    function resolveKey(name){
      const s = slugify(name);
      return alias[s] || s;
    }

    // 1) Charger Top50 (scrap)
    let top50List = [];
    let top50Map = new Map();

    const topInfo = document.getElementById("topInfo");
    const warn = document.getElementById("warn");

    try{
      const res = await fetch("data/snokido_top50.json", { cache: "no-store" });
      if(!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();

      // support: fichier = tableau [...]
      // (si un jour tu passes en {top50:[...]}, ça marche aussi)
      top50List = Array.isArray(json) ? json : (json.top50 || []);

      top50Map = new Map(
        top50List.map(p => [ resolveKey(p.nom), p ])
      );

      topInfo.textContent = `Top50: OK (${top50List.length})`;
      localStorage.setItem("top50Count", String(top50List.length));
    }catch(e){
      console.warn(e);
      topInfo.textContent = "Top50: indisponible";
      warn.style.display = "block";
      localStorage.setItem("top50Count", "0");
    }

    // 2) Map joueurs manuels (data.js) (fallback)
    const manualBySlug = new Map();
    if (typeof joueurs !== "undefined") {
      joueurs.forEach(p => manualBySlug.set(resolveKey(p.nom), p));
    }

    // 3) Résoudre un membre:
    // - si xp dans gangdata => manuel prioritaire
    // - sinon si membre est Top50 => xp auto (scrap)
    // - sinon => 0 (ou fallback data.js si tu l’utilises)
    function resolveMember(m){
      const key = resolveKey(m.nom || "");

      const top = top50Map.get(key);
      const man = manualBySlug.get(key);

      const xp =
        (typeof m.xp === "number") ? m.xp :
        (top?.xp != null ? Number(top.xp) :
          (man?.modes?.nv100?.xp != null ? Number(man.modes.nv100.xp) : 0)
        );

      const karas = (typeof m.karas === "number") ? m.karas : 0;

      const avatar =
        m.avatar ||
        top?.avatar ||
        man?.avatar ||
        "avatar/1.jpg";

      return { ...m, slug:key, xp, karas, avatar, top50Rank: top?.rank ?? null };
    }

    // 4) Calcul gangs + tri
    const gangs = (gangsData || []).map(g => {
      const membersResolved = (g.members || []).map(resolveMember);
      const totalXp = membersResolved.reduce((sum,x)=> sum + (x.xp||0), 0);
      const totalKaras = membersResolved.reduce((sum,x)=> sum + (x.karas||0), 0);
      return { ...g, membersResolved, totalXp, totalKaras, count: membersResolved.length };
    });

    gangs.sort((a,b)=> b.totalXp - a.totalXp);

    // 5) Stocker pour gang_profil.html
    localStorage.setItem("gangsResolved", JSON.stringify(gangs));

    // 6) Render tableau
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    gangs.forEach((g,i)=>{
      const gSlug = slugify(g.name);
      const xpStr = (g.totalXp||0).toLocaleString("fr-FR") + " xp";
      const karaStr = (g.totalKaras||0) ? (g.totalKaras.toLocaleString("fr-FR") + " Kara") : "";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank">${i+1}</td>
        <td class="logoCell">
          <div class="logoFrame"><img src="${g.img}" alt="${g.name}"></div>
        </td>
        <td class="name">
          <a target="_blank" rel="noopener" href="gang_profil.html?g=${encodeURIComponent(gSlug)}">${g.name}</a>
        </td>
        <td class="center">${g.count} / 50</td>
        <td>
          <div class="xpTxt">${xpStr}</div>
          ${karaStr ? `<div class="karaTxt">${karaStr}</div>` : ""}
        </td>
        <td class="center">
          <a class="btnOpen" target="_blank" rel="noopener" href="gang_profil.html?g=${encodeURIComponent(gSlug)}">Ouvrir</a>
        </td>
      `;
      tbody.appendChild(tr);
    });

  })();
  </script>
</body>
</html>
