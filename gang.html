<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement des gangs</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>
  <script src="gangdata.js" defer></script>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      border:1px solid rgba(0,0,0,.10);
    }
    .titlebar{
      background:#3b3b3b;
      color:#fff;
      padding:14px 16px;
      font-size:22px;
      font-weight:900;
    }

    .msg{
      margin:12px 16px 0;
      padding:10px 12px;
      background:#fff3cd;
      border:1px solid #ffe69c;
      border-radius:10px;
      font-weight:900;
      color:#664d03;
      display:none;
    }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{
      background:#fff;
      padding:14px 12px;
      text-align:left;
      font-size:15px;
      font-weight:900;
      border-bottom:1px solid #cfcfcf;
    }
    tbody td{
      padding:18px 12px;
      border-bottom:1px solid #cfcfcf;
      vertical-align:middle;
      font-size:16px;
    }
    tbody tr:nth-child(odd){ background:#f2f2f2; }
    tbody tr:nth-child(even){ background:#fff; }

    .rank{ width:70px; text-align:center; font-weight:900; font-size:26px; color:#444; }
    .logoCell{ width:130px; }
    .logoFrame{
      width:96px; height:96px; margin:0 auto;
      background:#e9e9e9; border:1px solid #bdbdbd; border-radius:16px;
      display:flex; align-items:center; justify-content:center;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.6);
    }
    .logoFrame img{
      width:86px; height:86px; object-fit:cover;
      border:2px solid #8f8f8f; border-radius:16px; background:#ddd;
      display:block;
    }

    .name a{
      color:#2c6fb7;
      font-weight:900;
      text-decoration:none;
      font-size:18px;
    }
    .name a:hover{ text-decoration:underline; }

    .center{ text-align:center; white-space:nowrap; }
    .xpTxt{ font-weight:900; }
    .karaTxt{ color:#444; font-weight:700; font-size:14px; margin-top:4px; }

    .btnOpen{
      display:inline-block;
      padding:10px 14px;
      border-radius:12px;
      background:#fff;
      border:1px solid #cfcfcf;
      text-decoration:none;
      font-weight:900;
      color:#333;
      font-size:14px;
    }
    .btnOpen:hover{ background:#f3f3f3; }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="titlebar">Classement des gangs</div>
      <div id="msg" class="msg"></div>

      <table>
        <thead>
          <tr>
            <th></th>
            <th></th>
            <th>Nom du gang</th>
            <th class="center">Membres</th>
            <th>Expérience</th>
            <th class="center">Profil</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

  <script>
    function slugify(s){
      return (s||"")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[^a-zA-Z0-9]/g,"")
        .toLowerCase();
    }
    const msg = document.getElementById("msg");
    function warn(t){ msg.style.display="block"; msg.textContent=t; }
    function safeNum(n){ return (typeof n === "number" && Number.isFinite(n)) ? n : 0; }

    // alias pour eviter les mismatches
    const alias = {
      "talk":"talktakashi",
      "talktakashi":"talktakashi",
      "talk takashi":"talktakashi",

      "jordan.io":"jordanio",
      "jordanio":"jordanio",

      "josue":"josue455",
      "josué":"josue455",
      "josue455":"josue455",
      "josué455":"josue455",

      "thegladiator":"thegladiator",
      "ko0pa":"ko0pa",
      "alexis279":"alexis279"
    };
    function keyOf(name){
      const s = slugify(name);
      return alias[s] || s;
    }

    async function loadTop50(){
      const res = await fetch("data/snokido_top50.json", { cache:"no-store" });
      if(!res.ok) throw new Error("HTTP "+res.status);
      const arr = await res.json();
      if(!Array.isArray(arr)) throw new Error("JSON invalide");
      return arr;
    }

    window.addEventListener("DOMContentLoaded", async () => {
      const tbody = document.getElementById("tbody");

      if(!Array.isArray(window.gangsData)){
        warn("Erreur : gangsData introuvable (gangdata.js pas chargé).");
        return;
      }

      // Top50 map (nom -> player)
      const topMap = new Map();
      try{
        const top50 = await loadTop50();
        top50.forEach(p => topMap.set(keyOf(p.nom), p));
      }catch(e){
        warn("Impossible de charger data/snokido_top50.json → XP Top50 = 0 ("+e.message+")");
      }

      // calc gangs (Top50 auto, sinon manuel, sinon 0)
      const gangs = window.gangsData.map(g => {
        const membersResolved = (g.members || []).map(m => {
          const k = keyOf(m.nom || "");
          const top = topMap.get(k);

          const xp =
            (typeof m.xp === "number") ? m.xp :
            (top?.xp != null ? Number(top.xp) : 0);

          // Ton scrap ne donne pas les Karas => Top50 = 0, hors top50 = manuel si tu as mis karas
          const karas =
            (typeof m.karas === "number") ? m.karas :
            0;

          const avatar = m.avatar || top?.avatar || "avatar/1.jpg";
          return { ...m, slug:k, xp:safeNum(xp), karas:safeNum(karas), avatar };
        });

        const totalXp = membersResolved.reduce((s,x)=> s + safeNum(x.xp), 0);
        const totalKaras = membersResolved.reduce((s,x)=> s + safeNum(x.karas), 0);

        return { ...g, membersResolved, totalXp, totalKaras, count: membersResolved.length };
      });

      gangs.sort((a,b)=> b.totalXp - a.totalXp);
      gangs.forEach((g,i)=> g.classement = i+1);

      localStorage.setItem("gangsResolved", JSON.stringify(gangs));

      tbody.innerHTML = "";
      gangs.forEach((g,i)=>{
        const gSlug = slugify(g.name);
        const xpStr = (g.totalXp||0).toLocaleString("fr-FR") + " xp";
        const karaStr = (g.totalKaras||0) ? (g.totalKaras.toLocaleString("fr-FR")+" Kara") : "";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="rank">${i+1}</td>
          <td class="logoCell">
            <div class="logoFrame"><img src="${g.img}" alt="${g.name}"></div>
          </td>
          <td class="name">
            <a href="gang_profil.html?g=${encodeURIComponent(gSlug)}">${g.name}</a>
          </td>
          <td class="center">${g.count} / 50</td>
          <td>
            <div class="xpTxt">${xpStr}</div>
            ${karaStr ? `<div class="karaTxt">${karaStr}</div>` : ""}
          </td>
          <td class="center">
            <a class="btnOpen" href="gang_profil.html?g=${encodeURIComponent(gSlug)}">Ouvrir</a>
          </td>
        `;
        tbody.appendChild(tr);
      });
    });
  </script>
</body>
</html>
