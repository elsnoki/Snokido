<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement des gangs</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      border:1px solid rgba(0,0,0,.10);
    }
    .titlebar{
      background:#3b3b3b;
      color:#fff;
      padding:14px 16px;
      font-size:22px;
      font-weight:900;
    }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{
      background:#fff;
      padding:14px 12px;
      text-align:left;
      font-size:15px;
      font-weight:900;
      border-bottom:1px solid #cfcfcf;
    }
    tbody td{
      padding:18px 12px;
      border-bottom:1px solid #cfcfcf;
      vertical-align:middle;
      font-size:16px;
    }
    tbody tr:nth-child(odd){ background:#f2f2f2; }
    tbody tr:nth-child(even){ background:#fff; }

    .rank{ width:70px; text-align:center; font-weight:900; font-size:26px; color:#444; }
    .logoCell{ width:130px; }
    .logoFrame{
      width:96px; height:96px; margin:0 auto;
      background:#e9e9e9; border:1px solid #bdbdbd; border-radius:16px;
      display:flex; align-items:center; justify-content:center;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.6);
    }
    .logoFrame img{
      width:86px; height:86px; object-fit:cover;
      border:2px solid #8f8f8f; border-radius:16px; background:#ddd;
      display:block;
    }

    .name a{
      color:#2c6fb7;
      font-weight:900;
      text-decoration:none;
      font-size:18px;
    }
    .name a:hover{ text-decoration:underline; }

    .center{ text-align:center; white-space:nowrap; }

    .xpTxt{ font-weight:900; }
    .karaTxt{ color:#444; font-weight:700; font-size:14px; margin-top:4px; }

    .btnOpen{
      display:inline-block;
      padding:10px 14px;
      border-radius:12px;
      background:#fff;
      border:1px solid #cfcfcf;
      text-decoration:none;
      font-weight:900;
      color:#333;
      font-size:14px;
    }
    .btnOpen:hover{ background:#f3f3f3; }
  </style>
</head>

<body>
  <script src="header.js"></script>

  <main class="wrap">
    <section class="panel">
      <div class="titlebar">Classement des gangs</div>

      <table>
        <thead>
          <tr>
            <th></th>
            <th></th>
            <th>Nom du gang</th>
            <th class="center">Membres</th>
            <th>Expérience</th>
            <th class="center">Profil</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="gangdata.js"></script>

  <script>
    function slugify(s){
      return (s||"")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[^a-zA-Z0-9]/g,"")
        .toLowerCase();
    }

    // Map joueurs connus (depuis data.js)
    const playerBySlug = new Map();
    if (typeof joueurs !== "undefined") {
      joueurs.forEach(p => playerBySlug.set(slugify(p.nom), p));
    }

    // alias pour matcher des pseudos différents
    const alias = {
      "talk":"talktakashi",
      "talktakashi":"talktakashi",
      "alex":"alexc2109",
      "alexc":"alexc2109",
      "alex.c":"alexc2109",
      "jordan":"jordanio",
      "jordanio":"jordanio",
      "jordan.io":"jordanio",
      "josue":"josue455",
      "josué":"josue455",
      "esdras":"esdras950",
      "thegladiator":"thegladiator",
    };

    function resolveMember(m){
      // m = {nom, xp?, karas?, avatar?}
      const raw = m.nom || "";
      const s = slugify(raw);
      const key = alias[s] || s;
      const found = playerBySlug.get(key);

      const xp =
        (typeof m.xp === "number") ? m.xp :
        (found?.modes?.nv100?.xp != null ? found.modes.nv100.xp : 0);

      const karas =
        (typeof m.karas === "number") ? m.karas : 0;

      const avatar =
        m.avatar ||
        found?.avatar ||
        "avatar/1.jpg";

      return { ...m, slug:key, xp, karas, avatar };
    }

    // utilise gangsData (objets complets)
    const gangs = (gangsData || []).map(g => {
      const membersResolved = (g.members || []).map(resolveMember);
      const totalXp = membersResolved.reduce((sum,x)=> sum + (x.xp||0), 0);
      const totalKaras = membersResolved.reduce((sum,x)=> sum + (x.karas||0), 0);
      return { ...g, membersResolved, totalXp, totalKaras, count: membersResolved.length };
    });

    // tri par XP total desc
    gangs.sort((a,b)=> b.totalXp - a.totalXp);

    // stocke pour gang_profil.html (sans serveur)
    localStorage.setItem("gangsResolved", JSON.stringify(gangs));

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    gangs.forEach((g,i)=>{
      const gSlug = slugify(g.name);
      const xpStr = (g.totalXp||0).toLocaleString("fr-FR") + " xp";
      const karaStr = (g.totalKaras||0) ? (g.totalKaras.toLocaleString("fr-FR") + " Kara") : "";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank">${i+1}</td>
        <td class="logoCell">
          <div class="logoFrame"><img src="${g.img}" alt="${g.name}"></div>
        </td>
        <td class="name">
          <a target="_blank" rel="noopener" href="gang_profil.html?g=${encodeURIComponent(gSlug)}">${g.name}</a>
        </td>
        <td class="center">${g.count} / 50</td>
        <td>
          <div class="xpTxt">${xpStr}</div>
          ${karaStr ? `<div class="karaTxt">${karaStr}</div>` : ""}
        </td>
        <td class="center">
          <a class="btnOpen" target="_blank" rel="noopener" href="gang_profil.html?g=${encodeURIComponent(gSlug)}">Ouvrir</a>
        </td>
      `;
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>
