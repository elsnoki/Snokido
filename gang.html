<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement des gangs</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <script src="header.js"></script>

  <main style="max-width:1180px;margin:26px auto 40px;padding:0 12px;">
    <section style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.28);border:1px solid rgba(0,0,0,.10);">
      <div style="background:#3b3b3b;color:#fff;padding:14px 16px;font-size:22px;font-weight:900;">
        Classement des gangs
      </div>

      <div id="status" style="padding:12px 16px;font-weight:900;display:none;"></div>

      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr>
            <th style="padding:12px;border-bottom:1px solid #ccc;">#</th>
            <th style="padding:12px;border-bottom:1px solid #ccc;">Nom</th>
            <th style="padding:12px;border-bottom:1px solid #ccc;">Membres</th>
            <th style="padding:12px;border-bottom:1px solid #ccc;">Profil</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="4" style="padding:16px;font-weight:900">Chargement...</td></tr>
        </tbody>
      </table>

    </section>
  </main>

  <script src="gangdata.js"></script>

  <script>
    function slugify(s){
      return (s||"")
        .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
        .replace(/[^a-zA-Z0-9]/g,"")
        .toLowerCase();
    }

    window.addEventListener("DOMContentLoaded", () => {
      const tbody = document.getElementById("tbody");
      const status = document.getElementById("status");

      const data = window.gangsData;

      if(!Array.isArray(data)){
        tbody.innerHTML = `<tr><td colspan="4" style="padding:16px;font-weight:900">
          ERREUR: window.gangsData introuvable. (gangdata.js charge mais n'exporte pas window.gangsData)
        </td></tr>`;
        status.style.display = "block";
        status.textContent = "Fix: dans gangdata.js, utilise window.gangsData = [...]";
        return;
      }

      tbody.innerHTML = "";
      data.forEach((g,i)=>{
        const gSlug = slugify(g.name);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="padding:12px;border-bottom:1px solid #eee;font-weight:900">${i+1}</td>
          <td style="padding:12px;border-bottom:1px solid #eee;font-weight:900">${g.name}</td>
          <td style="padding:12px;border-bottom:1px solid #eee;">${(g.members||[]).length} / 50</td>
          <td style="padding:12px;border-bottom:1px solid #eee;">
            <a href="gang_profil.html?g=${encodeURIComponent(gSlug)}">Ouvrir</a>
          </td>
        `;
        tbody.appendChild(tr);
      });
    });
  </script>
</body>
</html>
