<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>400K - Classement</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
  font-family: Arial, sans-serif;
}
.box{
  width:1000px;
  max-width:calc(100% - 24px);
  margin:40px auto;
  background:#fff;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}
.title{
  background:#3a3a3a;
  color:#fff;
  padding:14px 18px;
  font-size:20px;
  font-weight:700;
}
.tableWrap{
  width:100%;
  overflow-x:auto;
}
table{
  width:100%;
  min-width:980px;
  border-collapse:separate;
  border-spacing:0;
}
thead th{
  background:#fff;
  padding:12px 10px;
  text-align:left;
  font-size:13px;
  font-weight:700;
  border-bottom:1px solid #cfcfcf;
}
tbody td{
  padding:16px 10px;
  border-bottom:1px solid #cfcfcf;
  font-size:14px;
  vertical-align:middle;
}
tbody tr:nth-child(odd){ background:#f2f2f2; }
tbody tr:nth-child(even){ background:#fff; }
.rank{ font-size:22px; font-weight:700; width:60px; text-align:center; }
.avatar{ width:90px; text-align:center; }
.avatar .frame{
  width:64px; height:64px; margin:0 auto;
  background:#e9e9e9;
  border:1px solid #bdbdbd;
  border-radius:6px;
  display:flex; align-items:center; justify-content:center;
}
.avatar img{
  width:56px; height:56px;
  border:2px solid #8f8f8f;
  border-radius:6px;
  object-fit:cover;
}
.name a{ color:#2c6fb7; font-weight:700; text-decoration:none; }
.name a:hover{ text-decoration:underline; }
.center{ text-align:center; white-space:nowrap; }

.pauseCell{
  min-width:190px;
}

.pauseBadge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 10px;
  border-radius:999px;
  font-weight:900;
  font-size:12px;
  border:1px solid rgba(0,0,0,.08);
}

.pauseBadge.no{
  background:#e8f8ee;
  color:#187a39;
}

.pauseBadge.yes{
  background:#fff1f1;
  color:#b42318;
}

.pauseSub{
  margin-top:6px;
  font-size:12px;
  color:#555;
  line-height:1.35;
}
</style>
</head>

<body>

<script src="header.js"></script>
<script src="data.js"></script>

<div class="box">
  <div class="title">Rank 400K — par rapidité</div>

  <div class="tableWrap">
    <table id="leaderboard">
      <thead>
        <tr>
          <th></th>
          <th></th>
          <th>Nom</th>
          <th class="center">400K en</th>
          <th class="center">Atteint le</th>
          <th class="center">Pause</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
function slugifyLocal(name){
  return String(name || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9]/g,"")
    .toLowerCase();
}

function formatPauseInfo(pauses_total){
  if(
    !pauses_total ||
    pauses_total.nb === null ||
    pauses_total.nb === undefined
  ){
    return {
      badgeClass: "no",
      badgeText: "Pause inconnue",
      subText: ""
    };
  }

  if(!pauses_total.nb){
    return {
      badgeClass: "no",
      badgeText: "Aucune pause",
      subText: ""
    };
  }

  const nb = pauses_total.nb || 0;
  const mois = pauses_total.mois || 0;
  const jours = pauses_total.jours || 0;

  let txt = [];
  if(mois) txt.push(mois + " mois");
  if(jours) txt.push(jours + " jours");
  if(!txt.length) txt.push("durée inconnue");

  return {
    badgeClass: "yes",
    badgeText: nb + " pause" + (nb > 1 ? "s" : ""),
    subText: txt.join(" • ")
  };
}

const tbody = document.querySelector("#leaderboard tbody");

if(typeof joueurs === "undefined" || !Array.isArray(joueurs)){
  tbody.innerHTML = "<tr><td colspan='6' style='padding:16px'>Erreur : data.js ne s'est pas chargé.</td></tr>";
} else {

  const mode = "400k";
  const list = joueurs
    .map(p => {
      const s = p.modes && p.modes[mode] ? p.modes[mode] : null;
      if(!s) return null;
      return {
        nom: p.nom,
        avatar: p.avatar || "avatar/1.jpg",
        jours: s.jours,
        atteint: s.atteint_le,
        pauses_total: s.pauses_total || null
      };
    })
    .filter(Boolean);

  list.sort((a,b)=>{
    const an = typeof a.jours === "number";
    const bn = typeof b.jours === "number";
    if(an && bn) return a.jours - b.jours;
    if(an && !bn) return -1;
    if(!an && bn) return 1;
    return 0;
  });

  list.forEach((j,i)=>{
    const pauseInfo = formatPauseInfo(j.pauses_total);

    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td class="rank">${i+1}</td>
      <td class="avatar">
        <div class="frame">
          <img src="${j.avatar}" alt="${j.nom}">
        </div>
      </td>
      <td class="name">
        <a href="profil.html?mode=400k&u=${slugifyLocal(j.nom)}">${j.nom}</a>
      </td>
      <td class="center">${typeof j.jours==="number" ? (j.jours + " jours") : "—"}</td>
      <td class="center">${j.atteint || "—"}</td>
      <td class="pauseCell center">
        <div class="pauseBadge ${pauseInfo.badgeClass}">${pauseInfo.badgeText}</div>
        ${pauseInfo.subText ? `<div class="pauseSub">${pauseInfo.subText}</div>` : ""}
      </td>
    `;
    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
