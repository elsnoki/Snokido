<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>400K - Classement</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
  font-family: Arial, sans-serif;
}
.box{
  width:1000px;
  max-width:calc(100% - 24px);
  margin:40px auto;
  background:#fff;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}
.title{
  background:#3a3a3a;
  color:#fff;
  padding:14px 18px;
  font-size:20px;
  font-weight:700;
}
table{ width:100%; border-collapse:separate; border-spacing:0; }
thead th{
  background:#fff;
  padding:12px 10px;
  text-align:left;
  font-size:13px;
  font-weight:700;
  border-bottom:1px solid #cfcfcf;
}
tbody td{
  padding:16px 10px;
  border-bottom:1px solid #cfcfcf;
  font-size:14px;
}
tbody tr:nth-child(odd){ background:#f2f2f2; }
tbody tr:nth-child(even){ background:#fff; }
.rank{ font-size:22px; font-weight:700; width:60px; text-align:center; }
.avatar{ width:90px; text-align:center; }
.avatar .frame{
  width:64px; height:64px; margin:0 auto;
  background:#e9e9e9;
  border:1px solid #bdbdbd;
  border-radius:6px;
  display:flex; align-items:center; justify-content:center;
}
.avatar img{
  width:56px; height:56px;
  border:2px solid #8f8f8f;
  border-radius:6px;
  object-fit:cover;
}
.name a{ color:#2c6fb7; font-weight:700; text-decoration:none; }
.name a:hover{ text-decoration:underline; }
.center{ text-align:center; white-space:nowrap; }
</style>
</head>

<body>

<script src="header.js"></script>
<script src="data.js"></script>

<div class="box">
  <div class="title">Rank 400K — par rapidité</div>

  <table id="leaderboard">
    <thead>
      <tr>
        <th></th>
        <th></th>
        <th>Nom</th>
        <th class="center">400K en</th>
        <th class="center">Atteint le</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
function slugifyLocal(name){
  return String(name || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9]/g,"")
    .toLowerCase();
}

const tbody = document.querySelector("#leaderboard tbody");

if(typeof joueurs === "undefined" || !Array.isArray(joueurs)){
  tbody.innerHTML = "<tr><td colspan='5' style='padding:16px'>Erreur : data.js ne s'est pas chargé.</td></tr>";
} else {

  // on construit le classement à partir de data.js
  const mode = "400k";
  const list = joueurs
    .map(p => {
      const s = p.modes && p.modes[mode] ? p.modes[mode] : null;
      if(!s) return null;
      return {
        nom: p.nom,
        avatar: p.avatar || "avatar/1.jpg",
        jours: s.jours,
        atteint: s.atteint_le
      };
    })
    .filter(Boolean);

  // tri : chiffres d'abord (du plus rapide au plus lent), puis les null à la fin
  list.sort((a,b)=>{
    const an = typeof a.jours === "number";
    const bn = typeof b.jours === "number";
    if(an && bn) return a.jours - b.jours;
    if(an && !bn) return -1;
    if(!an && bn) return 1;
    return 0;
  });

  list.forEach((j,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td class="rank">${i+1}</td>
      <td class="avatar">
        <div class="frame">
          <img src="${j.avatar}" alt="${j.nom}">
        </div>
      </td>
      <td class="name">
        <a href="profil.html?mode=400k&u=${slugifyLocal(j.nom)}">${j.nom}</a>
      </td>
      <td class="center">${typeof j.jours==="number" ? (j.jours + " jours") : "—"}</td>
      <td class="center">${j.atteint || "—"}</td>
    `;
    tbody.appendChild(tr);
  });
}
</script>

</body>
</html>
