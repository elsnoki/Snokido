<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>500K et + - Classements</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
  font-family: Arial, sans-serif;
}

.box{
  width:1100px;
  max-width:calc(100% - 24px);
  margin:28px auto 40px;
  background:#fff;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.title{
  background:#3a3a3a;
  color:#fff;
  padding:14px 18px;
  font-size:20px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.title small{
  font-size:12px;
  opacity:.85;
  font-weight:700;
}

.subnav-500{
  display:flex;
  gap:10px;
  padding:12px 18px;
  border-top:1px solid #e5e5e5;
  border-bottom:1px solid #e5e5e5;
  background:#fafafa;
  align-items:center;
  flex-wrap:wrap;
}

.subnav-500 button{
  appearance:none;
  border:1px solid rgba(0,0,0,.12);
  background:#fff;
  color:#2c6fb7;
  font-weight:900;
  border-radius:10px;
  padding:8px 12px;
  cursor:pointer;
  font-size:14px;
  transition:.15s ease;
}

.subnav-500 button:hover{
  background:#f1f1f1;
  transform:translateY(-1px);
}

.subnav-500 button.active{
  background:#2c6fb7;
  color:#fff;
  border-color:#2c6fb7;
  box-shadow: inset 0 -3px 0 rgba(0,0,0,.15);
}

.tableWrap{
  width:100%;
  overflow-x:auto;
}

table{
  width:100%;
  min-width:980px;
  border-collapse:separate;
  border-spacing:0;
}

thead th{
  background:#fff;
  padding:12px 10px;
  text-align:left;
  font-size:13px;
  font-weight:700;
  border-bottom:1px solid #cfcfcf;
}

tbody td{
  padding:14px 10px;
  border-bottom:1px solid #cfcfcf;
  font-size:14px;
  vertical-align:middle;
}

tbody tr:nth-child(odd){ background:#f2f2f2; }
tbody tr:nth-child(even){ background:#fff; }

.rank{
  font-size:22px;
  font-weight:700;
  width:60px;
  text-align:center;
}

.avatar{
  width:90px;
  text-align:center;
}

.avatar .frame{
  width:64px;
  height:64px;
  margin:0 auto;
  background:#e9e9e9;
  border:1px solid #bdbdbd;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.avatar img{
  width:56px;
  height:56px;
  border:2px solid #8f8f8f;
  border-radius:6px;
  object-fit:cover;
}

.name a{
  color:#2c6fb7;
  font-weight:700;
  text-decoration:none;
}

.name a:hover{
  text-decoration:underline;
}

.center{
  text-align:center;
  white-space:nowrap;
}

.pauseCell{
  min-width:190px;
}

.pauseBadge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 10px;
  border-radius:999px;
  font-weight:900;
  font-size:12px;
  border:1px solid rgba(0,0,0,.08);
}

.pauseBadge.no{
  background:#e8f8ee;
  color:#187a39;
}

.pauseBadge.yes{
  background:#fff1f1;
  color:#b42318;
}

.pauseSub{
  margin-top:6px;
  font-size:12px;
  color:#555;
  line-height:1.35;
}

.empty{
  padding:18px;
  font-weight:700;
  color:#666;
}

.modeTag{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  background:#eaf3ff;
  color:#1f5ca8;
  font-weight:900;
  font-size:12px;
}

.note{
  padding:14px 18px 18px;
  font-size:13px;
  color:#555;
  border-top:1px solid #ededed;
  background:#fcfcfc;
  line-height:1.5;
}

@media (max-width: 700px){
  .title{
    font-size:18px;
  }
  .subnav-500{
    gap:8px;
  }
  .subnav-500 button{
    font-size:13px;
    padding:8px 10px;
  }
}
</style>
</head>

<body>

<script src="header.js"></script>
<script src="data.js"></script>

<div class="box">
  <div class="title">
    <span id="pageTitle">Rank 500K — par rapidité</span>
    <small id="pageCount">0 joueur</small>
  </div>

  <div class="subnav-500" id="subnav"></div>

  <div class="tableWrap">
    <table id="leaderboard">
      <thead>
        <tr>
          <th></th>
          <th></th>
          <th>Nom</th>
          <th class="center" id="daysCol">500K en</th>
          <th class="center">Atteint le</th>
          <th class="center">Pause</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="note">
    Les liens de profil changent selon le palier sélectionné, via le paramètre <strong>mode</strong>.
    Exemple : <strong>profil.html?mode=500k</strong>, <strong>profil.html?mode=600k</strong>, etc.
  </div>
</div>

<script>
function slugifyLocal(name){
  return String(name || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-zA-Z0-9]/g, "")
    .toLowerCase();
}

function parseDateFR(str){
  if(!str || str === "—") return null;
  const clean = String(str).trim();

  // format attendu : dd-mm-yyyy
  const m = clean.match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if(!m) return null;

  const d = Number(m[1]);
  const mo = Number(m[2]) - 1;
  const y = Number(m[3]);

  const dt = new Date(y, mo, d);
  return isNaN(dt.getTime()) ? null : dt;
}

function diffDaysExact(dateStart, dateEnd){
  if(!dateStart || !dateEnd) return null;
  const ms = dateEnd.setHours(0,0,0,0) - dateStart.setHours(0,0,0,0);
  return Math.round(ms / 86400000);
}

const MODES = [
  { key:"500k", label:"500K" },
  { key:"600k", label:"600K" },
  { key:"700k", label:"700K" },
  { key:"800k", label:"800K" },
  { key:"900k", label:"900K" },
  { key:"1m",   label:"1M"   },
  { key:"1m1",  label:"1M1"  },
  { key:"1m2",  label:"1M2"  }
];

const tbody = document.querySelector("#leaderboard tbody");
const subnav = document.getElementById("subnav");
const pageTitle = document.getElementById("pageTitle");
const pageCount = document.getElementById("pageCount");
const daysCol = document.getElementById("daysCol");

function getModeFromURL(){
  const url = new URL(window.location.href);
  const p = (url.searchParams.get("mode") || "").toLowerCase();
  const exists = MODES.some(m => m.key === p);
  return exists ? p : "500k";
}

function setModeInURL(mode){
  const url = new URL(window.location.href);
  url.searchParams.set("mode", mode);
  history.replaceState({}, "", url.toString());
}

function formatPauseInfo(pauses_total){
  if(!pauses_total || !pauses_total.nb){
    return {
      badgeClass: "no",
      badgeText: "Aucune pause",
      subText: ""
    };
  }

  const nb = pauses_total.nb || 0;
  const mois = pauses_total.mois || 0;
  const jours = pauses_total.jours || 0;

  let txt = [];
  if(mois) txt.push(mois + " mois");
  if(jours) txt.push(jours + " jours");
  if(!txt.length) txt.push("durée inconnue");

  return {
    badgeClass: "yes",
    badgeText: nb + " pause" + (nb > 1 ? "s" : ""),
    subText: txt.join(" • ")
  };
}

function buildSubnav(currentMode){
  subnav.innerHTML = "";
  MODES.forEach(m => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = m.label;
    if(m.key === currentMode) btn.classList.add("active");
    btn.addEventListener("click", () => {
      setModeInURL(m.key);
      renderMode(m.key);
    });
    subnav.appendChild(btn);
  });
}

function getPlayersForMode(mode){
  if(typeof joueurs === "undefined" || !Array.isArray(joueurs)) return [];

  return joueurs.map(p => {
    const s = p.modes && p.modes[mode] ? p.modes[mode] : null;
    if(!s) return null;

    let jours = typeof s.jours === "number" ? s.jours : null;

    // recalcul auto si besoin à partir du mode précédent
    if(jours === null){
      const prevMap = {
        "500k":"400k",
        "600k":"500k",
        "700k":"600k",
        "800k":"700k",
        "900k":"800k",
        "1m":"900k",
        "1m1":"1m",
        "1m2":"1m1"
      };

      const prevMode = prevMap[mode];
      const prevData = prevMode && p.modes ? p.modes[prevMode] : null;

      if(prevData && prevData.atteint_le && s.atteint_le){
        const d1 = parseDateFR(prevData.atteint_le);
        const d2 = parseDateFR(s.atteint_le);
        const computed = diffDaysExact(d1, d2);
        if(typeof computed === "number" && !isNaN(computed)){
          jours = computed;
        }
      }
    }

    return {
      nom: p.nom,
      avatar: p.avatar || "avatar/1.jpg",
      jours: jours,
      atteint: s.atteint_le || "—",
      pauses_total: s.pauses_total || { nb:0, mois:0, jours:0 },
      profilMode: mode
    };
  })
  .filter(Boolean)
  .sort((a,b)=>{
    const an = typeof a.jours === "number";
    const bn = typeof b.jours === "number";

    if(an && bn) return a.jours - b.jours;
    if(an && !bn) return -1;
    if(!an && bn) return 1;
    return a.nom.localeCompare(b.nom, "fr", { sensitivity:"base" });
  });
}

function renderMode(mode){
  buildSubnav(mode);

  const modeObj = MODES.find(m => m.key === mode) || MODES[0];
  const modeLabel = modeObj.label;

  pageTitle.textContent = "Rank " + modeLabel + " — par rapidité";
  daysCol.textContent = modeLabel + " en";

  const list = getPlayersForMode(mode);

  pageCount.textContent = list.length + " joueur" + (list.length > 1 ? "s" : "");

  tbody.innerHTML = "";

  if(typeof joueurs === "undefined" || !Array.isArray(joueurs)){
    tbody.innerHTML = "<tr><td colspan='6' class='empty'>Erreur : data.js ne s'est pas chargé.</td></tr>";
    return;
  }

  if(!list.length){
    tbody.innerHTML = "<tr><td colspan='6' class='empty'>Aucune donnée disponible pour le palier " + modeLabel + ".</td></tr>";
    return;
  }

  list.forEach((j, i) => {
    const pauseInfo = formatPauseInfo(j.pauses_total);
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="rank">${i + 1}</td>

      <td class="avatar">
        <div class="frame">
          <img src="${j.avatar}" alt="${j.nom}">
        </div>
      </td>

      <td class="name">
        <a href="profil.html?mode=${encodeURIComponent(j.profilMode)}&u=${slugifyLocal(j.nom)}">${j.nom}</a>
        <div style="margin-top:6px;">
          <span class="modeTag">Profil ${modeLabel}</span>
        </div>
      </td>

      <td class="center">${typeof j.jours === "number" ? (j.jours + " jours") : "—"}</td>
      <td class="center">${j.atteint}</td>

      <td class="pauseCell center">
        <div class="pauseBadge ${pauseInfo.badgeClass}">${pauseInfo.badgeText}</div>
        ${pauseInfo.subText ? `<div class="pauseSub">${pauseInfo.subText}</div>` : ""}
      </td>
    `;

    tbody.appendChild(tr);
  });
}

renderMode(getModeFromURL());
</script>

</body>
</html>
