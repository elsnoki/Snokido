<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Profil du gang</title>

<link rel="stylesheet" href="style.css">
<script src="header.js"></script>
<script src="gangdata.js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
}
.wrap{max-width:1180px;margin:26px auto;padding:0 12px;}
.panel{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.28);}
.titlebar{background:#3b3b3b;color:#fff;padding:14px 16px;font-size:22px;font-weight:900;}
.content{padding:16px;}
.member{margin-bottom:10px;font-weight:900;}
</style>
</head>

<body>

<main class="wrap">
<section class="panel">
<div class="titlebar" id="title"></div>
<div class="content" id="content"></div>
</section>
</main>

<script>
function slugify(name){
  return name.normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9]/g,"")
    .toLowerCase();
}

const params = new URLSearchParams(location.search);
const gSlug = params.get("g");

const gang = gangsData.find(g=>slugify(g.name)===gSlug);

if(gang){
  document.getElementById("title").textContent = gang.name;
  document.getElementById("content").innerHTML = `
    <p><b>XP totale :</b> ${gang.xp.toLocaleString("fr-FR")} xp</p>
    <p><b>Kara totale :</b> ${gang.kara.toLocaleString("fr-FR")} Kara</p>
    <p><b>Membres :</b></p>
    ${gang.members.map(m=>`
      <div class="member">${m.nom} - ${m.xp.toLocaleString("fr-FR")} xp</div>
    `).join("")}
  `;
}
</script>

</body>
</html>
