<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Profil du gang</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>
  <script src="gangdata.js" defer></script>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      border:1px solid rgba(0,0,0,.10);
    }
    .titlebar{
      background:#3b3b3b;
      color:#fff;
      padding:14px 16px;
      font-size:22px;
      font-weight:900;
    }

    .content{ display:flex; gap:16px; padding:16px; align-items:flex-start; }
    .left{
      width:290px; background:#f6f6f6; border:1px solid #d9d9d9;
      border-radius:12px; padding:12px;
    }
    .left img{
      width:100%; border-radius:10px; border:2px solid #bdbdbd; background:#eee; display:block;
    }

    .main{ flex:1; min-width:460px; }
    .headerRow{ display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .badgeMax{
      width:46px; height:46px; border-radius:10px;
      display:grid; place-items:center; font-weight:900;
      background:linear-gradient(#ffd44d,#f0b300);
      border:2px solid rgba(0,0,0,.12);
      box-shadow:0 2px 0 rgba(0,0,0,.12);
      color:#111;
    }
    .name{ font-size:28px; font-weight:900; margin:0; }

    .xpRow{ margin:6px 0 12px; }
    .xpWrap{
      position:relative; height:20px; border-radius:10px;
      overflow:hidden; background:#d9d9d9; border:1px solid #cfcfcf;
    }
    .xpFill{ height:100%; width:100%; background:#78b72d; }
    .xpText{
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font-weight:900; color:#fff; text-shadow:0 1px 0 rgba(0,0,0,.35);
      font-size:13px;
    }

    .cols{ display:flex; gap:14px; align-items:flex-start; }
    .col-left{ flex:1.25; }
    .col-right{ flex:0.75; }

    .item{
      display:flex; align-items:center; gap:12px;
      font-size:15px; border-bottom:1px solid #e6e6e6; padding:12px 0;
    }
    .label{ width:160px; flex:0 0 auto; color:#444; }
    .value{ font-weight:900; color:#000; }

    .membersBar{
      margin-top:14px;
      background: linear-gradient(#1e6f92,#114e6a);
      padding:16px;
      border-top:1px solid rgba(0,0,0,.12);
    }
    .membersTitle{
      color:#fff;
      font-weight:900;
      margin:0 0 12px 0;
      font-size:18px;
    }
    .membersGrid{
      display:grid;
      grid-template-columns: repeat(8, minmax(0,1fr));
      gap:12px;
    }
    .mCard{
      background: rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.15);
      border-radius:14px;
      padding:10px;
      text-align:center;
      color:#fff;
      font-weight:900;
      font-size:13px;
    }
    .mCard img{
      width:66px; height:66px;
      object-fit:cover;
      border-radius:14px;
      border:2px solid rgba(0,0,0,.25);
      background:#ddd;
      display:block;
      margin:0 auto 8px;
    }
    .mXp{
      margin-top:6px;
      font-weight:700;
      font-size:12px;
      opacity:.95;
    }

    .msg{
      margin:12px 16px 0;
      padding:10px 12px;
      background:#fff3cd;
      border:1px solid #ffe69c;
      border-radius:10px;
      font-weight:900;
      color:#664d03;
      display:none;
    }

    @media (max-width: 1020px){
      .content{ flex-direction:column; }
      .left{ width:auto; }
      .main{ min-width:auto; }
      .cols{ flex-direction:column; }
      .membersGrid{ grid-template-columns: repeat(4, minmax(0,1fr)); }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="titlebar" id="pageTitle">Gang</div>
      <div id="msg" class="msg"></div>
      <div class="content" id="content"></div>

      <div class="membersBar">
        <p class="membersTitle">Membres</p>
        <div class="membersGrid" id="members"></div>
      </div>
    </section>
  </main>

  <script>
    function slugify(s){
      return (s||"")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[^a-zA-Z0-9]/g,"")
        .toLowerCase();
    }
    function safeNum(n){ return (typeof n === "number" && Number.isFinite(n)) ? n : 0; }

    const msg = document.getElementById("msg");
    function warn(t){ msg.style.display="block"; msg.textContent=t; }

    // alias identique à gang.html
    const alias = {
      "talk":"talktakashi",
      "talktakashi":"talktakashi",
      "talk takashi":"talktakashi",
      "jordan.io":"jordanio",
      "jordanio":"jordanio",
      "josue":"josue455",
      "josué":"josue455",
      "josue455":"josue455",
      "josué455":"josue455",
      "thegladiator":"thegladiator",
      "ko0pa":"ko0pa",
      "alexis279":"alexis279"
    };
    function keyOf(name){
      const s = slugify(name);
      return alias[s] || s;
    }

    async function loadTop50(){
      const res = await fetch("data/snokido_top50.json", { cache:"no-store" });
      if(!res.ok) throw new Error("HTTP "+res.status);
      const arr = await res.json();
      if(!Array.isArray(arr)) throw new Error("JSON invalide");
      return arr;
    }

    window.addEventListener("DOMContentLoaded", async () => {
      const params = new URLSearchParams(location.search);
      const gSlug = params.get("g");

      const pageTitle = document.getElementById("pageTitle");
      const content = document.getElementById("content");
      const members = document.getElementById("members");

      if(!gSlug){
        pageTitle.textContent = "Gang";
        content.innerHTML = "<p style='padding:18px;font-weight:900'>Lien invalide (paramètre g manquant).</p>";
        return;
      }

      if(!Array.isArray(window.gangsData)){
        warn("Erreur: gangdata.js n'a pas chargé window.gangsData");
        pageTitle.textContent = "Gang introuvable";
        content.innerHTML = "<p style='padding:18px;font-weight:900'>Impossible de charger les gangs.</p>";
        return;
      }

      // Top50 map
      const topMap = new Map();
      try{
        const top50 = await loadTop50();
        top50.forEach(p => topMap.set(keyOf(p.nom), p));
      }catch(e){
        warn("Impossible de charger data/snokido_top50.json → XP Top50 = 0 ("+e.message+")");
      }

      // Trouve le gang
      const rawGang = window.gangsData.find(g => slugify(g.name) === gSlug);

      if(!rawGang){
        pageTitle.textContent = "Gang introuvable";
        content.innerHTML = "<p style='padding:18px;font-weight:900'>Ce gang n'existe pas.</p>";
        return;
      }

      // calc membres
      const membersResolved = (rawGang.members || []).map(m => {
        const k = keyOf(m.nom || "");
        const top = topMap.get(k);

        const xp =
          (typeof m.xp === "number") ? m.xp :
          (top?.xp != null ? Number(top.xp) : 0);

        const karas =
          (typeof m.karas === "number") ? m.karas :
          0;

        const avatar = m.avatar || top?.avatar || "avatar/1.jpg";

        return { ...m, slug:k, xp:safeNum(xp), karas:safeNum(karas), avatar };
      });

      const totalXp = membersResolved.reduce((s,x)=> s + safeNum(x.xp), 0);
      const totalKaras = membersResolved.reduce((s,x)=> s + safeNum(x.karas), 0);

      pageTitle.textContent = "Gang : " + rawGang.name;

      const xpStr = totalXp.toLocaleString("fr-FR") + " xp";
      const karaStr = totalKaras ? totalKaras.toLocaleString("fr-FR") + " Kara" : "—";

      content.innerHTML = `
        <div class="left">
          <img src="${rawGang.img}" alt="${rawGang.name}">
        </div>

        <div class="main">
          <div class="headerRow">
            <div class="badgeMax">Max</div>
            <h1 class="name">${rawGang.name}</h1>
          </div>

          <div class="xpRow">
            <div class="xpWrap">
              <div class="xpFill"></div>
              <div class="xpText">${xpStr}</div>
            </div>
          </div>

          <div class="cols">
            <div class="col-left">
              <div class="item"><span class="label">Membres :</span><span class="value">${membersResolved.length} / 50</span></div>
              <div class="item"><span class="label">Création :</span><span class="value">${rawGang.creation ?? "—"}</span></div>
              <div class="item"><span class="label">Rang :</span><span class="value">${rawGang.rang ?? "—"}</span></div>
              <div class="item"><span class="label">Recrutement :</span><span class="value">${rawGang.recrutement ?? "—"}</span></div>
            </div>

            <div class="col-right">
              <div class="item"><span class="label">Kara :</span><span class="value">${karaStr}</span></div>
              <div class="item"><span class="label">${rawGang.chefLabel ?? "Chef"} :</span><span class="value">${rawGang.chefValue ?? "—"}</span></div>
              <div class="item"><span class="label">Trophées :</span><span class="value">${rawGang.trophees ?? "—"}</span></div>
            </div>
          </div>
        </div>
      `;

      // liste membres triée XP
      const list = membersResolved.slice().sort((a,b)=> (b.xp||0) - (a.xp||0));
      members.innerHTML = list.map(m => `
        <div class="mCard" title="${m.nom}">
          <img src="${m.avatar}" alt="${m.nom}">
          ${m.nom}
          <div class="mXp">${(m.xp||0).toLocaleString("fr-FR")} xp</div>
          <div class="mXp">${(m.karas||0).toLocaleString("fr-FR")} Kara</div>
        </div>
      `).join("");
    });
  </script>
</body>
</html>
