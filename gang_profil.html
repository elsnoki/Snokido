<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Profil du gang</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    }

    .wrap{
      max-width:1180px;
      margin:26px auto 40px;
      padding:0 12px;
    }

    .panel{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      border:1px solid rgba(0,0,0,.10);
    }

    .titlebar{
      background:#3b3b3b;
      color:#fff;
      padding:14px 16px;
      font-size:22px;
      font-weight:900;
    }

    .content{
      display:flex;
      gap:16px;
      padding:16px;
      align-items:flex-start;
    }

    .left{
      width:290px;
      background:#f6f6f6;
      border:1px solid #d9d9d9;
      border-radius:12px;
      padding:12px;
    }

    .left img{
      width:100%;
      border-radius:10px;
      border:2px solid #bdbdbd;
      background:#eee;
      display:block;
    }

    .main{
      flex:1;
      min-width:0;
    }

    .headerRow{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }

    .badgeMax{
      width:46px;
      height:46px;
      border-radius:10px;
      display:grid;
      place-items:center;
      font-weight:900;
      background:linear-gradient(#ffd44d,#f0b300);
      border:2px solid rgba(0,0,0,.12);
      box-shadow:0 2px 0 rgba(0,0,0,.12);
      color:#111;
      flex:0 0 auto;
    }

    .name{
      font-size:28px;
      font-weight:900;
      margin:0;
      color:#000;
    }

    /* barre XP du gang : noms uniques pour éviter le conflit avec style.css */
    .gangXpRow{
      margin:8px 0 14px;
      width:100%;
    }

    .gangXpWrap{
      position:relative;
      display:block;
      width:100%;
      height:24px;
      border-radius:4px;
      overflow:hidden;
      background:#d2d2d2;
      border:1px solid #bdbdbd;
    }

    .gangXpFill{
      display:block;
      width:100%;
      height:100%;
      background:#8dac2a;
    }

    .gangXpText{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      color:#fff;
      text-shadow:0 1px 0 rgba(0,0,0,.35);
      font-size:13px;
      pointer-events:none;
    }

    .cols{
      display:flex;
      gap:14px;
      align-items:flex-start;
    }

    .col-left{
      flex:1.25;
      min-width:0;
    }

    .col-right{
      flex:0.75;
      min-width:0;
    }

    .item{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:15px;
      border-bottom:1px solid #e6e6e6;
      padding:12px 0;
    }

    .label{
      width:160px;
      flex:0 0 auto;
      color:#444;
    }

    .value{
      font-weight:900;
      color:#000;
      min-width:0;
    }

    .linkRow{
      margin-top:10px;
      font-size:14px;
      padding-top:10px;
    }

    .linkRow a{
      color:#2c6fb7;
      text-decoration:none;
      font-weight:900;
    }

    .linkRow a:hover{
      text-decoration:underline;
    }

    .membersBar{
      margin-top:14px;
      background:linear-gradient(#1e6f92,#114e6a);
      padding:16px;
      border-top:1px solid rgba(0,0,0,.12);
    }

    .membersTitle{
      color:#fff;
      font-weight:900;
      margin:0 0 12px 0;
      font-size:18px;
    }

    .membersGrid{
      display:grid;
      grid-template-columns:repeat(8, minmax(0,1fr));
      gap:12px;
    }

    .mCard{
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.15);
      border-radius:14px;
      padding:10px;
      text-align:center;
      color:#fff;
      font-weight:900;
      font-size:13px;
    }

    .mCard img{
      width:66px;
      height:66px;
      object-fit:cover;
      border-radius:14px;
      border:2px solid rgba(0,0,0,.25);
      background:#ddd;
      display:block;
      margin:0 auto 8px;
    }

    .mXp{
      margin-top:6px;
      font-weight:700;
      font-size:12px;
      opacity:.95;
    }

    .notice{
      padding:16px;
      font-weight:900;
      color:#222;
    }

    @media (max-width:1020px){
      .content{
        flex-direction:column;
      }

      .left{
        width:auto;
      }

      .main{
        min-width:auto;
      }

      .cols{
        flex-direction:column;
      }

      .col-left,
      .col-right{
        width:100%;
      }

      .membersGrid{
        grid-template-columns:repeat(4, minmax(0,1fr));
      }
    }

    @media (max-width:640px){
      .headerRow{
        align-items:flex-start;
      }

      .name{
        font-size:24px;
      }

      .item{
        flex-direction:column;
        align-items:flex-start;
        gap:4px;
      }

      .label{
        width:auto;
      }

      .membersGrid{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
    }
  </style>
</head>

<body>
  <script src="header.js"></script>

  <main class="wrap">
    <section class="panel">
      <div class="titlebar" id="pageTitle">Gang</div>

      <div class="notice">
        <a href="gang.html" style="color:#2c6fb7;text-decoration:none;font-weight:900;">← Classement des gangs</a>
      </div>

      <div class="content" id="content"></div>

      <div class="membersBar">
        <p class="membersTitle">Membres</p>
        <div class="membersGrid" id="members"></div>
      </div>
    </section>
  </main>

  <script>
    function slugify(s){
      return (s || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9]/g, "")
        .toLowerCase();
    }

    const params = new URLSearchParams(location.search);
    const gSlug = params.get("g");

    const gangs = JSON.parse(localStorage.getItem("gangsResolved") || "[]");
    const gang = gangs.find(x => slugify(x.name) === gSlug);

    const pageTitle = document.getElementById("pageTitle");
    const content = document.getElementById("content");
    const members = document.getElementById("members");

    if(!gang){
      pageTitle.textContent = "Gang introuvable";
      content.innerHTML = `
        <div class="notice">
          Ce profil ne peut pas se charger car les données ne sont pas encore calculées.<br>
          Ouvre d’abord <b>gang.html</b> puis reviens ici.
        </div>
      `;
      members.innerHTML = "";
    } else {
      pageTitle.textContent = "Gang : " + gang.name;

      const xpStr = (gang.totalXp || 0).toLocaleString("fr-FR") + " xp";
      const karaStr = (gang.totalKaras || 0)
        ? gang.totalKaras.toLocaleString("fr-FR") + " Kara"
        : "—";

      const leaderLabel = gang.chefLabel || "Chef du gang";
      const leaderValue = gang.chefValue || "—";

      content.innerHTML = `
        <div class="left">
          <img src="${gang.img}" alt="${gang.name}">
        </div>

        <div class="main">
          <div class="headerRow">
            <div class="badgeMax">Max</div>
            <h1 class="name">${gang.name}</h1>
          </div>

          <div class="gangXpRow">
            <div class="gangXpWrap">
              <div class="gangXpFill"></div>
              <div class="gangXpText">${xpStr}</div>
            </div>
          </div>

          <div class="cols">
            <div class="col-left">
              <div class="item"><span class="label">Classement :</span><span class="value">${gang.classement ?? "—"}</span></div>
              <div class="item"><span class="label">Membres :</span><span class="value">${gang.count} / 50</span></div>
              <div class="item"><span class="label">Rang :</span><span class="value">${gang.rang ?? "—"}</span></div>
              <div class="item"><span class="label">Création :</span><span class="value">${gang.creation ?? "—"}</span></div>
            </div>

            <div class="col-right">
              <div class="item"><span class="label">Kara :</span><span class="value">${karaStr}</span></div>
              <div class="item"><span class="label">${leaderLabel} :</span><span class="value">${leaderValue}</span></div>
              <div class="item"><span class="label">Recrutement :</span><span class="value">${gang.recrutement ?? "—"}</span></div>
              <div class="item"><span class="label">Trophées :</span><span class="value">${gang.trophees ?? "—"}</span></div>
            </div>
          </div>
        </div>
      `;

      const list = (gang.membersResolved || [])
        .slice()
        .sort((a, b) => (b.xp || 0) - (a.xp || 0));

      members.innerHTML = list.map(m => `
        <div class="mCard" title="${m.nom}">
          <img src="${m.avatar}" alt="${m.nom}">
          ${m.nom}
          <div class="mXp">${(m.xp || 0).toLocaleString("fr-FR")} xp</div>
          <div class="mXp">${(m.karas || 0).toLocaleString("fr-FR")} Kara</div>
        </div>
      `).join("");
    }
  </script>
</body>
</html>
