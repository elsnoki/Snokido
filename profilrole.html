<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Profil joueur</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a1f2e;
  color:#fff;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,.08);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(10px);
}

/* HEADER */
.header{
  display:flex;
  gap:20px;
  align-items:center;
}

.avatar{
  width:90px;
  border-radius:16px;
}

.name{
  font-size:26px;
  font-weight:900;
}

.role{
  margin-top:5px;
  opacity:.8;
}

/* SUCCESS */
.success{
  margin-top:30px;
}

.successGrid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.1);
  font-size:13px;
}

/* HOLO */
.holo{
  background:linear-gradient(45deg,#00f,#0ff,#f0f,#ff0);
  color:#000;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
  <div id="profile"></div>
</div>

<script src="success.js"></script>
<script src="gangdata.js"></script>

<script>

// ROLES (copié pour cohérence)
const ROLES = [
{xp:1200000,label:"💨 Tempête Apocalyptique"},
{xp:1000000,label:"⬛ Légende de Snokido"},
{xp:800000,label:"👺 Lucifer"},
{xp:700000,label:"🔱 Champion de l'exp"},
{xp:600000,label:"🦕 Warrior Extrême"},
{xp:500000,label:"🦖 Grand Colosse"},
{xp:400000,label:"🐉 Empereur"},
{xp:300000,label:"👽 Aventurier Tenace"},
{xp:250000,label:"💸 Guerrier Suprême"},
{xp:200000,label:"🛡 Samuraï Féroce"},
{xp:150000,label:"🗺 Conquérant"},
{xp:100000,label:"👿 Guerrier Ultime"},
{xp:50000,label:"🚬 Gangster"},
{xp:20000,label:"♠ Gangstar Confirmé"},
{xp:10000,label:"🥈 Sergent"},
{xp:0,label:"🥉 Recrue"}
];

function getRole(xp){
  for(let r of ROLES){
    if(xp >= r.xp) return r.label;
  }
  return "🥉 Recrue";
}

function slugify(s){
  return String(s||"")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9]/g,"")
    .toLowerCase();
}

// 🔥 succès prestigieux
function isPrestige(s){
  const p = [
    "Roi Suprême",
    "Imperator",
    "Tempest Nocturne",
    "Collectionneur d'Artefacts",
    "Crystal Rank",
    "Les Élus",
    "Multi·Kara"
  ];
  return p.some(x=>s.includes(x));
}

async function load(){

  const params = new URLSearchParams(location.search);
  const user = params.get("user");

  const res = await fetch("data/players_pages.json");
  const players = await res.json();

  const player = players.find(p =>
    slugify(p.nom) === slugify(user)
  );

  if(!player){
    document.getElementById("profile").innerHTML = "Profil introuvable 😢";
    return;
  }

  // 🔥 récupérer succès
  const success = window.SUCCESS[slugify(user)] || [];

  // 🔥 récupérer gang
  let gangName = "Aucun";
  let gangImg = "";

  window.gangsData.forEach(g=>{
    g.members.forEach(m=>{
      if(slugify(m.nom) === slugify(user)){
        gangName = g.name;
        gangImg = g.img;
      }
    });
  });

  document.getElementById("profile").innerHTML = `
    <div class="card">

      <div class="header">
        <img class="avatar" src="${player.avatar}">
        <div>
          <div class="name">${player.nom}</div>
          <div>${player.xp} XP</div>
          <div class="role">${getRole(player.xp)}</div>
          <div>${gangName} ${gangImg ? `<img src="${gangImg}" width="20">` : ""}</div>
        </div>
      </div>

      <div class="success">
        <h2>🏆 Succès</h2>

        <div class="successGrid">
          ${success.length ? success.map(s=>`
            <div class="badge ${isPrestige(s) ? "holo" : ""}">
              ${s}
            </div>
          `).join("") : "Aucun succès"}
        </div>

      </div>

    </div>
  `;
}

load();

</script>

</body>
</html>
