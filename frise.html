<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Frise — Chronologie</title>

  <link rel="stylesheet" href="style.css">

  <style>
    :root{
      --bg1:#0b3551;
      --bg2:#062638;
      --card:#ffffffcc;
      --cardSolid:#ffffff;
      --ink:#0f172a;
      --muted:#5b677a;
      --line1:#8dd7ff;
      --line2:#2a88ad;
      --line3:#114e6a;

      --shadow: 0 18px 45px rgba(0,0,0,.22);
      --shadow2: 0 10px 26px rgba(0,0,0,.14);

      --r12:12px;
      --r14:14px;
      --r16:16px;

      --border: rgba(15, 23, 42, .10);
      --border2: rgba(15, 23, 42, .14);

      --goodBg:#ecfff0;
      --goodBd:#bfe8c8;

      --badBg:#fff1f1;
      --badBd:#f2b3b3;

      --chipBg:#ffffff;
      --chipBd: rgba(15, 23, 42, .14);

      --accent:#64c7ff;
      --accent2:#2a88ad;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    }

    /* petit halo décoratif (soft) */
    body:before{
      content:"";
      position:fixed;
      inset:-20%;
      pointer-events:none;
      background:
        radial-gradient(420px 280px at 15% 10%, rgba(100,199,255,.22), transparent 60%),
        radial-gradient(520px 360px at 85% 20%, rgba(126,200,255,.16), transparent 62%),
        radial-gradient(640px 420px at 55% 85%, rgba(42,136,173,.18), transparent 66%);
      filter: blur(2px);
      z-index:0;
    }

    .wrap{
      position:relative;
      z-index:1;
      max-width:1180px;
      margin:28px auto 44px;
      padding:0 14px;
    }

    .panel{
      border-radius:18px;
      overflow:hidden;
      box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
    }

    /* Header */
    .titlebar{
      background: linear-gradient(135deg, rgba(17,78,106,.92), rgba(59,59,59,.92));
      color:#fff;
      padding:16px 18px;
      font-size:22px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      border-bottom:1px solid rgba(255,255,255,.12);
    }

    .titlebar > div:first-child{
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    /* petite pastille "status" */
    .titlebar > div:first-child:before{
      content:"";
      width:10px;
      height:10px;
      border-radius:999px;
      background: radial-gradient(circle at 30% 30%, #bff0ff, var(--accent2));
      box-shadow: 0 0 0 4px rgba(100,199,255,.12);
      display:inline-block;
    }

    .titlebar .links{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      font-size:14px;
      font-weight:800;
    }
    .titlebar .links a{
      color:#d7f2ff;
      text-decoration:none;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(215,242,255,.22);
      background: rgba(255,255,255,.06);
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }
    .titlebar .links a:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.12);
      border-color: rgba(215,242,255,.34);
    }

    /* Barème */
    .legend{
      padding:14px 18px 16px;
      border-bottom:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(8px);
    }
    .legend h2{
      margin:0 0 10px 0;
      font-size:15px;
      font-weight:900;
      color:#ffffff;
      letter-spacing:.2px;
    }
    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .chip{
      background: rgba(255,255,255,.92);
      border:1px solid rgba(15,23,42,.12);
      border-radius:999px;
      padding:8px 10px;
      font-weight:900;
      font-size:13px;
      box-shadow: 0 6px 16px rgba(0,0,0,.10);
      white-space:nowrap;
      display:flex;
      gap:6px;
      align-items:center;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .chip:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(0,0,0,.14);
    }
    .chip .pts{
      opacity:.9;
      font-weight:900;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(15,23,42,.12);
      background:#fff;
    }
    .chip.neg{
      background: rgba(255,241,241,.95);
      border-color: rgba(242,179,179,.70);
    }
    .chip.neg .pts{
      border-color: rgba(242,179,179,.75);
      background: rgba(255,255,255,.88);
    }

    .note{
      margin-top:10px;
      font-size:12px;
      color: rgba(255,255,255,.78);
    }

    /* Timeline */
    .timeline{
      position:relative;
      padding:18px;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(8px);
    }

    .line{
      position:absolute;
      left:34px;
      top:18px;
      bottom:18px;
      width:5px;
      border-radius:999px;
      background: linear-gradient(var(--line1), var(--line2), var(--line3));
      box-shadow: 0 0 0 6px rgba(100,199,255,.08);
      opacity:.95;
    }

    .year{
      position:relative;
      display:flex;
      gap:14px;
      margin: 0 0 18px 0;
      padding-left: 10px;
    }

    .dot{
      width:22px;
      height:22px;
      border-radius:999px;
      background:#ffffff;
      border:4px solid var(--accent2);
      box-shadow:0 10px 22px rgba(0,0,0,.22);
      flex:0 0 auto;
      margin-left: 18px;
      margin-top: 14px;
      position:relative;
    }
    .dot:after{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius:999px;
      background: radial-gradient(circle, rgba(100,199,255,.25), transparent 62%);
      z-index:-1;
    }

    .card{
      flex:1;
      background: rgba(255,255,255,.92);
      border:1px solid rgba(15,23,42,.12);
      border-radius:16px;
      overflow:hidden;
      box-shadow: var(--shadow2);
      transform: translateY(0);
      transition: transform .14s ease, box-shadow .14s ease;
    }
    .card:hover{
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(0,0,0,.18);
    }

    .cardHead{
      background: linear-gradient(180deg, rgba(248,250,252,.92), rgba(236,236,236,.92));
      border-bottom:1px solid rgba(15,23,42,.10);
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .yearTitle{
      font-size:20px;
      font-weight:1000;
      color:#0b1220;
      letter-spacing:.2px;
    }

    .totalPill{
      font-size:14px;
      font-weight:900;
      padding:8px 10px;
      border-radius:999px;
      background:#ffffff;
      border:1px solid rgba(15,23,42,.14);
      box-shadow:0 6px 16px rgba(0,0,0,.08);
      white-space:nowrap;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .totalPill b{ font-size:16px; }

    .events{
      padding: 10px 14px 12px;
      background: rgba(255,255,255,.90);
    }

    .event{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid rgba(15,23,42,.08);
      font-size:14px;
    }
    .event:last-child{ border-bottom:none; }

    .evtText{
      color:#0f172a;
      line-height:1.3;
    }

    .pts{
      flex:0 0 auto;
      font-weight:950;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--goodBd);
      background: var(--goodBg);
      white-space:nowrap;
      min-width: 70px;
      text-align:center;
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }
    .pts.neg{
      background: var(--badBg);
      border-color: var(--badBd);
    }

    /* Mobile */
    @media (max-width: 760px){
      .wrap{ margin:18px auto 28px; }
      .timeline{ padding:14px; }

      .line{ left:18px; top:14px; bottom:14px; }
      .dot{ margin-left: 2px; }
      .year{ padding-left: 0; }

      .titlebar{ font-size:20px; }
      .yearTitle{ font-size:18px; }
    }

    /* Accessibilité: animations réduites */
    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; scroll-behavior:auto !important; }
    }
  </style>
</head>

<body>
  <script src="header.js"></script>

  <!-- ✅ AJOUT : données partagées -->
  <script src="frise_data.js"></script>

  <main class="wrap">
    <section class="panel">
      <div class="titlebar">
        <div>Frise — Chronologie</div>
        <div class="links">
          <a href="annee.html">Classement des années</a>
          <span style="opacity:.6">•</span>
          <a href="annee2.html">XP par année (générations)</a>
        </div>
      </div>

      <div class="legend">
        <h2>Barème (points)</h2>
        <div class="chips" id="chips"></div>
        <div class="note">Les totaux par année sont calculés automatiquement à partir des événements listés.</div>
      </div>

      <div class="timeline">
        <div class="line"></div>
        <div id="years"></div>
      </div>
    </section>
  </main>

  <script>
    const bareme = [
      ["Inscription", 5],
      ["Gros duel", 6],
      ["Duel moyen", 4],
      ["Mini duel", 2],
      ["New premier", "1 → 6"],
      ["New génération", 4],
      ["Niveau 100", 5],
      ["100 000 / 200 000 / ...", 5],
      ["1M", 7],
      ["Gros bot", -4],
      ["Mini bot", -2],
      ["Suppression joueur", -3]
    ];

    // ✅ IMPORTANT : frise vient du fichier partagé
    const frise = Array.isArray(window.FRISE) ? window.FRISE : [];

    // Chips barème
    const chips = document.getElementById("chips");
    chips.innerHTML = bareme.map(([label,val]) => {
      const isNeg = (typeof val === "number" && val < 0);
      return `<div class="chip ${isNeg ? "neg":""}">${label}<span class="pts">(${val})</span></div>`;
    }).join("");

    function fmtPts(p){
      const sign = p > 0 ? "+" : "";
      return `${sign}${p}`;
    }

    const yearsEl = document.getElementById("years");
    yearsEl.innerHTML = "";

    frise.forEach(y=>{
      const total = (y.events || []).reduce((s,e)=> s + (Number(e.p)||0), 0);

      const eventsHtml = (y.events || []).map(e=>{
        const neg = (e.p < 0) ? "neg" : "";
        return `
          <div class="event">
            <div class="evtText">${e.t}</div>
            <div class="pts ${neg}">${fmtPts(e.p)}</div>
          </div>
        `;
      }).join("");

      yearsEl.insertAdjacentHTML("beforeend", `
        <div class="year">
          <div class="dot"></div>
          <div class="card">
            <div class="cardHead">
              <div class="yearTitle">${y.year}</div>
              <div class="totalPill">Total : <b>${total}</b> pts</div>
            </div>
            <div class="events">${eventsHtml}</div>
          </div>
        </div>
      `);
    });
  </script>
</body>
</html>
