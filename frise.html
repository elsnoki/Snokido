<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Frise — Chronologie</title>

  <!-- Ton CSS global -->
  <link rel="stylesheet" href="style.css">

  <style>
    :root{
      --bg1:#2a88ad;
      --bg2:#0b3551;
      --bg3:#062638;

      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line: rgba(15, 23, 42, .10);

      --accent:#66ccff;
      --gold:#ffd44d;
      --red:#ff3b3b;
      --green:#00ffaa;

      --shadow: 0 16px 44px rgba(0,0,0,.30);
      --shadow2: 0 10px 24px rgba(0,0,0,.18);
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: radial-gradient(1100px 600px at 25% 15%, var(--bg1) 0%, var(--bg2) 60%, var(--bg3) 100%);
      color:var(--text);
    }

    .wrap{
      max-width:1180px;
      margin:26px auto 40px;
      padding:0 12px;
    }

    .panel{
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      box-shadow: var(--shadow);
      border:1px solid rgba(255,255,255,.18);
    }

    .titlebar{
      background:#3b3b3b;
      color:#fff;
      padding:14px 16px;
      font-size:22px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .titlebar .links{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      font-size:14px;
    }
    .titlebar .links a{
      color:#bfe6ff;
      text-decoration:none;
      font-weight:900;
    }
    .titlebar .links a:hover{ text-decoration:underline; }

    /* ===== Barre d'outils (AJOUT, sans enlever ton titlebar) ===== */
    .toolbar{
      padding:12px 16px;
      background:#f6f6f6;
      border-bottom:1px solid #d9d9d9;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .ctrl{
      display:flex;
      align-items:center;
      gap:8px;
      background:#fff;
      border:1px solid rgba(0,0,0,.12);
      border-radius:12px;
      padding:8px 10px;
      color:#111;
      font-weight:900;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.05);
    }
    .ctrl input{
      border:0;
      outline:0;
      background:transparent;
      font-weight:900;
      width:240px;
    }
    .ctrl input::placeholder{ color:#7b7b7b; font-weight:900; }

    .ctrl select{
      border:0;
      outline:0;
      background:transparent;
      font-weight:900;
      cursor:pointer;
    }

    .btn{
      border:0;
      cursor:pointer;
      background:#3b3b3b;
      color:#fff;
      font-weight:900;
      padding:10px 12px;
      border-radius:12px;
      box-shadow: inset 0 -3px 0 rgba(255,255,255,.10);
    }
    .btn:hover{ background:#2f2f2f; }

    .meta{
      font-size:12px;
      color:#444;
      font-weight:900;
    }

    /* Barème */
    .legend{
      padding:14px 16px;
      border-bottom:1px solid #d9d9d9;
      background:#f6f6f6;
    }
    .legend h2{
      margin:0 0 10px 0;
      font-size:16px;
      font-weight:900;
      color:#333;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      background:#fff;
      border:1px solid #d2d2d2;
      border-radius:999px;
      padding:8px 10px;
      font-weight:900;
      font-size:13px;
      box-shadow:0 2px 0 rgba(0,0,0,.06);
      white-space:nowrap;
    }
    .chip .pts{ margin-left:6px; opacity:.85; }
    .chip.neg{ background:#fff2f2; border-color:#f0b0b0; }

    .note{
      margin-top:10px;
      font-size:12px;
      color:#666;
      font-weight:900;
    }

    /* Timeline */
    .timeline{
      position:relative;
      padding:16px;
      background:#fff;
    }

    .line{
      position:absolute;
      left:34px;
      top:16px;
      bottom:16px;
      width:4px;
      border-radius:999px;
      background: linear-gradient(var(--accent), #2a88ad, #114e6a);
      opacity:.95;
      box-shadow: 0 0 0 6px rgba(102,204,255,.10);
    }

    .year{
      position:relative;
      display:flex;
      gap:14px;
      margin: 0 0 18px 0;
      padding-left: 10px;
    }

    .dot{
      width:20px;
      height:20px;
      border-radius:999px;
      background:#fff;
      border:4px solid #2a88ad;
      box-shadow: 0 0 0 6px rgba(102,204,255,.12), 0 2px 0 rgba(0,0,0,.12);
      flex:0 0 auto;
      margin-left: 18px;
      margin-top: 14px;
    }

    .card{
      flex:1;
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      box-shadow: var(--shadow2);
    }

    .cardHead{
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      background: linear-gradient(rgba(102,204,255,.14), rgba(255,255,255,0));
      border-bottom:1px solid var(--line);
    }

    .yearTitle{
      font-size:20px;
      font-weight:900;
      color:#111827;
      display:flex;
      align-items:baseline;
      gap:10px;
      flex-wrap:wrap;
    }
    .yearTitle .small{
      font-size:12px;
      font-weight:900;
      color:var(--muted);
    }

    .rightBox{
      min-width: 260px;
    }

    .totalPill{
      font-size:13px;
      font-weight:900;
      padding:8px 10px;
      border-radius:999px;
      background:#ffffff;
      border:1px solid rgba(0,0,0,.12);
      box-shadow:0 2px 0 rgba(0,0,0,.06);
      white-space:nowrap;
      display:inline-block;
    }
    .totalPill b{ font-size:16px; }

    .bar{
      width:100%;
      height:10px;
      border-radius:999px;
      background: rgba(15,23,42,.08);
      border:1px solid rgba(15,23,42,.06);
      overflow:hidden;
      margin-top:10px;
    }
    .bar i{
      display:block;
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
    }

    .events{
      padding: 12px 14px 14px;
      background:#fff;
    }

    .event{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
      border-bottom:1px dashed rgba(15,23,42,.14);
      font-size:14px;
    }
    .event:last-child{ border-bottom:none; }

    .evtText{
      color:#111827;
      line-height:1.25;
      font-weight:800;
    }

    .pts{
      flex:0 0 auto;
      font-weight:900;
      padding:7px 10px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.12);
      background: rgba(0,255,170,.10);
      white-space:nowrap;
      min-width: 64px;
      text-align:center;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.06);
    }
    .pts.neg{
      background: rgba(255,59,59,.10);
      border-color: rgba(255,59,59,.35);
    }

    /* highlight meilleure année */
    .year.top .dot{
      border-color: var(--gold);
      box-shadow: 0 0 0 6px rgba(255,212,77,.16), 0 0 22px rgba(255,212,77,.35);
    }
    .year.top .totalPill{
      border-color: rgba(255,212,77,.65);
      box-shadow: 0 10px 18px rgba(255,212,77,.12);
    }

    .empty{
      padding:14px;
      border:1px solid var(--line);
      border-radius:14px;
      font-weight:900;
      color:#b00020;
      background:#fff;
    }

    @media (max-width: 760px){
      .line{ left:18px; }
      .dot{ margin-left: 2px; }
      .year{ padding-left: 0; }
      .ctrl input{ width:170px; }
      .rightBox{ min-width: 220px; }
    }
  </style>
</head>

    function fmtPts(p){
      const sign = p > 0 ? "+" : "";
      return `${sign}${p}`;
    }

    function compute(list){
      const out = list.map(y => {
        const total = (y.events || []).reduce((s,e)=> s + (Number(e.p)||0), 0);
        return { ...y, total, count: (y.events||[]).length };
      });

      for(const y of out){
        if(!best || y.total > best.total) best = y;
      }
      return { out, maxTotal, bestYear: best ? best.year : null };
    }

    function filterAndSort(out){
      const q = String(qEl?.value || "").trim().toLowerCase();

      let filtered = out.filter(y => {
        if(!q) return true;
        if(String(y.year).includes(q)) return true;
        return (y.events || []).some(e => String(e.t || "").toLowerCase().includes(q));
      });

      const mode = String(sortEl?.value || "chrono");
      if(mode === "total"){
        filtered = filtered.slice().sort((a,b)=> (b.total||0) - (a.total||0));
      }else{
        filtered = filtered.slice().sort((a,b)=> (a.year||0) - (b.year||0));
      }

      return filtered;
    }

    function render(){
      if(!yearsEl){
        if(metaEl) metaEl.textContent = "Erreur: élément #years introuvable";
        return;
      }

      const computed = compute(frise);
      const list = filterAndSort(computed.out);

      const q = String(qEl?.value || "").trim();
      if(metaEl){
        metaEl.textContent = q ? `${list.length} année(s) trouvée(s)` : `${list.length} année(s)`;
      }

      yearsEl.innerHTML = "";

      if(!list.length){
        yearsEl.innerHTML = `<div class="empty">Aucun résultat pour “${q}”.</div>`;
        return;
      }

      list.forEach(y=>{
        const total = y.total || 0;
        const pct = computed.maxTotal > 0 ? Math.round((total / computed.maxTotal) * 100) : 0;

        // si filtre, ne garder que les events match
        const qLower = String(qEl?.value || "").trim().toLowerCase();
        const evts = !qLower ? (y.events || []) : (y.events || []).filter(e => {
          if(String(y.year).includes(qLower)) return true;
          return String(e.t || "").toLowerCase().includes(qLower);
        });

        const eventsHtml = evts.map(e=>{
          const neg = (e.p < 0) ? "neg" : "";
          return `
            <div class="event">
              <div class="evtText">${e.t}</div>
              <div class="pts ${neg}">${fmtPts(e.p)}</div>
            </div>
          `;
        }).join("");

        const clsTop = (computed.bestYear != null && y.year === computed.bestYear) ? " top" : "";

        yearsEl.insertAdjacentHTML("beforeend", `
          <div class="year${clsTop}">
            <div class="dot"></div>
            <div class="card">
              <div class="cardHead">
                <div class="yearTitle">
                  ${y.year}
                  <span class="small">• ${y.count} événement(s)</span>
                </div>
                <div class="rightBox">
                  <div class="totalPill">Total : <b>${total}</b> pts</div>
                  <div class="bar"><i style="width:${pct}%;"></i></div>
                </div>
              </div>
              <div class="events">
                ${eventsHtml || `<div class="note">Aucun événement ne correspond au filtre.</div>`}
              </div>
            </div>
          </div>
        `);
      });
    }

    // Events (robustes -> pas de crash si un élément manque)
    if(clearEl){
      clearEl.addEventListener("click", () => {
        if(qEl) qEl.value = "";
        render();
      });
    }
    if(qEl) qEl.addEventListener("input", render);
    if(sortEl) sortEl.addEventListener("change", render);

    render();
  </script>
</body>
</html>
