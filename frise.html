<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Frise — Chronologie</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
      color:#222;
    }

    .wrap{
      max-width:1180px;
      margin:26px auto 40px;
      padding:0 12px;
    }

    .panel{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      border:1px solid rgba(0,0,0,.10);
    }

    .titlebar{
      background:#3b3b3b;
      color:#fff;
      padding:14px 16px;
      font-size:22px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .titlebar .links{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      font-size:14px;
    }
    .titlebar .links a{
      color:#bfe6ff;
      text-decoration:none;
      font-weight:900;
    }
    .titlebar .links a:hover{ text-decoration:underline; }

    /* Barème */
    .legend{
      padding:14px 16px;
      border-bottom:1px solid #d9d9d9;
      background:#f6f6f6;
    }
    .legend h2{
      margin:0 0 10px 0;
      font-size:16px;
      font-weight:900;
      color:#333;
    }
    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chip{
      background:#fff;
      border:1px solid #d2d2d2;
      border-radius:999px;
      padding:8px 10px;
      font-weight:900;
      font-size:13px;
      box-shadow:0 2px 0 rgba(0,0,0,.06);
      white-space:nowrap;
    }
    .chip .pts{ margin-left:6px; opacity:.85; }
    .chip.neg{ background:#fff2f2; border-color:#f0b0b0; }

    /* Timeline */
    .timeline{
      position:relative;
      padding:16px;
      background:#fff;
    }

    .line{
      position:absolute;
      left:34px;
      top:16px;
      bottom:16px;
      width:4px;
      border-radius:999px;
      background: linear-gradient(#7ec8ff, #2a88ad, #114e6a);
      opacity:.9;
    }

    .year{
      position:relative;
      display:flex;
      gap:14px;
      margin: 0 0 18px 0;
      padding-left: 10px;
    }

    .dot{
      width:20px;
      height:20px;
      border-radius:999px;
      background:#fff;
      border:4px solid #2a88ad;
      box-shadow:0 2px 0 rgba(0,0,0,.15);
      flex:0 0 auto;
      margin-left: 18px;
      margin-top: 12px;
    }

    .card{
      flex:1;
      background:#f9f9f9;
      border:1px solid #d9d9d9;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 6px 16px rgba(0,0,0,.10);
    }

    .cardHead{
      background:#ececec;
      border-bottom:1px solid #d9d9d9;
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .yearTitle{
      font-size:20px;
      font-weight:900;
      color:#222;
    }

    .totalPill{
      font-size:14px;
      font-weight:900;
      padding:8px 10px;
      border-radius:999px;
      background:#ffffff;
      border:1px solid #cfcfcf;
      box-shadow:0 2px 0 rgba(0,0,0,.06);
      white-space:nowrap;
    }

    .totalPill b{ font-size:16px; }

    .events{
      padding: 12px 14px;
      background:#fff;
    }

    .event{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid #ececec;
      font-size:14px;
    }
    .event:last-child{ border-bottom:none; }

    .evtText{
      color:#222;
      line-height:1.25;
    }

    .pts{
      flex:0 0 auto;
      font-weight:900;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid #d0d0d0;
      background:#f3fff1;
      white-space:nowrap;
      min-width: 64px;
      text-align:center;
    }
    .pts.neg{
      background:#fff1f1;
      border-color:#f0b0b0;
    }

    .note{
      margin-top:10px;
      font-size:12px;
      color:#666;
    }

    @media (max-width: 760px){
      .line{ left:18px; }
      .dot{ margin-left: 2px; }
      .year{ padding-left: 0; }
    }
  </style>
</head>

<body>
  <script src="header.js"></script>

  <!-- IMPORTANT : source partagée -->
  <script src="frise_data.js"></script>

  <main class="wrap">
    <section class="panel">
      <div class="titlebar">
        <div>Frise — Chronologie</div>
        <div class="links">
          <a href="annee.html">Classement des années</a>
          <span style="opacity:.6">•</span>
          <a href="annee2.html">XP par année (générations)</a>
        </div>
      </div>

      <div class="legend">
        <h2>Barème (points)</h2>
        <div class="chips" id="chips"></div>
        <div class="note">Les totaux par année sont calculés automatiquement à partir des événements listés.</div>
      </div>

      <div class="timeline">
        <div class="line"></div>
        <div id="years"></div>
      </div>
    </section>
  </main>

  <script>
    const bareme = [
      ["Inscription", 5],
      ["Gros duel", 6],
      ["Duel moyen", 4],
      ["Mini duel", 2],
      ["New premier", "1 → 6"],
      ["New génération", 4],
      ["Niveau 100", 5],
      ["100 000 / 200 000 / ...", 5],
      ["1M", 7],
      ["Gros bot", -4],
      ["Mini bot", -2],
      ["Suppression joueur", -3]
    ];

    // Utilise la source partagée
    const frise = window.FRISE || [];

    // Barème affiché en haut
    const chips = document.getElementById("chips");
    chips.innerHTML = bareme.map(([label,val]) => {
      const isNeg = (typeof val === "number" && val < 0);
      return `<div class="chip ${isNeg ? "neg":""}">${label}<span class="pts">(${val})</span></div>`;
    }).join("");

    function fmtPts(p){
      const sign = p > 0 ? "+" : "";
      return `${sign}${p}`;
    }

    const yearsEl = document.getElementById("years");
    yearsEl.innerHTML = "";

    frise.forEach(y=>{
      const total = (y.events || []).reduce((s,e)=> s + (Number(e.p)||0), 0);

      const eventsHtml = (y.events || []).map(e=>{
        const neg = (e.p < 0) ? "neg" : "";
        return `
          <div class="event">
            <div class="evtText">${e.t}</div>
            <div class="pts ${neg}">${fmtPts(e.p)}</div>
          </div>
        `;
      }).join("");

      yearsEl.insertAdjacentHTML("beforeend", `
        <div class="year">
          <div class="dot"></div>
          <div class="card">
            <div class="cardHead">
              <div class="yearTitle">${y.year}</div>
              <div class="totalPill">Total : <b>${total}</b> pts</div>
            </div>
            <div class="events">
              ${eventsHtml}
            </div>
          </div>
        </div>
      `);
    });
  </script>
</body>
</html>
