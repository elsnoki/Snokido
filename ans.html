<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement Annuel — XP gagnée</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>

  <style>
    body{ margin:0; font-family:Arial,sans-serif; background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%); }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{ background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.10); }
    .titlebar{ background:#3b3b3b; color:#fff; padding:14px 16px; font-size:22px; font-weight:900; }

    .subnav{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      padding:10px 16px;
      border-bottom:1px solid #e6e6e6;
      background:#f6f6f6;
    }
    .subnav-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:10px;
      font-weight:900;
      text-decoration:none;
      border:1px solid #d6d6d6;
      background:#fff;
      color:#333;
    }
    .subnav-btn:hover{ filter:brightness(.98); }
    .subnav-btn.is-active{
      border-color:#2c6fb7;
      color:#2c6fb7;
      box-shadow: inset 0 0 0 1px rgba(44,111,183,.25);
    }

    .sub{ padding:10px 16px; font-weight:900; color:#444; border-bottom:1px solid #e6e6e6; background:#fafafa; }
    .warn{ margin:12px 16px 0; padding:10px 12px; background:#fff3cd; border:1px solid #ffe69c; border-radius:10px; font-weight:900; color:#664d03; display:none; }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{ background:#fff; padding:14px 12px; text-align:left; font-size:15px; font-weight:900; border-bottom:1px solid #cfcfcf; }
    tbody td{ padding:18px 12px; border-bottom:1px solid #cfcfcf; vertical-align:middle; font-size:16px; }
    tbody tr:nth-child(odd){ background:#f2f2f2; }

    .rank{ width:70px; text-align:center; font-weight:900; font-size:26px; color:#444; }
    .avatarCell{ width:110px; text-align:center; }
    .frame{ width:64px; height:64px; margin:0 auto; background:#e9e9e9; border:1px solid #bdbdbd; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .frame img{ width:56px; height:56px; object-fit:cover; border:2px solid #8f8f8f; border-radius:10px; background:#ddd; display:block; }

    .name a{ color:#2c6fb7; font-weight:900; text-decoration:none; font-size:18px; }
    .center{ text-align:center; white-space:nowrap; font-weight:900; }
    .small{ font-weight:700; font-size:13px; color:#666; }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="titlebar">Classement Annuel — XP gagnée</div>

      <div class="subnav">
        <a class="subnav-btn" href="jour.html">🕛 Jour</a>
        <a class="subnav-btn" href="jour-veille.html">⏪ Hier</a>
        <a class="subnav-btn" href="hebdo.html">📅 Hebdo</a>
        <a class="subnav-btn" href="mensuel.html">🗓️ Mensuel</a>
        <a class="subnav-btn" href="mois-veille.html" id="btnPrevMonth">⏮️ —</a>

        <!-- ✅ AJOUT : année précédente (ans-veille) -->
        <a class="subnav-btn" href="ans-veille.html" id="btnPrevYear">📆 —</a>

        <a class="subnav-btn is-active" href="ans.html" id="btnYear">📆 —</a>
      </div>

      <div class="sub" id="rangeTxt">Chargement…</div>
      <div id="warn" class="warn"></div>

      <table>
        <thead>
          <tr>
            <th></th>
            <th></th>
            <th>Joueur</th>
            <th class="center">Δ XP (an)</th>
            <th class="center">XP actuel</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

<script>
  function warn(msg){
    const w = document.getElementById("warn");
    w.style.display = "block";
    w.textContent = msg;
  }

  /* ===== Labels auto nav : mois précédent + année courante + année précédente ===== */
  function setNavLabels(){
    const btnPrevMonth = document.getElementById("btnPrevMonth");
    const btnPrevYear = document.getElementById("btnPrevYear");
    const btnYear = document.getElementById("btnYear");

    const monthsFR = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

    const normalizeDay = (s) => {
      const str = String(s||"").trim();
      const m = str.match(/^(\d{4}-\d{2}-\d{2})(?:\.json)?$/);
      return m ? m[1] : null;
    };

    const fromIndexLatestDay = async () => {
      try{
        const res = await fetch("data/history_paris/index.json?t=" + Date.now(), { cache:"no-store" });
        if(!res.ok) throw new Error();
        const idx = await res.json();
        if(!Array.isArray(idx)) throw new Error();
        const days = idx.map(normalizeDay).filter(Boolean).sort();
        if(days.length === 0) throw new Error();
        return days[days.length-1];
      }catch{
        return null;
      }
    };

    (async () => {
      const latestDay = await fromIndexLatestDay();
      let y, m;
      if(latestDay){
        y = Number(latestDay.slice(0,4));
        m = Number(latestDay.slice(5,7));
      }else{
        const now = new Date();
        y = now.getFullYear();
        m = now.getMonth() + 1;
      }

      // ✅ année courante
      if(btnYear){
        btnYear.textContent = "📆 " + y;
        btnYear.title = "Classement annuel (" + y + ")";
      }

      // ✅ année précédente
      if(btnPrevYear){
        btnPrevYear.textContent = "📆 " + (y - 1);
        btnPrevYear.title = "Classement annuel (" + (y - 1) + ")";
      }

      // ✅ mois précédent (label auto)
      if(btnPrevMonth){
        let pm = m - 1;
        let py = y;
        if(pm <= 0){ pm = 12; py = y - 1; }
        btnPrevMonth.textContent = "⏮️ " + monthsFR[pm-1];
        btnPrevMonth.title = "Classement du mois précédent (" + monthsFR[pm-1] + " " + py + ")";
      }
    })();
  }
  document.addEventListener("DOMContentLoaded", setNavLabels);

  /* ===== Matching robuste ===== */
  function slugify(name){
    return String(name || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  function nameLower(p){
    return String(p?.nom || "").toLowerCase().trim();
  }

  function profileIdFromHref(href){
    if(!href) return null;
    try{
      const u = new URL(href, location.origin);
      const m = u.pathname.match(/\/player\/([^\/?#]+)/i);
      return m ? m[1].toLowerCase() : null;
    }catch{
      const m = String(href).match(/\/player\/([^\/?#]+)/i);
      return m ? m[1].toLowerCase() : null;
    }
  }

  function playerKeys(p){
    const keys = [];
    if(!p) return keys;

    const id = profileIdFromHref(p.profileHref);
    if(id) keys.push("id:" + id);

    const s = String(p.slug || "").toLowerCase().trim();
    if(s){
      keys.push("slug:" + s);
      keys.push("id:" + s);
    }

    const n1 = nameLower(p);
    if(n1) keys.push("n1:" + n1);

    const n2 = slugify(p.nom);
    if(n2) keys.push("n2:" + n2);

    return Array.from(new Set(keys));
  }

  async function fetchJson(path){
    const url = path + (path.includes("?") ? "&" : "?") + "t=" + Date.now();
    const res = await fetch(url, { cache: "no-store" });
    if(!res.ok) return null;
    try { return await res.json(); } catch { return null; }
  }

  function normalizeDay2(s){
    const str = String(s||"").trim();
    const m = str.match(/^(\d{4}-\d{2}-\d{2})(?:\.json)?$/);
    return m ? m[1] : null;
  }

  async function loadIndex(){
    const idx = await fetchJson("data/history_paris/index.json");
    if(!Array.isArray(idx)) return null;
    return idx.map(normalizeDay2).filter(Boolean).sort();
  }

  async function loadSnapPlayers(day){
    const snap = await fetchJson("data/history_paris/" + day + ".json");
    if(!snap) return null;
    if(Array.isArray(snap)) return snap;
    if(Array.isArray(snap.players)) return snap.players;
    return null;
  }

  async function loadCurrentPlayers(){
    const big = await fetchJson("data/players_pages.json");
    if(Array.isArray(big)) return big;
    if(big && Array.isArray(big.players)) return big.players;

    const top = await fetchJson("data/snokido_top50.json");
    if(Array.isArray(top)) return top;
    if(top && Array.isArray(top.players)) return top.players;

    return null;
  }

  function findClosestLE(index, targetDay){
    for(let i = index.length - 1; i >= 0; i--){
      if(index[i] <= targetDay) return index[i];
    }
    return null;
  }

  function formatSigned(n){
    const v = Number(n || 0);
    return (v >= 0 ? "+" : "") + v.toLocaleString("fr-FR");
  }

  function applyDxTieBreakPlus12Over500(rows){
    const byDx = new Map();
    for(const r of rows){
      const k = String(r.dx);
      if(!byDx.has(k)) byDx.set(k, []);
      byDx.get(k).push(r);
    }
    for(const [, group] of byDx){
      if(group.length <= 1){
        group[0].dxAdj = group[0].dx;
        continue;
      }
      const dxVal = Number(group[0].dx || 0);
      if(dxVal < 500){
        group.forEach(r => r.dxAdj = r.dx);
        continue;
      }
      const sorted = group.slice().sort((a,b)=> slugify(a.nom).localeCompare(slugify(b.nom)));
      const n = sorted.length;
      for(let i=0;i<n;i++){
        const bonus = 12 * (n - 1 - i);
        sorted[i].dxAdj = sorted[i].dx + bonus;
      }
    }
    for(const r of rows){
      if(typeof r.dxAdj !== "number") r.dxAdj = r.dx;
    }
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const tbody = document.getElementById("tbody");
    const rangeTxt = document.getElementById("rangeTxt");

    const current = await loadCurrentPlayers();
    if(!current){
      warn("Impossible de charger data/players_pages.json (ou top50).");
      return;
    }

    const index = await loadIndex();
    if(!index || index.length < 2){
      warn("Pas assez d'historique (data/history_paris).");
      return;
    }

    const latestDay = index[index.length - 1];
    const year = latestDay.slice(0,4);

    const monthTargets = [];
    for(let mo=1; mo<=12; mo++){
      const mm = String(mo).padStart(2,"0");
      monthTargets.push(`${year}-${mm}-01`);
    }

    const monthSnapDays = [];
    for(const t of monthTargets){
      const d = findClosestLE(index, t);
      if(d && d.slice(0,4) === year) monthSnapDays.push(d);
    }

    const uniqueMonthDays = Array.from(new Set(monthSnapDays)).sort();
    if(uniqueMonthDays.length === 0){
      warn("Aucun snapshot mensuel trouvé pour " + year + ".");
      return;
    }

    const monthSnaps = [];
    for(const day of uniqueMonthDays){
      const snap = await loadSnapPlayers(day);
      if(snap && snap.length) monthSnaps.push({ day, players: snap });
    }

    if(monthSnaps.length === 0){
      warn("Snapshots mensuels invalides / vides.");
      return;
    }

    rangeTxt.textContent =
      "Période : " + year + "-01-01 → live (année " + year + ") • Baseline = 1er snapshot mensuel dispo par joueur";

    const snapMaps = monthSnaps.map(s => {
      const m = new Map();
      for(const p of s.players){
        const xp0 = Number(p?.xp || 0);
        const keys = playerKeys(p);
        for(const k of keys){
          if(!m.has(k)) m.set(k, xp0);
        }
      }
      return { day: s.day, map: m };
    });

    let rows = [];
    let matched = 0;

    for(const p of current){
      const keys = playerKeys(p);
      if(!keys.length) continue;

      let bXp = null;
      let baseDayUsed = null;

      for(const sm of snapMaps){
        for(const k of keys){
          if(sm.map.has(k)){
            bXp = sm.map.get(k);
            baseDayUsed = sm.day;
            break;
          }
        }
        if(bXp != null) break;
      }

      if(bXp == null) continue;
      matched++;

      const curXp = Number(p.xp || 0);
      const dx = curXp - bXp;

      if(dx === 0) continue;

      rows.push({
        nom: p.nom,
        avatar: p.avatar,
        profileHref: p.profileHref || null,
        xp: curXp,
        dx: dx,
        dxAdj: null,
        baseDayUsed
      });
    }

    applyDxTieBreakPlus12Over500(rows);
    rows.sort((a,b)=> b.dxAdj - a.dxAdj);

    tbody.innerHTML = "";

    const shown = rows.slice(0, 50);

    for(let i=0;i<shown.length;i++){
      const r = shown[i];
      const link = r.profileHref ? r.profileHref : ("profil.html?mode=nv100&u=" + encodeURIComponent(slugify(r.nom)));
      const tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="rank">' + (i+1) + '</td>' +
        '<td class="avatarCell"><div class="frame"><img src="' + (r.avatar || "avatar/1.jpg") + '" alt="' + r.nom + '"></div></td>' +
        '<td class="name"><a target="_blank" rel="noopener" href="' + link + '">' + r.nom + '</a>' +
        '<div class="small">base: ' + (r.baseDayUsed || "—") + ' • ' + r.xp.toLocaleString("fr-FR") + ' XP</div></td>' +
        '<td class="center">' + formatSigned(r.dx) + '</td>' +
        '<td class="center">' + r.xp.toLocaleString("fr-FR") + '</td>';
      tbody.appendChild(tr);
    }

    if(shown.length === 0){
      warn("Aucun gain affiché. Debug: monthSnaps=" + monthSnaps.length + ", current=" + current.length + ", match=" + matched);
      tbody.innerHTML =
        '<tr><td colspan="5" style="padding:16px;font-weight:900;color:#666;">Personne n’a gagné d’XP sur la période.</td></tr>';
    }
  });
</script>
</body>
</html>
