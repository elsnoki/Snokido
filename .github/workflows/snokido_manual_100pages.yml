name: Snokido Manual Update (100 pages, gentle)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install cheerio

      - name: Run gentle scraper (100 pages)
        run: node scripts/scrape_snokido_100pages_gentle.mjs

      - name: Commit updated data
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          git add data/players_pages.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Manual Snokido update (100 pages)"
          git push
