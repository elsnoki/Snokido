name: Snokido Daily Snapshot (00:00 Paris - hiver)

on:
  workflow_dispatch:
  schedule:
    # Saison actuelle: Hiver (CET = UTC+1)
    # 00:00 Paris = 23:00 UTC (la veille)
    - cron: "0 23 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install cheerio

      - name: Run scraper (snapshot)
        run: node scripts/scrape_snokido_top50.mjs

      - name: Commit snapshot + top50
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          git add data/snokido_top50.json
          git add data/history_paris/index.json
          git add data/history_paris/*.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Daily snapshot (Paris 00:00 - hiver)"
          git push
