name: Snokido Daily Snapshot (23h59 Paris)

on:
  workflow_dispatch:

  schedule:
    # Hiver (UTC+1): 23:59->22:59 UTC
    - cron: "59 22 * 1,2,11,12 *"

    # Été (UTC+2): 23:59->21:59 UTC
    - cron: "59 21 * 3-10 *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install cheerio
        run: npm install cheerio

      - name: Run scraper (snapshot)
        run: node scripts/scrape_snokido_top50.mjs

      - name: Commit snapshot + top50
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          git add data/snokido_top50.json
          git add data/history_paris/index.json
          git add data/history_paris/*.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Daily snapshot (Paris 23h59)"
          git push
