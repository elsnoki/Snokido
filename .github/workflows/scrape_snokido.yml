name: Update Snokido (Top50 + period)

on:
  schedule:
    - cron: "59 22 * * *"   # 23:59 Europe/Paris ≈ 22:59 UTC (attention été/hiver)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm init -y
          npm i cheerio

      - name: Run scraper
        run: node scripts/scrape_snokido_top50.mjs

      - name: Validate output files
        run: |
          echo "=== LIST data ==="
          ls -la data || true
          echo "=== LIST data/period ==="
          ls -la data/period || true
          echo "=== LIST data/history_paris ==="
          ls -la data/history_paris || true
          echo "=== CHECK weekly ==="
          test -f data/period/weekly_current.json && head -n 20 data/period/weekly_current.json || (echo "missing weekly_current.json" && exit 1)
          echo "=== CHECK monthly ==="
          test -f data/period/monthly_current.json && head -n 20 data/period/monthly_current.json || (echo "missing monthly_current.json" && exit 1)
          echo "=== CHECK index ==="
          test -f data/history_paris/index.json && head -n 20 data/history_paris/index.json || (echo "missing index.json" && exit 1)

      - name: Commit and push if changed
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          git add \
            data/snokido_top50.json \
            data/history_paris/index.json \
            data/history_paris/*.json \
            data/period/weekly_current.json \
            data/period/monthly_current.json \
            data/debug_players.html \
            package.json package-lock.json || true

          git commit -m "Update Snokido top50 + period" || echo "No changes"
          git push
