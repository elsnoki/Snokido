name: Update Snokido Top50 + Period

on:
  workflow_dispatch: {}
  schedule:
    - cron: "10 0 * * *" # 1 fois/jour (UTC)

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          set -e
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm init -y
            npm i cheerio
          fi

      - name: Run scraper
        run: |
          set -e
          node scripts/scrape_snokido_top50.mjs

      - name: Debug files + git
        run: |
          set -e
          echo "=== data tree ==="
          find data -maxdepth 3 -type f -print || true
          echo "=== last_run.json ==="
          cat data/last_run.json || true
          echo "=== git status ==="
          git status --porcelain=v1 || true

      - name: Commit & push (if changed)
        run: |
          set -e
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Snokido top50 + period"
          git push origin "HEAD:$GITHUB_REF_NAME"
