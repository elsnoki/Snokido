name: Update Snokido Top50 + Period

on:
  schedule:
    - cron: "5 23 * * 0"   # Baseline weekly (≈ lundi 00:05 Paris en hiver)
    - cron: "59 22 * * 0"  # Update (≈ dimanche 23:59 Paris en hiver)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm init -y
          npm i cheerio

      - name: Run scraper
        run: node scripts/scrape_snokido_top50.mjs

      - name: Validate outputs
        run: |
          echo "=== data ==="
          ls -la data || true
          echo "=== data/period ==="
          ls -la data/period || true
          echo "=== data/history_paris ==="
          ls -la data/history_paris || true
          test -f data/snokido_top50.json
          test -f data/period/weekly_current.json
          test -f data/period/monthly_current.json
          test -f data/history_paris/index.json

      - name: Commit and push if changed
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          git add \
            data/snokido_top50.json \
            data/period/*.json \
            data/history_paris/index.json \
            data/history_paris/*.json \
            data/debug_players.html \
            package.json package-lock.json || true

          git commit -m "Update Snokido top50 + period" || echo "No changes"
          git push
