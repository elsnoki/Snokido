name: Snokido Snapshots (Paris calendar)

on:
  schedule:
    # ===== Dimanche 23:59 Paris (fin de semaine) =====
    - cron: "59 22 * * 0"  # hiver
    - cron: "59 21 * * 0"  # été

    # ===== Lundi 00:01 Paris (début de semaine) =====
    - cron: "1 23 * * 0"   # hiver (dim 23:01 UTC = lun 00:01 Paris)
    - cron: "1 22 * * 0"   # été   (dim 22:01 UTC = lun 00:01 Paris)

    # ===== 1er du mois 00:01 Paris (début de mois) =====
    - cron: "1 23 1 * *"   # hiver
    - cron: "1 22 1 * *"   # été

  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm init -y
          npm i cheerio

      - name: Run scraper
        run: node scripts/scrape_snokido_top50.mjs

      - name: Commit updated JSON + snapshots + leaderboard caches
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"
          git add data/snokido_top50.json data/history_paris data/period data/debug_players.html || true
          git commit -m "Snapshot (Paris) + period caches" || echo "No changes"
          git push || true
