name: Update Snokido Top 50

on:
  schedule:
    - cron: "0 3 1,16 * *"   # 03:00 UTC les 1 et 16 (≈ tous les 15 jours)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm init -y
          npm i cheerio

      - name: Run scraper
        run: node scripts/scrape_snokido_top50.mjs

      - name: Commit updated JSON (and debug if any)
        if: always()
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"
          git add data/snokido_top50.json data/debug_players.html || true
          git commit -m "Update Snokido top50" || echo "No changes"
          git push || true
