name: Weekly Snokido Top 50 (Sunday 23:59 Paris)

on:
  schedule:
    # Dimanche uniquement
    # 23:59 Paris en hiver (CET=UTC+1) => 22:59 UTC
    - cron: "59 22 * * 0"
    # 23:59 Paris en été (CEST=UTC+2) => 21:59 UTC
    - cron: "59 21 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm init -y
          npm i cheerio

      - name: Run scraper
        run: node scripts/scrape_snokido_top50.mjs

      - name: Commit updated JSON + snapshot + index
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"
          git add data/snokido_top50.json data/history_paris data/debug_players.html || true
          git commit -m "Weekly snapshot (Paris)" || echo "No changes"
          git push || true
