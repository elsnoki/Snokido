name: Weekly Snokido Top 50 (Sunday 23:59 Paris)

on:
  schedule:
    # Dimanche uniquement
    # 23:59 Paris en hiver (CET=UTC+1) => 22:59 UTC
    - cron: "59 22 * * 0"
    # 23:59 Paris en été (CEST=UTC+2) => 21:59 UTC
    - cron: "59 21 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: snokido-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm i cheerio --no-package-lock

      - name: Run scraper
        run: node scripts/scrape_snokido_top50.mjs

      - name: Commit & push (only if changes)
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          # Add files that should always be versioned
          git add data/snokido_top50.json data/history_paris

          # Add debug file only if it exists
          if [ -f data/debug_players.html ]; then
            git add data/debug_players.html
          fi

          # If nothing staged, do nothing
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Weekly snapshot (Paris)"
          git push
