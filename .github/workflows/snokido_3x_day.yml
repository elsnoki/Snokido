name: Snokido Update (3x/day Paris)

on:
  workflow_dispatch:

  schedule:
    # ===== Heure d'hiver (UTC+1) : Jan, Feb, Nov, Dec =====
    - cron: "0 7 * 1,2,11,12 *"     # 08:00 Paris
    - cron: "0 15 * 1,2,11,12 *"    # 16:00 Paris
    - cron: "59 22 * 1,2,11,12 *"   # 23:59 Paris

    # ===== Heure d'été (UTC+2) : Mar -> Oct =====
    - cron: "0 6 * 3-10 *"          # 08:00 Paris
    - cron: "0 14 * 3-10 *"         # 16:00 Paris
    - cron: "59 21 * 3-10 *"        # 23:59 Paris

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install cheerio
        run: npm install cheerio

      - name: Run scraper
        run: node scripts/scrape_snokido_top50.mjs

      - name: Commit snapshot + top50
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          git add data/snokido_top50.json
          git add data/history_paris/index.json
          git add data/history_paris/*.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Snokido update (Paris)"
          git push
