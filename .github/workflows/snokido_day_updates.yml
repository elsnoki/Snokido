name: Snokido Update (08h & 16h Paris) - No history

on:
  workflow_dispatch: {}

  schedule:
    # GitHub Actions = UTC
    # 07:00 UTC = 08:00 Paris (hiver) / 09:00 Paris (été)
    - cron: "0 7 * * *"

    # 15:00 UTC = 16:00 Paris (hiver) / 17:00 Paris (été)
    - cron: "0 15 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm init -y
          npm i cheerio

      - name: Run scraper (no history)
        run: node scripts/scrape_snokido_top50_top50only.mjs

      - name: Validate outputs
        run: |
          ls -la data || true
          test -f data/snokido_top50.json

      - name: Commit & push if changed
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          git add data/snokido_top50.json package.json package-lock.json || true

          git commit -m "Snokido update (no history)" || echo "No changes"
          git push
