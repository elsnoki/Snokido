name: Snokido Update (08h & 16h Paris) - No history

on:
  workflow_dispatch: {}

  schedule:
    # GitHub Actions = UTC
    - cron: "0 7 * * *"
    - cron: "0 15 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          if [ ! -f package.json ]; then npm init -y; fi
          npm i cheerio

      - name: Run scraper (no history)
        run: node scripts/scrape_snokido_top50_top50only.mjs

      - name: Validate outputs
        run: |
          echo "=== data dir ==="
          ls -la data || true
          echo "=== required files ==="
          test -f data/snokido_top50.json
          test -f data/players_pages.json

      - name: Commit & push if changed
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          # ✅ IMPORTANT: on publie AUSSI players_pages.json
          git add data/snokido_top50.json data/players_pages.json package.json package-lock.json || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Snokido update (no history)"
          git push
