name: Daily Snokido Snapshot (auto)

on:
  workflow_dispatch:

  schedule:
    # 23h30 Paris hiver (UTC+1)
    - cron: "30 22 * 1,2,11,12 *"

    # 23h30 Paris été (UTC+2)
    - cron: "30 21 * 3-10 *"

    # 00h01 Paris hiver (UTC+1)
    - cron: "1 23 * 1,2,11,12 *"

    # 00h01 Paris été (UTC+2)
    - cron: "1 22 * 3-10 *"

permissions:
  contents: write

concurrency:
  group: daily-snapshot
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify snapshot
        id: snapshot_check
        run: |
          TODAY_PARIS=$(TZ=Europe/Paris date +%F)

          echo "Paris date: $TODAY_PARIS"

          if [ -f "data/history_paris/$TODAY_PARIS.json" ]; then
            echo "run_scraper=false" >> $GITHUB_OUTPUT
            echo "Snapshot already exists."
          else
            echo "run_scraper=true" >> $GITHUB_OUTPUT
            echo "Snapshot missing."
          fi

      - name: Setup Node
        if: steps.snapshot_check.outputs.run_scraper == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install cheerio
        if: steps.snapshot_check.outputs.run_scraper == 'true'
        run: npm install cheerio

      - name: Run scraper
        if: steps.snapshot_check.outputs.run_scraper == 'true'
        run: node scripts/scrape_snokido_top50.mjs

      - name: Commit changes
        if: steps.snapshot_check.outputs.run_scraper == 'true'
        run: |
          git config user.name "snokiki-bot"
          git config user.email "snokiki-bot@users.noreply.github.com"

          git add data/history_paris/*.json
          git add data/history_paris/index.json
          git add data/snokido_top50.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Daily snapshot (auto)"
          git push
