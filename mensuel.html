<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement Mensuel — XP gagnée</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>

  <style>
    body{ margin:0; font-family:Arial,sans-serif; background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%); }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{ background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.10); }
    .titlebar{ background:#3b3b3b; color:#fff; padding:14px 16px; font-size:22px; font-weight:900; }
    .sub{ padding:10px 16px; font-weight:900; color:#444; border-bottom:1px solid #e6e6e6; background:#fafafa; }
    .warn{ margin:12px 16px 0; padding:10px 12px; background:#fff3cd; border:1px solid #ffe69c; border-radius:10px; font-weight:900; color:#664d03; display:none; }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{ background:#fff; padding:14px 12px; text-align:left; font-size:15px; font-weight:900; border-bottom:1px solid #cfcfcf; }
    tbody td{ padding:18px 12px; border-bottom:1px solid #cfcfcf; vertical-align:middle; font-size:16px; }
    tbody tr:nth-child(odd){ background:#f2f2f2; }

    .rank{ width:70px; text-align:center; font-weight:900; font-size:26px; color:#444; }
    .deltaRank{ width:110px; text-align:center; font-weight:900; }
    .arrowUp{ color:#1f8f2e; }
    .arrowDown{ color:#c31919; }
    .arrowFlat{ color:#666; }

    .avatarCell{ width:110px; text-align:center; }
    .frame{ width:64px; height:64px; margin:0 auto; background:#e9e9e9; border:1px solid #bdbdbd; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .frame img{ width:56px; height:56px; object-fit:cover; border:2px solid #8f8f8f; border-radius:10px; background:#ddd; display:block; }

    .name a{ color:#2c6fb7; font-weight:900; text-decoration:none; font-size:18px; }
    .center{ text-align:center; white-space:nowrap; font-weight:900; }
    .small{ font-weight:700; font-size:13px; color:#666; }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="titlebar">Classement Mensuel — XP gagnée</div>
      <div class="sub" id="rangeTxt">Chargement…</div>
      <div id="warn" class="warn"></div>

      <table>
        <thead>
          <tr>
            <th></th>
            <th class="center">Δ Rang</th>
            <th></th>
            <th>Joueur</th>
            <th class="center">Δ XP (mois)</th>
            <th class="center">Δ Niveaux (théorique)</th>
            <th class="center">XP actuel</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

<script>
  const XP_AT_100 = 49500;
  const A1 = 1290;
  const R = 0.0006792294619366293;

  function levelsBeyond100FromXp(xpExtra){
    if(xpExtra <= 0) return 0;
    const x = (xpExtra * R / A1) + 1;
    if(x <= 1) return 0;
    const n = Math.log(x) / Math.log(1 + R);
    return Math.max(0, Math.floor(n));
  }
  function xpToTheoreticalLevel(xp, fallbackLevel){
    const xpNum = Number(xp || 0);
    if(xpNum <= XP_AT_100){
      return (typeof fallbackLevel === "number" && fallbackLevel > 0) ? fallbackLevel : 100;
    }
    return 100 + levelsBeyond100FromXp(xpNum - XP_AT_100);
  }

  function warn(msg){
    const w = document.getElementById("warn");
    w.style.display = "block";
    w.textContent = msg;
  }

  function slugify(name){
    return String(name || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  async function fetchJson(path){
    const res = await fetch(path, { cache:"no-store" });
    if(!res.ok) return null;
    try{ return await res.json(); } catch { return null; }
  }

  async function loadCurrentPlayers(){
    const big = await fetchJson("data/players_pages.json");
    if(Array.isArray(big)) return big;

    const top = await fetchJson("data/snokido_top50.json");
    if(Array.isArray(top)) return top;

    return null;
  }

  async function loadIndex(){
    const idx = await fetchJson("data/history_paris/index.json");
    if(!Array.isArray(idx)) return null;
    return idx
      .filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d))
      .filter(d => d !== "YYYY-MM-DD")
      .sort();
  }

  async function loadSnapPlayers(day){
    const snap = await fetchJson(`data/history_paris/${day}.json`);
    if(!snap) return null;
    if(Array.isArray(snap)) return snap;
    if(Array.isArray(snap.players)) return snap.players;
    return null;
  }

  function toUTCDate(dayStr){
    const [y,m,d] = dayStr.split("-").map(Number);
    return new Date(Date.UTC(y, m-1, d));
  }
  function fromUTCDate(dt){
    const yy = dt.getUTCFullYear();
    const mm = String(dt.getUTCMonth()+1).padStart(2,"0");
    const dd = String(dt.getUTCDate()).padStart(2,"0");
    return `${yy}-${mm}-${dd}`;
  }
  function dayMinus(dayStr, delta){
    const d = toUTCDate(dayStr);
    d.setUTCDate(d.getUTCDate() - delta);
    return fromUTCDate(d);
  }

  function firstOfMonth(dayStr){
    const d = toUTCDate(dayStr);
    d.setUTCDate(1);
    return fromUTCDate(d);
  }

  function findClosestLE(index, targetDay){
    for(let i = index.length - 1; i >= 0; i--){
      if(index[i] <= targetDay) return index[i];
    }
    return null;
  }

  function applyDxTieBreak(rows){
    const byDx = new Map();
    for(const r of rows){
      const k = String(r.dx);
      if(!byDx.has(k)) byDx.set(k, []);
      byDx.get(k).push(r);
    }

    for(const [dxKey, group] of byDx){
      if(group.length <= 1) continue;

      const names = group.map(x => slugify(x.nom));
      const onlySpecialPair =
        group.length === 2 &&
        names.includes("betelgeuse") &&
        names.includes("aldebaran");

      if(onlySpecialPair){
        group.forEach(r => r.dxAdj = r.dx);
        continue;
      }

      group
        .slice()
        .sort((a,b)=> slugify(a.nom).localeCompare(slugify(b.nom)))
        .forEach((r, idx) => {
          r.dxAdj = r.dx - (idx * 78);
        });
    }

    for(const r of rows){
      if(typeof r.dxAdj !== "number") r.dxAdj = r.dx;
    }
  }

  function buildArrowCell(delta){
    if(delta == null) return `<span class="arrowFlat">—</span>`;
    if(delta > 0) return `<span class="arrowUp">▲ ${delta}</span>`;
    if(delta < 0) return `<span class="arrowDown">▼ ${Math.abs(delta)}</span>`;
    return `<span class="arrowFlat">=</span>`;
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const tbody = document.getElementById("tbody");
    const rangeTxt = document.getElementById("rangeTxt");

    const current = await loadCurrentPlayers();
    if(!current){
      warn("Impossible de charger data/players_pages.json ou data/snokido_top50.json.");
      return;
    }

    const index = await loadIndex();
    if(!index || index.length < 2){
      warn("Pas assez d'historique (history_paris).");
      return;
    }

    const today = index[index.length - 1]; // dernier snapshot
    const baseTarget = firstOfMonth(today);
    const baseDay = findClosestLE(index, baseTarget);

    if(!baseDay){
      warn("Baseline mensuelle (1er du mois) introuvable.");
      return;
    }

    const baseline = await loadSnapPlayers(baseDay);
    if(!baseline){
      warn("Snapshot baseline introuvable.");
      return;
    }

    rangeTxt.textContent = `Période : ${baseDay} → live`;

    // Δrang: on compare avec le mois précédent si possible
    // on prend une date ~30 jours avant le 1er
    const prevBaseTarget = dayMinus(baseDay, 31);
    const prevBaseDay = findClosestLE(index, prevBaseTarget);
    let prevRankMap = null;

    if(prevBaseDay){
      const prevBaseline = await loadSnapPlayers(prevBaseDay);
      if(prevBaseline){
        const curMapForPrev = new Map(baseline.map(p => [slugify(p.nom), p]));
        const oldMapForPrev = new Map(prevBaseline.map(p => [slugify(p.nom), p]));

        const prevRows = [];
        for(const [k, mid] of curMapForPrev){
          const older = oldMapForPrev.get(k);
          const midXp = Number(mid?.xp||0);
          const olderXp = Number(older?.xp||0);
          prevRows.push({ nom: mid.nom, dx: midXp - olderXp, dxAdj: null });
        }
        applyDxTieBreak(prevRows);
        prevRows.sort((a,b)=> b.dxAdj - a.dxAdj);
        prevRankMap = new Map(prevRows.map((r,i)=> [slugify(r.nom), i+1]));
      }
    }

    const baseMap = new Map(baseline.map(p => [slugify(p.nom), p]));
    const rows = [];

    for(const p of current){
      const key = slugify(p.nom);
      const b = baseMap.get(key);
      if(!b) continue;

      const curXp = Number(p.xp||0);
      const baseXp = Number(b.xp||0);

      const lvlNow = xpToTheoreticalLevel(curXp, (typeof p.niveau === "number" ? p.niveau : null));
      const lvlBase = xpToTheoreticalLevel(baseXp, (typeof b.niveau === "number" ? b.niveau : null));

      rows.push({
        nom: p.nom,
        avatar: p.avatar,
        xp: curXp,
        dx: curXp - baseXp,
        dxAdj: null,
        dLvl: (lvlNow - lvlBase)
      });
    }

    rows = rows.filter(r => Number(r.dx) !== 0);
    applyDxTieBreak(rows);
    rows.sort((a,b)=> b.dxAdj - a.dxAdj);

    tbody.innerHTML = "";
    rows.slice(0, 200).forEach((r,i)=>{
      const curRank = i+1;
      const prevRank = prevRankMap ? prevRankMap.get(slugify(r.nom)) : null;
      const deltaRank = (prevRank != null) ? (prevRank - curRank) : null;

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank">${curRank}</td>
        <td class="deltaRank">${buildArrowCell(deltaRank)}</td>
        <td class="avatarCell"><div class="frame"><img src="${r.avatar || "avatar/1.jpg"}" alt="${r.nom}"></div></td>
        <td class="name">
          <a href="profil.html?mode=nv100&u=${encodeURIComponent(slugify(r.nom))}">${r.nom}</a>
          <div class="small">${r.xp.toLocaleString("fr-FR")} XP</div>
        </td>
        <td class="center">${(r.dxAdj>=0?"+":"") + r.dxAdj.toLocaleString("fr-FR")}</td>
        <td class="center">${(r.dLvl>=0?"+":"") + r.dLvl.toLocaleString("fr-FR")}</td>
        <td class="center">${r.xp.toLocaleString("fr-FR")}</td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>
</body>
</html>
