<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement Mensuel — XP gagnée</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>

  <style>
    body{ margin:0; font-family:Arial,sans-serif; background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%); }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{ background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.10); }
    .titlebar{ background:#3b3b3b; color:#fff; padding:14px 16px; font-size:22px; font-weight:900; }
    .sub{ padding:10px 16px; font-weight:900; color:#444; border-bottom:1px solid #e6e6e6; background:#fafafa; }
    .warn{ margin:12px 16px 0; padding:10px 12px; background:#fff3cd; border:1px solid #ffe69c; border-radius:10px; font-weight:900; color:#664d03; display:none; }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{ background:#fff; padding:14px 12px; text-align:left; font-size:15px; font-weight:900; border-bottom:1px solid #cfcfcf; }
    tbody td{ padding:18px 12px; border-bottom:1px solid #cfcfcf; vertical-align:middle; font-size:16px; }
    tbody tr:nth-child(odd){ background:#f2f2f2; }

    .rank{ width:70px; text-align:center; font-weight:900; font-size:26px; color:#444; }
    .deltaRank{ width:110px; text-align:center; font-weight:900; }
    .arrowUp{ color:#1f8f2e; }
    .arrowDown{ color:#c31919; }
    .arrowFlat{ color:#666; }

    .avatarCell{ width:110px; text-align:center; }
    .frame{ width:64px; height:64px; margin:0 auto; background:#e9e9e9; border:1px solid #bdbdbd; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .frame img{ width:56px; height:56px; object-fit:cover; border:2px solid #8f8f8f; border-radius:10px; background:#ddd; display:block; }

    .name a{ color:#2c6fb7; font-weight:900; text-decoration:none; font-size:18px; }
    .center{ text-align:center; white-space:nowrap; font-weight:900; }
    .small{ font-weight:700; font-size:13px; color:#666; }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="titlebar">Classement Mensuel — XP gagnée</div>
      <div class="sub" id="rangeTxt">Chargement…</div>
      <div id="warn" class="warn"></div>

      <table>
        <thead>
          <tr>
            <th></th>
            <th class="center">Δ Rang</th>
            <th></th>
            <th>Joueur</th>
            <th class="center">Δ XP</th>
            <th class="center">Δ Niveaux (théorique)</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

<script>
  function warn(msg){
    const w = document.getElementById("warn");
    w.style.display = "block";
    w.textContent = msg;
  }

  function fmt(n){ return Number(n||0).toLocaleString("fr-FR"); }
  function fmtSigned(n){
    const v = Number(n || 0);
    return (v >= 0 ? "+" : "") + v.toLocaleString("fr-FR");
  }

  function arrow(dPlace){
    // dPlace = oldRank - nowRank => + = monte, - = descend
    if (typeof dPlace !== "number") return `<span class="arrowFlat">—</span>`;
    if (dPlace > 0) return `<span class="arrowUp">▲ ${dPlace}</span>`;
    if (dPlace < 0) return `<span class="arrowDown">▼ ${Math.abs(dPlace)}</span>`;
    return `<span class="arrowFlat">=</span>`;
  }

  async function loadMonthly(){
    const res = await fetch("data/period/monthly_current.json", { cache:"no-store" });
    if(!res.ok) throw new Error("monthly_current.json introuvable");
    return await res.json();
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const tbody = document.getElementById("tbody");
    const rangeTxt = document.getElementById("rangeTxt");

    let data;
    try{
      data = await loadMonthly();
    }catch(e){
      warn("Impossible de charger data/period/monthly_current.json. Lance le workflow.");
      return;
    }

    rangeTxt.textContent = `Période : ${data.baselineDate || "—"} → ${data.asOfDate || "—"}`;

    if(!data || !Array.isArray(data.rows) || !data.rows.length){
      tbody.innerHTML = `<tr><td colspan="6" style="padding:16px;font-weight:900">Aucune donnée.</td></tr>`;
      return;
    }

    tbody.innerHTML = "";
    data.rows.forEach((r, i) => {
      const curRank = r.rank ?? (i+1);
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank">${curRank}</td>
        <td class="deltaRank">${arrow(r.dPlace)}</td>
        <td class="avatarCell"><div class="frame"><img src="${r.avatar || "avatar/1.jpg"}" alt="${r.nom || ""}"></div></td>
        <td class="name">
          ${r.profileHref
            ? `<a target="_blank" rel="noopener" href="${r.profileHref}">${r.nom || "—"}</a>`
            : `<span style="font-weight:900">${r.nom || "—"}</span>`
          }
          <div class="small">Classement mensuel</div>
        </td>
        <td class="center">${fmtSigned(r.dxp)}</td>
        <td class="center">${fmtSigned(r.dLvl)}</td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>
</body>
</html>
