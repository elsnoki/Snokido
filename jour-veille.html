<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XP total — Jour d’avant</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>

  <style>
    body{
      margin:0;
      background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
      font-family: Arial, sans-serif;
    }
    .box{
      width: 900px;
      max-width: calc(100% - 24px);
      margin: 40px auto;
      background:#fff;
      border-radius:8px;
      overflow:hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }
    .title{
      background:#3a3a3a;
      color:#fff;
      padding:14px 18px;
      font-size:20px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .subtitle{
      font-size:13px;
      font-weight:700;
      opacity:.9;
    }
    .subnav{
      display:flex;
      gap:10px;
      padding:12px 18px;
      border-bottom:1px solid #e5e5e5;
      background:#fafafa;
      flex-wrap:wrap;
    }
    .subnav-btn{
      display:inline-block;
      padding:8px 10px;
      border-radius:10px;
      text-decoration:none;
      color:#1f4f7a;
      background:#eaf3ff;
      border:1px solid rgba(0,0,0,.08);
      font-weight:700;
      font-size:13px;
    }
    .warn{
      margin:12px 18px 0;
      padding:10px 12px;
      background:#fff3cd;
      border:1px solid #ffe69c;
      border-radius:10px;
      font-weight:900;
      color:#664d03;
      display:none;
    }
    .content{
      padding:22px 18px 26px;
    }
    .big{
      font-size:44px;
      font-weight:900;
      letter-spacing:.2px;
      color:#111;
      margin: 10px 0 6px;
    }
    .meta{
      color:#555;
      font-size:14px;
      font-weight:700;
    }
    .small{
      margin-top:14px;
      font-size:13px;
      color:#666;
      line-height:1.35;
    }
    .pill{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-weight:900;
      font-size:12px;
      border:1px solid rgba(0,0,0,.12);
      background:#f2f2f2;
      white-space:nowrap;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="title">
      <div>
        XP total — Jour d’avant
        <div class="subtitle">Somme des XP du snapshot précédent</div>
      </div>
      <div class="pill" id="datePill">…</div>
    </div>

    <div class="subnav">
      <a class="subnav-btn" href="jour.html">🕛 Jour</a>
      <a class="subnav-btn" href="jour-veille.html">⏪ Jour d’avant</a>
      <a class="subnav-btn" href="hebdo.html">📅 Hebdo</a>
      <a class="subnav-btn" href="mensuel.html">🗓️ Mensuel</a>
      <a class="subnav-btn" href="niveauhtml">📊 Niveau théorique</a>
    </div>

    <div id="warn" class="warn"></div>

    <div class="content">
      <div class="meta" id="meta">Chargement…</div>
      <div class="big" id="xpTotal">—</div>
      <div class="small">
        Cette page utilise l’avant-dernière date listée dans
        <code>data/history_paris/index.json</code>.
      </div>
    </div>
  </div>

<script>
  function warn(msg){
    const w = document.getElementById("warn");
    w.style.display = "block";
    w.textContent = msg;
  }

  async function fetchJson(url){
    const res = await fetch(url, { cache: "no-store" });
    if(!res.ok) throw new Error(url + " HTTP " + res.status);
    return res.json();
  }

  function isDateString(s){
    return /^\d{4}-\d{2}-\d{2}$/.test(String(s));
  }

  function sumXpFromSnapshot(data){
    if(Array.isArray(data)){
      return data.reduce((acc, p) => acc + (Number(p?.xp) || 0), 0);
    }

    const arr =
      (Array.isArray(data?.players) && data.players) ||
      (Array.isArray(data?.top50) && data.top50) ||
      (Array.isArray(data?.data) && data.data) ||
      null;

    if(arr){
      return arr.reduce((acc, p) => acc + (Number(p?.xp) || 0), 0);
    }

    return 0;
  }

  async function main(){
    const xpEl = document.getElementById("xpTotal");
    const metaEl = document.getElementById("meta");
    const pillEl = document.getElementById("datePill");

    let index;
    try{
      index = await fetchJson("data/history_paris/index.json");
    }catch(e){
      warn("Impossible de charger index.json : " + e.message);
      metaEl.textContent = "Erreur.";
      return;
    }

    if(!Array.isArray(index)){
      warn("index.json n'est pas un tableau.");
      metaEl.textContent = "Format invalide.";
      return;
    }

    const dates = index.filter(isDateString).sort();

    if(dates.length < 2){
      warn("Pas assez de dates dans index.json.");
      metaEl.textContent = "Données insuffisantes.";
      return;
    }

    const prevDate = dates[dates.length - 2];
    const prevUrl = `data/history_paris/${prevDate}.json`;

    pillEl.textContent = prevDate;

    let snapshot;
    try{
      snapshot = await fetchJson(prevUrl);
    }catch(e){
      warn("Impossible de charger " + prevUrl + " : " + e.message);
      metaEl.textContent = "Erreur snapshot.";
      return;
    }

    const totalXp = sumXpFromSnapshot(snapshot);

    metaEl.textContent = "Snapshot : " + prevDate;
    xpEl.textContent = totalXp.toLocaleString("fr-FR") + " XP";
  }

  window.addEventListener("DOMContentLoaded", main);
</script>

</body>
</html>
