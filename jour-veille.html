<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XP total — Jour d’avant</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>

  <style>
    body{
      margin:0;
      background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
      font-family: Arial, sans-serif;
    }
    .box{
      width: 900px;
      max-width: calc(100% - 24px);
      margin: 40px auto;
      background:#fff;
      border-radius:8px;
      overflow:hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }
    .title{
      background:#3a3a3a;
      color:#fff;
      padding:14px 18px;
      font-size:20px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .subtitle{
      font-size:13px;
      font-weight:700;
      opacity:.9;
    }
    .subnav{
      display:flex;
      gap:10px;
      padding:12px 18px;
      border-bottom:1px solid #e5e5e5;
      background:#fafafa;
      flex-wrap:wrap;
    }
    .subnav-btn{
      display:inline-block;
      padding:8px 10px;
      border-radius:10px;
      text-decoration:none;
      color:#1f4f7a;
      background:#eaf3ff;
      border:1px solid rgba(0,0,0,.08);
      font-weight:700;
      font-size:13px;
    }
    .warn{
      margin:12px 18px 0;
      padding:10px 12px;
      background:#fff3cd;
      border:1px solid #ffe69c;
      border-radius:10px;
      font-weight:900;
      color:#664d03;
      display:none;
    }
    .content{
      padding:22px 18px 26px;
    }
    .big{
      font-size:44px;
      font-weight:900;
      letter-spacing:.2px;
      color:#111;
      margin: 10px 0 6px;
    }
    .meta{
      color:#555;
      font-size:14px;
      font-weight:700;
    }
    .small{
      margin-top:14px;
      font-size:13px;
      color:#666;
      line-height:1.35;
    }
    .pill{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-weight:900;
      font-size:12px;
      border:1px solid rgba(0,0,0,.12);
      background:#f2f2f2;
      white-space:nowrap;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="title">
      <div>
        XP total — Jour d’avant
        <div class="subtitle">Somme des XP du snapshot précédent</div>
      </div>
      <div class="pill" id="datePill">…</div>
    </div>

    <div class="subnav">
      <a class="subnav-btn" href="jour.html">🕛 Jour (delta)</a>
      <a class="subnav-btn" href="jour-veille.html">⏪ Jour d’avant (total)</a>
      <a class="subnav-btn" href="hebdo.html">📅 Hebdo</a>
      <a class="subnav-btn" href="mensuel.html">🗓️ Mensuel</a>
    </div>

    <div id="warn" class="warn"></div>

    <div class="content">
      <div class="meta" id="meta">Chargement…</div>
      <div class="big" id="xpTotal">—</div>
      <div class="small">
        Astuce : cette page prend l’<b>avant-dernier</b> fichier listé dans
        <code>data/history_paris/index.json</code> (donc “le jour d’avant” par rapport au dernier snapshot dispo).
      </div>
    </div>
  </div>

  <script>
    function warn(msg){
      const w = document.getElementById("warn");
      w.style.display = "block";
      w.textContent = msg;
    }

    function extractDateFromFilename(s){
      // attend un truc du style "2026-02-25.json" ou "history_paris/2026-02-25.json"
      const m = String(s).match(/(\d{4}-\d{2}-\d{2})\.json$/);
      return m ? m[1] : null;
    }

    async function fetchJson(url){
      const res = await fetch(url, { cache: "no-store" });
      if(!res.ok) throw new Error(url + " HTTP " + res.status);
      return res.json();
    }

    function sumXpFromSnapshot(data){
      // Cas 1: snapshot = array de joueurs [{xp:...}, ...]
      if(Array.isArray(data)){
        return data.reduce((acc, p) => acc + (Number(p?.xp) || 0), 0);
      }

      // Cas 2: snapshot = objet avec une liste dedans (ex: { players: [...] } ou { top50: [...] } )
      const arr =
        (Array.isArray(data?.players) && data.players) ||
        (Array.isArray(data?.top50) && data.top50) ||
        (Array.isArray(data?.data) && data.data) ||
        null;

      if(arr) return arr.reduce((acc, p) => acc + (Number(p?.xp) || 0), 0);

      return 0;
    }

    async function main(){
      const xpEl = document.getElementById("xpTotal");
      const metaEl = document.getElementById("meta");
      const pillEl = document.getElementById("datePill");

      let index;
      try{
        index = await fetchJson("data/history_paris/index.json");
      }catch(e){
        warn("Impossible de charger data/history_paris/index.json : " + e.message);
        metaEl.textContent = "Erreur.";
        return;
      }

      // index.json peut être:
      // - un tableau ["2026-02-24.json", ...]
      // - ou un objet { files:[...]} / { snapshots:[...]} etc.
      const files =
        Array.isArray(index) ? index :
        (Array.isArray(index?.files) ? index.files :
        (Array.isArray(index?.snapshots) ? index.snapshots : null));

      if(!files || files.length < 2){
        warn("index.json ne contient pas assez de snapshots (il en faut au moins 2).");
        metaEl.textContent = "Données insuffisantes.";
        return;
      }

      // On garde uniquement les noms qui ressemblent à YYYY-MM-DD.json puis tri par date
      const dated = files
        .map(f => ({ raw: f, date: extractDateFromFilename(f) }))
        .filter(x => x.date)
        .sort((a,b) => a.date.localeCompare(b.date)); // YYYY-MM-DD => tri lexical OK

      if(dated.length < 2){
        warn("Aucun (ou pas assez de) fichier YYYY-MM-DD.json détecté dans index.json.");
        metaEl.textContent = "Données insuffisantes.";
        return;
      }

      const previous = dated[dated.length - 2]; // jour d’avant (par rapport au dernier)
      const prevUrl = previous.raw.startsWith("data/")
        ? previous.raw
        : ("data/history_paris/" + previous.raw.replace(/^\/+/, ""));

      pillEl.textContent = previous.date;

      let snapshot;
      try{
        snapshot = await fetchJson(prevUrl);
      }catch(e){
        warn("Impossible de charger " + prevUrl + " : " + e.message);
        metaEl.textContent = "Erreur de chargement snapshot.";
        return;
      }

      const totalXp = sumXpFromSnapshot(snapshot);

      metaEl.textContent = "Snapshot (jour d’avant) : " + previous.date;
      xpEl.textContent = totalXp.toLocaleString("fr-FR") + " XP";
    }

    window.addEventListener("DOMContentLoaded", main);
  </script>
</body>
</html>
