<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jour d’avant — Gains XP</title>

<link rel="stylesheet" href="style.css">
<script src="header.js" defer></script>

<style>
  body{
    margin:0;
    background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    font-family: Arial, sans-serif;
  }

  .box{
    width: 1100px;
    max-width: calc(100% - 24px);
    margin: 40px auto;
    background:#ffffff;
    border-radius:8px;
    overflow:hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,.25);
  }

  .title{
    background:#3a3a3a;
    color:white;
    padding:14px 18px;
    font-size:20px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
  }

  .subtitle{
    font-size:13px;
    font-weight:700;
    opacity:.9;
  }

  .warn{
    margin:12px 18px 0;
    padding:10px 12px;
    background:#fff3cd;
    border:1px solid #ffe69c;
    border-radius:10px;
    font-weight:900;
    color:#664d03;
    display:none;
  }

  table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
  }

  thead th{
    background:#ffffff;
    padding:12px 10px;
    text-align:left;
    font-size:13px;
    font-weight:700;
    border-bottom:1px solid #cfcfcf;
  }

  tbody td{
    padding:16px 10px;
    border-bottom:1px solid #cfcfcf;
    vertical-align:middle;
    font-size:14px;
  }

  tbody tr:nth-child(odd){ background:#f2f2f2; }
  tbody tr:nth-child(even){ background:#ffffff; }

  .rank{
    font-weight:700;
    font-size:22px;
    width:60px;
    text-align:center;
    color:#444;
  }

  .avatar{
    width:90px;
    text-align:center;
  }

  .avatar .frame{
    width:64px;
    height:64px;
    margin:0 auto;
    background:#e9e9e9;
    border:1px solid #bdbdbd;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.6);
  }

  .avatar img{
    width:56px;
    height:56px;
    object-fit:cover;
    border:2px solid #8f8f8f;
    border-radius:6px;
    background:#ddd;
    display:block;
  }

  .name a{
    color:#2c6fb7;
    font-weight:700;
    text-decoration:none;
  }
  .name a:hover{ text-decoration:underline; }

  .center{ text-align:center; white-space:nowrap; }

  .pill{
    display:inline-block;
    padding:4px 8px;
    border-radius:999px;
    font-weight:900;
    font-size:12px;
    border:1px solid rgba(0,0,0,.12);
    background:#f2f2f2;
    white-space:nowrap;
  }

  .gain{
    font-weight:900;
    font-size:16px;
  }

  .pos{ color:#0a7a2f; }
  .zero{ color:#666; }
  .neg{ color:#b02a37; }

  .hint{
    padding: 10px 18px;
    font-size: 13px;
    color:#555;
    border-top: 1px solid #e5e5e5;
    background:#fafafa;
    line-height:1.35;
  }
</style>
</head>

<body>

<div class="box">
  <div class="title">
    <div>
      Classement gains XP — Jour d’avant
      <div class="subtitle" id="rangeInfo">Chargement…</div>
    </div>
    <div class="pill" id="modelInfo">Δ XP</div>
  </div>

  <div class="subnav">
    <a class="subnav-btn" href="jour.html">🕛 Jour</a>
    <a class="subnav-btn" href="jour-veille.html">⏪ Jour d’avant</a>
    <a class="subnav-btn" href="hebdo.html">📅 Hebdo</a>
    <a class="subnav-btn" href="mensuel.html">🗓️ Mensuel</a>
  </div>

  <div id="warn" class="warn"></div>

  <table id="leaderboard">
    <thead>
      <tr>
        <th></th>
        <th></th>
        <th>Nom du joueur</th>
        <th class="center">Gain XP</th>
        <th class="center">XP (fin)</th>
        <th class="center">Kara</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="hint">
    Calcul : <b>gain = XP(D) − XP(D−1)</b>, avec <b>D</b> = “jour d’avant” (avant-dernière date dans <code>data/history_paris/index.json</code>).
  </div>
</div>

<script>
  function warn(msg){
    const w = document.getElementById("warn");
    w.style.display = "block";
    w.textContent = msg;
  }

  async function fetchJson(url){
    const res = await fetch(url, { cache:"no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status + " sur " + url);
    return res.json();
  }

  function isDateString(s){
    return /^\d{4}-\d{2}-\d{2}$/.test(String(s));
  }

  // ✅ Normalise un snapshot en tableau de joueurs
  // Accepte:
  // - [ ... ] (tableau direct)
  // - { players:[...] } / { top50:[...] } / { data:[...] }
  function normalizeSnapshot(snapshot){
    if(Array.isArray(snapshot)) return snapshot;

    if(snapshot && typeof snapshot === "object"){
      if(Array.isArray(snapshot.players)) return snapshot.players;
      if(Array.isArray(snapshot.top50)) return snapshot.top50;
      if(Array.isArray(snapshot.data)) return snapshot.data;
    }
    return null;
  }

  function keyOfPlayer(p){
    if(p && p.profileHref) return "href:" + String(p.profileHref);
    if(p && p.nom) return "nom:" + String(p.nom).toLowerCase().trim();
    return null;
  }

  function gainClass(g){
    if(g > 0) return "pos";
    if(g < 0) return "neg";
    return "zero";
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const tbody = document.querySelector("#leaderboard tbody");
    const rangeInfo = document.getElementById("rangeInfo");

    let index;
    try{
      index = await fetchJson("data/history_paris/index.json");
    }catch(e){
      warn("Impossible de charger data/history_paris/index.json : " + e.message);
      tbody.innerHTML = "";
      rangeInfo.textContent = "Erreur index.";
      return;
    }

    if(!Array.isArray(index)){
      warn("index.json doit être un tableau de dates (ex: [\"2026-02-24\", \"2026-02-25\"]).");
      tbody.innerHTML = "";
      rangeInfo.textContent = "Index invalide.";
      return;
    }

    const dates = index.filter(isDateString).sort();
    if(dates.length < 3){
      warn("Il faut au moins 3 dates dans index.json (pour calculer D et D-1).");
      tbody.innerHTML = "";
      rangeInfo.textContent = "Données insuffisantes.";
      return;
    }

    const dateD = dates[dates.length - 2];     // jour d’avant
    const datePrev = dates[dates.length - 3];  // veille du jour d’avant

    rangeInfo.textContent = `Période : ${datePrev} → ${dateD}`;

    const urlPrev = `data/history_paris/${datePrev}.json`;
    const urlD = `data/history_paris/${dateD}.json`;

    let rawPrev, rawD;
    try{
      rawPrev = await fetchJson(urlPrev);
      rawD = await fetchJson(urlD);
    }catch(e){
      warn("Impossible de charger les snapshots : " + e.message);
      tbody.innerHTML = "";
      return;
    }

    const snapPrev = normalizeSnapshot(rawPrev);
    const snapD = normalizeSnapshot(rawD);

    if(!snapPrev || !snapD){
      warn("Snapshots invalides : attend un tableau ([]) ou un objet {players:[]}/{top50:[]}. Vérifie tes fichiers dans data/history_paris/.");
      tbody.innerHTML = "";
      return;
    }

    // XP veille
    const prevMap = new Map();
    snapPrev.forEach(p => {
      const k = keyOfPlayer(p);
      if(!k) return;
      prevMap.set(k, Number(p.xp) || 0);
    });

    // Gains sur D
    const rows = [];
    snapD.forEach(p => {
      const k = keyOfPlayer(p);
      if(!k) return;

      const xpD = Number(p.xp) || 0;
      const xpBefore = prevMap.has(k) ? prevMap.get(k) : 0;
      const gain = xpD - xpBefore;

      rows.push({
        nom: p.nom || "—",
        profileHref: p.profileHref || "#",
        avatar: p.avatar || "avatar/1.jpg",
        karas: (p.karas == null) ? 0 : Number(p.karas),
        xpD,
        gain,
        isNew: !prevMap.has(k)
      });
    });

    // Tri gain desc puis xpD desc
    rows.sort((a,b) => (b.gain - a.gain) || (b.xpD - a.xpD));

    tbody.innerHTML = "";
    rows.forEach((p, i) => {
      const tr = document.createElement("tr");
      const gainTxt = (p.gain > 0 ? "+" : "") + p.gain.toLocaleString("fr-FR");
      const gainBadge = p.isNew ? ' <span class="pill">Nouveau</span>' : "";

      tr.innerHTML = `
        <td class="rank">${i+1}</td>
        <td class="avatar">
          <div class="frame">
            <img src="${p.avatar}" alt="${p.nom}">
          </div>
        </td>
        <td class="name">
          <a target="_blank" rel="noopener" href="${p.profileHref}">${p.nom}</a>
        </td>
        <td class="center gain ${gainClass(p.gain)}">${gainTxt} XP${gainBadge}</td>
        <td class="center">${p.xpD.toLocaleString("fr-FR")}</td>
        <td class="center">${(p.karas||0).toLocaleString("fr-FR")}</td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
