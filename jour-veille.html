<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classement — Hier</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>

  <style>
    body{
      margin:0;
      background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
      font-family: Arial, sans-serif;
    }

    .box{
      width: 1100px;
      max-width: calc(100% - 24px);
      margin: 40px auto;
      background:#ffffff;
      border-radius:8px;
      overflow:hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }

    .title{
      background:#3a3a3a;
      color:white;
      padding:14px 18px;
      font-size:20px;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .subtitle{
      font-size:13px;
      font-weight:700;
      opacity:.9;
    }

    .pill{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-weight:900;
      font-size:12px;
      border:1px solid rgba(0,0,0,.12);
      background:#f2f2f2;
      color:#111;
      white-space:nowrap;
    }

    .subnav{
      display:flex;
      gap:10px;
      padding:12px 18px;
      border-bottom:1px solid #e5e5e5;
      background:#fafafa;
      flex-wrap:wrap;
    }
    .subnav-btn{
      display:inline-block;
      padding:8px 10px;
      border-radius:10px;
      text-decoration:none;
      color:#1f4f7a;
      background:#eaf3ff;
      border:1px solid rgba(0,0,0,.08);
      font-weight:700;
      font-size:13px;
    }

    .warn{
      margin:12px 18px 0;
      padding:10px 12px;
      background:#fff3cd;
      border:1px solid #ffe69c;
      border-radius:10px;
      font-weight:900;
      color:#664d03;
      display:none;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
    }

    thead th{
      background:#ffffff;
      padding:12px 10px;
      text-align:left;
      font-size:13px;
      font-weight:700;
      border-bottom:1px solid #cfcfcf;
    }

    tbody td{
      padding:16px 10px;
      border-bottom:1px solid #cfcfcf;
      vertical-align:middle;
      font-size:14px;
    }

    tbody tr:nth-child(odd){ background:#f2f2f2; }
    tbody tr:nth-child(even){ background:#ffffff; }

    .rank{
      font-weight:700;
      font-size:22px;
      width:60px;
      text-align:center;
      color:#444;
    }

    .avatar{
      width:90px;
      text-align:center;
    }

    .avatar .frame{
      width:64px;
      height:64px;
      margin:0 auto;
      background:#e9e9e9;
      border:1px solid #bdbdbd;
      border-radius:6px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.6);
    }

    .avatar img{
      width:56px;
      height:56px;
      object-fit:cover;
      border:2px solid #8f8f8f;
      border-radius:6px;
      background:#ddd;
      display:block;
    }

    .name a{
      color:#2c6fb7;
      font-weight:700;
      text-decoration:none;
    }
    .name a:hover{ text-decoration:underline; }

    .center{ text-align:center; white-space:nowrap; }
  </style>
</head>

<body>
  <div class="box">
    <div class="title">
      <div>
        Classement — Hier (snapshot)
        <div class="subtitle" id="subText">Chargement…</div>
      </div>
      <div class="pill" id="pillDate">…</div>
    </div>

    <div class="subnav">
      <a class="subnav-btn" href="jour.html">🕛 Jour</a>
      <a class="subnav-btn" href="jour-veille.html">⏪ Hier</a>
      <a class="subnav-btn" href="niveauhtml">📊 Niveau théorique</a>
    </div>

    <div id="warn" class="warn"></div>

    <table id="leaderboard">
      <thead>
        <tr>
          <th></th>
          <th></th>
          <th>Nom du joueur</th>
          <th class="center">XP</th>
          <th class="center">Kara</th>
          <th class="center">Niveau</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script>
  function warn(msg){
    const w = document.getElementById("warn");
    w.style.display = "block";
    w.textContent = msg;
  }

  async function fetchJson(url){
    const res = await fetch(url, { cache: "no-store" });
    if(!res.ok) throw new Error(url + " HTTP " + res.status);
    return res.json();
  }

  function isDateString(s){
    return /^\d{4}-\d{2}-\d{2}$/.test(String(s));
  }

  // Accepte: array direct OU objet {players:[...]} / {top50:[...]} / {data:[...]}
  function extractPlayers(snapshot){
    if(Array.isArray(snapshot)) return snapshot;

    const arr =
      (Array.isArray(snapshot?.players) && snapshot.players) ||
      (Array.isArray(snapshot?.top50) && snapshot.top50) ||
      (Array.isArray(snapshot?.data) && snapshot.data) ||
      null;

    return arr || null;
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const tbody = document.querySelector("#leaderboard tbody");
    const subText = document.getElementById("subText");
    const pillDate = document.getElementById("pillDate");

    tbody.innerHTML = "";

    // 1) index.json (liste de dates)
    let index;
    try{
      index = await fetchJson("data/history_paris/index.json");
    }catch(e){
      warn("Impossible de charger data/history_paris/index.json : " + e.message);
      subText.textContent = "Erreur.";
      return;
    }

    if(!Array.isArray(index)){
      warn("index.json n'est pas un tableau de dates.");
      subText.textContent = "Format index invalide.";
      return;
    }

    const dates = index.filter(isDateString).sort();
    if(dates.length < 2){
      warn("Pas assez de dates dans index.json (il en faut au moins 2).");
      subText.textContent = "Données insuffisantes.";
      return;
    }

    // 2) hier = avant-dernier snapshot (par rapport au dernier)
    const day = dates[dates.length - 2];
    const url = `data/history_paris/${day}.json`;

    subText.textContent = `Snapshot du ${day}`;
    pillDate.textContent = day;

    // 3) charger snapshot
    let snap;
    try{
      snap = await fetchJson(url);
    }catch(e){
      warn("Impossible de charger " + url + " : " + e.message);
      subText.textContent = "Erreur snapshot.";
      return;
    }

    const players = extractPlayers(snap);
    if(!players){
      warn("Snapshot invalide : attendu un tableau de joueurs (ou {players:[...]}).");
      subText.textContent = "Snapshot invalide.";
      return;
    }

    // 4) tri XP desc
    const rows = players.map(p => ({
      nom: p?.nom || "—",
      avatar: p?.avatar || "avatar/1.jpg",
      profileHref: p?.profileHref || "#",
      xp: Number(p?.xp) || 0,
      karas: (p?.karas == null) ? 0 : Number(p?.karas) || 0,
      niveau: (p?.niveau == null) ? null : Number(p?.niveau)
    }));

    rows.sort((a,b) => (b.xp - a.xp));

    // 5) render
    tbody.innerHTML = "";
    rows.forEach((r, i) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank">${i+1}</td>
        <td class="avatar">
          <div class="frame">
            <img src="${r.avatar}" alt="${r.nom}">
          </div>
        </td>
        <td class="name">
          <a target="_blank" rel="noopener" href="${r.profileHref}">${r.nom}</a>
        </td>
        <td class="center">${r.xp.toLocaleString("fr-FR")}</td>
        <td class="center">${r.karas.toLocaleString("fr-FR")}</td>
        <td class="center">${(r.niveau == null ? "—" : r.niveau.toLocaleString("fr-FR"))}</td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
