<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Classement Année précédente — XP gagnée</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>

  <style>
    body{ margin:0; font-family:Arial,sans-serif; background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%); }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{ background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.10); }
    .titlebar{ background:#3b3b3b; color:#fff; padding:14px 16px; font-size:22px; font-weight:900; }

    .subnav{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      padding:10px 16px;
      border-bottom:1px solid #e6e6e6;
      background:#f6f6f6;
    }
    .subnav-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:10px;
      font-weight:900;
      text-decoration:none;
      border:1px solid #d6d6d6;
      background:#fff;
      color:#333;
    }
    .subnav-btn:hover{ filter:brightness(.98); }
    .subnav-btn.is-active{
      border-color:#2c6fb7;
      color:#2c6fb7;
      box-shadow: inset 0 0 0 1px rgba(44,111,183,.25);
    }

    .sub{ padding:10px 16px; font-weight:900; color:#444; border-bottom:1px solid #e6e6e6; background:#fafafa; }
    .warn{ margin:12px 16px 0; padding:10px 12px; background:#fff3cd; border:1px solid #ffe69c; border-radius:10px; font-weight:900; color:#664d03; display:none; }

    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{ background:#fff; padding:14px 12px; text-align:left; font-size:15px; font-weight:900; border-bottom:1px solid #cfcfcf; }
    tbody td{ padding:18px 12px; border-bottom:1px solid #cfcfcf; vertical-align:middle; font-size:16px; }
    tbody tr:nth-child(odd){ background:#f2f2f2; }

    .rank{ width:70px; text-align:center; font-weight:900; font-size:26px; color:#444; }
    .avatarCell{ width:110px; text-align:center; }
    .frame{ width:64px; height:64px; margin:0 auto; background:#e9e9e9; border:1px solid #bdbdbd; border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .frame img{ width:56px; height:56px; object-fit:cover; border:2px solid #8f8f8f; border-radius:10px; background:#ddd; display:block; }

    .name a{ color:#2c6fb7; font-weight:900; text-decoration:none; font-size:18px; }
    .center{ text-align:center; white-space:nowrap; font-weight:900; }
    .small{ font-weight:700; font-size:13px; color:#666; }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="titlebar">Classement Année précédente — XP gagnée</div>

      <!-- ✅ même barre que ans.html -->
      <div class="subnav">
        <a class="subnav-btn" href="jour.html">🕛 Jour</a>
        <a class="subnav-btn" href="jour-veille.html">⏪ Hier</a>
        <a class="subnav-btn" href="hebdo.html">📅 Hebdo</a>
        <a class="subnav-btn" href="mensuel.html">🗓️ Mensuel</a>
        <a class="subnav-btn" href="mois-veille.html" id="btnPrevMonth">⏮️ —</a>
        <a class="subnav-btn" href="ans.html" id="btnYear">📆 —</a>
        <a class="subnav-btn is-active" href="ans-veille.html" id="btnYearPrev">📆 —</a>
      </div>

      <div class="sub" id="rangeTxt">Chargement…</div>
      <div id="warn" class="warn"></div>

      <table>
        <thead>
          <tr>
            <th></th>
            <th></th>
            <th>Joueur</th>
            <th class="center">Δ XP (an)</th>
            <th class="center">XP (fin année)</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </section>
  </main>

<script>
  function warn(msg){
    const w = document.getElementById("warn");
    w.style.display = "block";
    w.textContent = msg;
  }

  /* ===== Utils ===== */
  function slugify(name){
    return String(name || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  function profileIdFromHref(href){
    if(!href) return null;
    try{
      const u = new URL(href, location.origin);
      const m = u.pathname.match(/\/player\/([^\/?#]+)/i);
      return m ? m[1].toLowerCase() : null;
    }catch{
      const m = String(href).match(/\/player\/([^\/?#]+)/i);
      return m ? m[1].toLowerCase() : null;
    }
  }

  // ✅ multi-keys pour matcher correctement (Snokido vs Snokido-2, mohameddz vs mohameddz-3, etc.)
  function playerKeys(p){
    const keys = [];
    if(!p) return keys;

    const href = p.profileHref || p.href || null;
    const id = profileIdFromHref(href);
    if(id) keys.push("id:" + id);

    const s = String(p.slug || "").toLowerCase().trim();
    if(s){
      keys.push("slug:" + s);
      keys.push("id:" + s);
    }

    const nLower = String(p.nom || "").toLowerCase().trim();
    if(nLower) keys.push("nameLower:" + nLower);

    const nSlug = slugify(p.nom);
    if(nSlug) keys.push("nameSlug:" + nSlug);

    return Array.from(new Set(keys));
  }

  // Anti-cache GH Pages
  async function fetchJson(path){
    const url = path + (path.includes("?") ? "&" : "?") + "t=" + Date.now();
    const res = await fetch(url, { cache: "no-store" });
    if(!res.ok) return null;
    try { return await res.json(); } catch { return null; }
  }

  function normalizeDay(s){
    const str = String(s||"").trim();
    const m = str.match(/^(\d{4}-\d{2}-\d{2})(?:\.json)?$/);
    return m ? m[1] : null;
  }

  async function loadIndex(){
    const idx = await fetchJson("data/history_paris/index.json");
    if(!Array.isArray(idx)) return null;
    return idx.map(normalizeDay).filter(Boolean).sort();
  }

  function extractPlayers(payload){
    if(!payload) return null;

    // tes anciens fichiers ont parfois { day:"YYYY-MM-DD", players:[...] }
    if(Array.isArray(payload)) return payload;

    if(payload && typeof payload === "object"){
      if(Array.isArray(payload.players)) return payload.players;
      if(Array.isArray(payload.top50)) return payload.top50;
      if(Array.isArray(payload.data)) return payload.data;
    }
    return null;
  }

  async function loadSnapPlayers(day){
    const raw = await fetchJson("data/history_paris/" + day + ".json");
    return extractPlayers(raw);
  }

  function findClosestLE(index, targetDay){
    for(let i = index.length - 1; i >= 0; i--){
      if(index[i] <= targetDay) return index[i];
    }
    return null;
  }

  function formatSigned(n){
    const v = Number(n || 0);
    return (v >= 0 ? "+" : "") + v.toLocaleString("fr-FR");
  }

  // Tie-break +12 uniquement si dx >= 500 (comme tes autres pages)
  function applyDxTieBreakPlus12Over500(rows){
    const byDx = new Map();
    for(const r of rows){
      const k = String(r.dx);
      if(!byDx.has(k)) byDx.set(k, []);
      byDx.get(k).push(r);
    }
    for(const [, group] of byDx){
      if(group.length <= 1){
        group[0].dxAdj = group[0].dx;
        continue;
      }
      const dxVal = Number(group[0].dx || 0);
      if(dxVal < 500){
        group.forEach(r => r.dxAdj = r.dx);
        continue;
      }
      const sorted = group.slice().sort((a,b)=> slugify(a.nom).localeCompare(slugify(b.nom)));
      const n = sorted.length;
      for(let i=0;i<n;i++){
        const bonus = 12 * (n - 1 - i);
        sorted[i].dxAdj = sorted[i].dx + bonus;
      }
    }
    for(const r of rows){
      if(typeof r.dxAdj !== "number") r.dxAdj = r.dx;
    }
  }

  /* ===== Labels auto nav : mois précédent + année courante + année précédente ===== */
  function setNavLabelsFromLatest(latestDay){
    const btnPrevMonth = document.getElementById("btnPrevMonth");
    const btnYear = document.getElementById("btnYear");
    const btnYearPrev = document.getElementById("btnYearPrev");

    const monthsFR = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

    const y = Number(latestDay.slice(0,4));
    const m = Number(latestDay.slice(5,7));

    if(btnYear){
      btnYear.textContent = "📆 " + y;
      btnYear.title = "Classement annuel (" + y + ")";
    }
    if(btnYearPrev){
      btnYearPrev.textContent = "📆 " + (y - 1);
      btnYearPrev.title = "Classement annuel (" + (y - 1) + ")";
    }

    if(btnPrevMonth){
      let pm = m - 1;
      let py = y;
      if(pm <= 0){ pm = 12; py = y - 1; }
      btnPrevMonth.textContent = "⏮️ " + monthsFR[pm-1];
      btnPrevMonth.title = "Classement du mois précédent (" + monthsFR[pm-1] + " " + py + ")";
    }
  }

  window.addEventListener("DOMContentLoaded", async () => {
    const tbody = document.getElementById("tbody");
    const rangeTxt = document.getElementById("rangeTxt");

    const index = await loadIndex();
    if(!index || index.length < 2){
      warn("Pas assez d'historique (data/history_paris/index.json).");
      return;
    }

    const latestDay = index[index.length - 1];
    setNavLabelsFromLatest(latestDay);

    const yearCurrent = Number(latestDay.slice(0,4));
    const yearPrev = yearCurrent - 1;

    // ✅ BASELINE (début année précédente) = premier snapshot dispo de l'année précédente
    const yearPrevDays = index.filter(d => d.slice(0,4) === String(yearPrev));
    if(yearPrevDays.length === 0){
      warn("Aucun snapshot trouvé pour l'année " + yearPrev + ".");
      return;
    }
    const baseDay = yearPrevDays[0];

    // ✅ FIN année précédente = repère 01/01 année suivante (ex: 2026-01-01)
    const endTarget = String(yearPrev + 1) + "-01-01";
    const endDay = findClosestLE(index, endTarget);

    if(!endDay){
      warn("Impossible de trouver la fin d'année (repère " + endTarget + ").");
      return;
    }

    // si tu veux FORCER strictement 2026-01-01 :
    // (décommente si tu veux qu'il refuse si la date exacte n'existe pas)
    // if(endDay !== endTarget){
    //   warn("Le snapshot fin d'année exact (" + endTarget + ") n'existe pas. Trouvé: " + endDay);
    //   return;
    // }

    const baseSnap = await loadSnapPlayers(baseDay);
    const endSnap = await loadSnapPlayers(endDay);

    if(!baseSnap || !endSnap){
      warn("Snapshots introuvables : base=" + baseDay + " / fin=" + endDay);
      return;
    }

    rangeTxt.textContent = "Période : " + baseDay + " → " + endDay + " (année " + yearPrev + ")";

    // ✅ enrichment (skins / liens) depuis players_pages.json si manquants dans vieux snapshots
    const pagesRaw = await fetchJson("data/players_pages.json");
    const pagesPlayers = extractPlayers(pagesRaw) || [];
    const enrichMap = new Map();
    for(const p of pagesPlayers){
      const keys = playerKeys(p);
      for(const k of keys){
        if(!enrichMap.has(k)) enrichMap.set(k, p);
      }
    }

    // base map : key -> xp
    const baseMap = new Map();
    for(const p of baseSnap){
      const xp0 = Number(p?.xp || 0);
      for(const k of playerKeys(p)){
        if(!baseMap.has(k)) baseMap.set(k, xp0);
      }
    }

    // calc sur end snapshot (XP fin d'année)
    let rows = [];
    let matched = 0;

    for(const pEnd of endSnap){
      const keys = playerKeys(pEnd);
      if(!keys.length) continue;

      // trouve base XP par n'importe quelle clé
      let bXp = null;
      for(const k of keys){
        if(baseMap.has(k)){
          bXp = baseMap.get(k);
          break;
        }
      }
      if(bXp == null) continue;

      matched++;

      const xpEnd = Number(pEnd?.xp || 0);
      const dx = xpEnd - bXp;
      if(dx === 0) continue;

      // avatar/href : snapshot sinon enrichment
      let avatar = pEnd?.avatar || null;
      let profileHref = pEnd?.profileHref || null;

      if(!avatar || !profileHref){
        for(const k of keys){
          const e = enrichMap.get(k);
          if(e){
            if(!avatar && e.avatar) avatar = e.avatar;
            if(!profileHref && e.profileHref) profileHref = e.profileHref;
          }
        }
      }

      rows.push({
        nom: pEnd?.nom || "—",
        xpEnd,
        dx,
        dxAdj: null,
        avatar,
        profileHref
      });
    }

    applyDxTieBreakPlus12Over500(rows);
    rows.sort((a,b)=> b.dxAdj - a.dxAdj);

    tbody.innerHTML = "";

    // ✅ TOP 50 gagnants
    const shown = rows.filter(r => r.dx > 0).slice(0, 50);

    if(shown.length === 0){
      warn("Aucun gain affiché. Debug: base=" + baseDay + " fin=" + endDay + " endSnap=" + endSnap.length + " match=" + matched);
      tbody.innerHTML =
        '<tr><td colspan="5" style="padding:16px;font-weight:900;color:#666;">Personne n’a gagné d’XP sur la période.</td></tr>';
      return;
    }

    for(let i=0;i<shown.length;i++){
      const r = shown[i];
      const link = r.profileHref ? r.profileHref : ("profil.html?mode=nv100&u=" + encodeURIComponent(slugify(r.nom)));
      const tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="rank">' + (i+1) + '</td>' +
        '<td class="avatarCell"><div class="frame"><img src="' + (r.avatar || "avatar/1.jpg") + '" alt="' + r.nom + '"></div></td>' +
        '<td class="name"><a target="_blank" rel="noopener" href="' + link + '">' + r.nom + '</a>' +
        '<div class="small">' + r.xpEnd.toLocaleString("fr-FR") + ' XP (fin)</div></td>' +
        '<td class="center">' + formatSigned(r.dx) + '</td>' +
        '<td class="center">' + r.xpEnd.toLocaleString("fr-FR") + '</td>';
      tbody.appendChild(tr);
    }
  });
</script>
</body>
</html>
