<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Profil</title>

  <link rel="stylesheet" href="style.css">
  <script src="header.js" defer></script>
  <script src="data.js" defer></script>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    }
    .wrap{ max-width:1180px; margin:26px auto 40px; padding:0 12px; }
    .panel{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      border:1px solid rgba(0,0,0,.10);
    }
    .titlebar{
      background:#3b3b3b;
      color:#fff;
      padding:12px 14px;
      font-size:18px;
      font-weight:900;
    }
    .content{ display:flex; gap:16px; padding:16px; align-items:flex-start; }
    .avatarBox{
      width:290px; background:#f6f6f6; border:1px solid #d9d9d9;
      border-radius:12px; padding:12px;
    }
    .avatarBox img{ width:100%; border-radius:10px; border:2px solid #bdbdbd; background:#eee; display:block; }

    .main{ flex:1; min-width:460px; }
    .headerRow{ display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .badge100{
      width:46px; height:46px; border-radius:10px;
      display:grid; place-items:center; font-weight:900;
      background:linear-gradient(#ffd44d,#f0b300);
      border:2px solid rgba(0,0,0,.12);
      box-shadow:0 2px 0 rgba(0,0,0,.12);
      color:#111;
    }
    .name{ font-size:28px; font-weight:900; margin:0; }

    .xpRow{ margin:6px 0 12px; }
    .xpWrap{
      position:relative; height:20px; border-radius:10px;
      overflow:hidden; background:#d9d9d9; border:1px solid #cfcfcf;
    }
    .xpFill{ height:100%; width:100%; background:#78b72d; }
    .xpText{
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font-weight:900; color:#fff; text-shadow:0 1px 0 rgba(0,0,0,.35);
      font-size:13px;
    }

    .cols{ display:flex; gap:14px; align-items:flex-start; }
    .col-left{ flex:1.25; }
    .col-right{ flex:0.75; }

    .item{
      display:flex; align-items:center; gap:12px;
      font-size:14px; border-bottom:1px solid #e6e6e6; padding:10px 0;
    }
    .label{ width:160px; flex:0 0 auto; color:#444; }
    .value{ font-weight:900; color:#000; }

    .rightTitle{ font-size:14px; font-weight:900; border-bottom:1px solid #e6e6e6; padding:10px 0; }
    .pauseLine{ font-size:14px; border-bottom:1px solid #e6e6e6; padding:10px 0; }
    .pauseLine b{ font-weight:900; }

    .linkRow{ margin-top:10px; font-size:14px; padding-top:10px; border-bottom:none; }
    .linkRow a{ color:#2c6fb7; text-decoration:none; font-weight:900; }
    .linkRow a:hover{ text-decoration:underline; }

    @media (max-width:1020px){
      .content{ flex-direction:column; }
      .avatarBox{ width:auto; }
      .main{ min-width:auto; }
      .cols{ flex-direction:column; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="titlebar" id="pageTitle">Profil</div>
      <div class="content" id="content"></div>
    </section>
  </main>

  <script>
    window.addEventListener("DOMContentLoaded", () => {

      function slugify2(name){
        return String(name || "")
          .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-zA-Z0-9]/g, "")
          .toLowerCase();
      }

      const params = new URLSearchParams(location.search);
      const u = params.get("u");
      const mode = (params.get("mode") || "nv100").toLowerCase();

      const pageTitle = document.getElementById("pageTitle");
      const content = document.getElementById("content");

      function backHref(m){
        if(m === "100k") return "100k.html";
        if(m === "200k") return "200k.html";
        if(m === "300k") return "300k.html";
        if(m === "400k") return "400k.html";
        if(m === "500k") return "500k.html";
        if(m === "600k") return "600k.html";
        return "rank.html";
      }

      function progressLabel(m){
        if(m === "100k") return "100K en :";
        if(m === "200k") return "200K en :";
        if(m === "300k") return "300K en :";
        if(m === "400k") return "400K en :";
        if(m === "500k") return "500K en :";
        if(m === "600k") return "600K en :";
        return "Niveau 100 en :";
      }

      function defaultXpForMode(m){
        if(m === "100k") return 100000;
        if(m === "200k") return 200000;
        if(m === "300k") return 300000;
        if(m === "400k") return 400000;
        if(m === "500k") return 500000;
        if(m === "600k") return 600000;
        return 49500;
      }

      function plural(n, one, many){ return n === 1 ? one : many; }

      if(!u){
        pageTitle.textContent = "Profil";
        content.innerHTML = "<p style='padding:18px'>Lien invalide (paramètre u manquant).</p>";
        return;
      }

      if(typeof joueurs === "undefined" || !Array.isArray(joueurs)){
        pageTitle.textContent = "Erreur data.js";
        content.innerHTML = "<p style='padding:18px'>data.js ne s'est pas chargé.</p>";
        return;
      }

      const player = joueurs.find(p => slugify2(p.nom) === u);

      if(!player){
        pageTitle.textContent = "Joueur introuvable";
        content.innerHTML = "<p style='padding:18px'>Ce profil n'existe pas.</p>";
        return;
      }

      const stats = player.modes?.[mode] || null;

      if(!stats){
        pageTitle.textContent = "Mode introuvable";
        content.innerHTML = `<p style='padding:18px'>Ce joueur n'a pas de données pour le mode "${mode}".</p>`;
        return;
      }

      pageTitle.textContent = "Profil de " + player.nom;

      const xpValue = (stats.xp != null) ? stats.xp : defaultXpForMode(mode);
      const xpText = Number(xpValue).toLocaleString("fr-FR") + " xp";

      const maxXp = defaultXpForMode(mode);
      const percent = Math.max(0, Math.min(100, (Number(xpValue) / Number(maxXp)) * 100));

      const t = stats.pauses_total || {nb:0, mois:0, jours:0};
      const details = Array.isArray(stats.pauses_detail) ? stats.pauses_detail : [];

      let rightCol = `
        <div class="col-right">
          <div class="rightTitle">Pauses</div>
          <div class="pauseLine">—</div>
        </div>
      `;

      if((t.nb ?? 0) > 0){
        const nb = Number(t.nb || 0);
        const jours = (t.jours != null) ? Number(t.jours) : null;

        rightCol = `
          <div class="col-right">
            <div class="rightTitle">
              ${nb} ${plural(nb,"pause","pauses")} : ${t.mois ?? "?"} mois (${jours ?? "?"} ${plural(jours ?? 2,"jour","jours")})
            </div>
            ${
              details.length
                ? details.map(p => `
                    <div class="pauseLine">
                      <b>${Number(p.xp).toLocaleString("fr-FR")}</b> :
                      ${p.periode} (${p.mois} mois${p.jours != null ? `, ${p.jours} jours` : ""})
                    </div>
                  `).join("")
                : `<div class="pauseLine">—</div>`
            }
          </div>
        `;
      }

      content.innerHTML = `
        <div class="avatarBox">
          <img src="${player.avatar || "avatar/1.jpg"}" alt="${player.nom}">
        </div>

        <div class="main">
          <div class="headerRow">
            <div class="badge100">100</div>
            <h1 class="name">${player.nom}</h1>
          </div>

          <div class="xpRow">
            <div class="xpWrap">
              <div class="xpFill" style="width:${percent}%;"></div>
              <div class="xpText">${xpText}</div>
            </div>
          </div>

          <div class="cols">
            <div class="col-left">
              <div class="item"><span class="label">${progressLabel(mode)}</span><span class="value">${stats.jours == null ? "—" : (stats.jours + " jours")}</span></div>
              <div class="item"><span class="label">Atteint le :</span><span class="value">${stats.atteint_le ?? "—"}</span></div>
              <div class="item"><span class="label">Rang :</span><span class="value">${stats.rang ?? "—"}</span></div>
              <div class="item"><span class="label">Inscription :</span><span class="value">${player.inscription ?? "—"}</span></div>
              <div class="linkRow"><a href="${backHref(mode)}">Classement</a></div>
            </div>

            ${rightCol}
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
