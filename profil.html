<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil joueur</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
  font-family: Arial, sans-serif;
}

.wrap{
  width:1100px;
  max-width:calc(100% - 24px);
  margin:30px auto 40px;
}

.card{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.head{
  background:#3a3a3a;
  color:#fff;
  padding:18px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
}

.head-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.avatar-frame{
  width:76px;
  height:76px;
  border-radius:10px;
  background:#e8e8e8;
  border:1px solid rgba(255,255,255,.15);
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
}

.avatar-frame img{
  width:66px;
  height:66px;
  object-fit:cover;
  border-radius:8px;
  border:2px solid #8f8f8f;
  background:#ddd;
}

.head-meta h1{
  margin:0 0 6px 0;
  font-size:28px;
  line-height:1.1;
}

.mode-pill{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.12);
  font-size:12px;
  font-weight:900;
  letter-spacing:.3px;
}

.head-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  display:inline-block;
  text-decoration:none;
  padding:10px 14px;
  border-radius:10px;
  font-weight:900;
  font-size:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.10);
  color:#fff;
}

.btn:hover{
  background:rgba(255,255,255,.16);
}

.section{
  padding:18px 20px;
  border-top:1px solid #ececec;
}

.section-title{
  margin:0 0 14px 0;
  font-size:18px;
  color:#222;
}

.grid{
  display:grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap:12px;
}

.stat{
  background:#f7f7f7;
  border:1px solid #e4e4e4;
  border-radius:10px;
  padding:14px;
}

.stat-label{
  font-size:12px;
  font-weight:900;
  color:#666;
  text-transform:uppercase;
  letter-spacing:.4px;
  margin-bottom:8px;
}

.stat-value{
  font-size:22px;
  font-weight:900;
  color:#222;
}

.stat-sub{
  margin-top:6px;
  font-size:12px;
  color:#666;
}

.pause-box{
  background:#fafafa;
  border:1px solid #e5e5e5;
  border-radius:10px;
  padding:14px;
}

.pause-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 10px;
  border-radius:999px;
  font-weight:900;
  font-size:12px;
  border:1px solid rgba(0,0,0,.08);
}

.pause-badge.no{
  background:#e8f8ee;
  color:#187a39;
}

.pause-badge.yes{
  background:#fff1f1;
  color:#b42318;
}

.pause-badge.unknown{
  background:#f1f1f1;
  color:#666;
}

.pause-summary{
  margin-top:10px;
  color:#444;
  font-size:14px;
}

.pause-list{
  margin:14px 0 0 0;
  padding-left:18px;
}

.pause-list li{
  margin:10px 0;
  color:#333;
  line-height:1.45;
}

.muted{
  color:#666;
}

.error-box{
  background:#fff;
  border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  padding:22px;
  font-weight:700;
}

@media (max-width: 900px){
  .grid{
    grid-template-columns: repeat(2, minmax(0,1fr));
  }
}

@media (max-width: 640px){
  .head{
    align-items:flex-start;
  }

  .head-left{
    width:100%;
  }

  .head-actions{
    width:100%;
  }

  .btn{
    width:100%;
    text-align:center;
  }

  .grid{
    grid-template-columns: 1fr;
  }

  .head-meta h1{
    font-size:24px;
  }
}
</style>
</head>

<body>

<script src="header.js"></script>
<script src="data.js"></script>

<div class="wrap" id="app"></div>

<script>
function slugifyLocal(name){
  return String(name || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-zA-Z0-9]/g, "")
    .toLowerCase();
}

function modeLabel(mode){
  const labels = {
    nv100: "NV100",
    "100k": "100K",
    "200k": "200K",
    "300k": "300K",
    "400k": "400K",
    "500k": "500K",
    "600k": "600K",
    "700k": "700K",
    "800k": "800K",
    "900k": "900K",
    "1m": "1M",
    "1m1": "1M1",
    "1m2": "1M2"
  };
  return labels[mode] || mode;
}

function getClassementHref(mode){
  const groupedModes = ["500k", "600k", "700k", "800k", "900k", "1m", "1m1", "1m2"];

  if(groupedModes.includes(mode)) return "500k.html?mode=" + encodeURIComponent(mode);
  if(mode === "400k") return "400k.html";
  if(mode === "300k") return "300k.html";
  if(mode === "200k") return "200k.html";
  if(mode === "100k") return "100k.html";
  if(mode === "nv100") return "nv100.html";

  return "index.html";
}

function formatPauseBadge(pauses_total){
  if(!pauses_total || pauses_total.nb === null || pauses_total.nb === undefined){
    return {
      cls: "unknown",
      text: "Pause inconnue",
      summary: ""
    };
  }

  if(pauses_total.nb === 0){
    return {
      cls: "no",
      text: "Aucune pause",
      summary: "Aucune pause enregistrée sur ce palier."
    };
  }

  const nb = pauses_total.nb || 0;
  const mois = pauses_total.mois || 0;
  const jours = pauses_total.jours || 0;

  let parts = [];
  if(mois) parts.push(mois + " mois");
  if(jours) parts.push(jours + " jours");

  return {
    cls: "yes",
    text: nb + " pause" + (nb > 1 ? "s" : ""),
    summary: parts.length ? ("Durée totale : " + parts.join(" • ")) : "Durée totale inconnue."
  };
}

const app = document.getElementById("app");
const params = new URLSearchParams(window.location.search);
const mode = (params.get("mode") || "nv100").toLowerCase();
const userSlug = (params.get("u") || "").toLowerCase();

if(typeof joueurs === "undefined" || !Array.isArray(joueurs)){
  app.innerHTML = "<div class='error-box'>Erreur : data.js ne s'est pas chargé.</div>";
} else {
  const joueur = joueurs.find(j => slugifyLocal(j.nom) === userSlug);

  if(!joueur){
    app.innerHTML = "<div class='error-box'>Joueur introuvable.</div>";
  } else {
    const stats = joueur.modes && joueur.modes[mode] ? joueur.modes[mode] : null;

    if(!stats){
      app.innerHTML = "<div class='error-box'>Aucune donnée disponible pour le mode " + modeLabel(mode) + ".</div>";
    } else {
      const badge = formatPauseBadge(stats.pauses_total);
      const details = Array.isArray(stats.pauses_detail) ? stats.pauses_detail : [];
      const avatar = joueur.avatar || "avatar/1.jpg";
      const classementHref = getClassementHref(mode);

      document.title = joueur.nom + " — " + modeLabel(mode);

      app.innerHTML = `
        <div class="card">
          <div class="head">
            <div class="head-left">
              <div class="avatar-frame">
                <img src="${avatar}" alt="${joueur.nom}" id="profil-avatar">
              </div>

              <div class="head-meta">
                <h1 id="profil-nom">${joueur.nom}</h1>
                <span class="mode-pill" id="profil-mode">${modeLabel(mode)}</span>
              </div>
            </div>

            <div class="head-actions">
              <a href="${classementHref}" id="btn-classement" class="btn">Classement</a>
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">Statistiques</h2>

            <div class="grid">
              <div class="stat">
                <div class="stat-label">${modeLabel(mode)} en</div>
                <div class="stat-value" id="profil-jours">${typeof stats.jours === "number" ? stats.jours + " jours" : "—"}</div>
              </div>

              <div class="stat">
                <div class="stat-label">Atteint le</div>
                <div class="stat-value" id="profil-date">${stats.atteint_le || "—"}</div>
              </div>

              <div class="stat">
                <div class="stat-label">Rang</div>
                <div class="stat-value" id="profil-rang">${stats.rang || "—"}</div>
              </div>

              <div class="stat">
                <div class="stat-label">XP palier</div>
                <div class="stat-value">${typeof stats.xp === "number" ? stats.xp.toLocaleString("fr-FR") : "—"}</div>
                <div class="stat-sub">Objectif du palier</div>
              </div>
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">Pauses</h2>

            <div class="pause-box">
              <div class="pause-badge ${badge.cls}" id="profil-pause">${badge.text}</div>
              <div class="pause-summary">${badge.summary}</div>

              ${
                details.length
                  ? `
                    <ul class="pause-list">
                      ${details.map(d => `
                        <li>
                          <strong>XP :</strong> ${d.xp != null ? Number(d.xp).toLocaleString("fr-FR") : "—"}<br>
                          <strong>Période :</strong> ${d.periode || "—"}<br>
                          <strong>Durée :</strong> ${[
                            d.mois ? (d.mois + " mois") : null,
                            d.jours ? (d.jours + " jours") : null
                          ].filter(Boolean).join(" • ") || "—"}
                        </li>
                      `).join("")}
                    </ul>
                  `
                  : `<div class="pause-summary muted">Aucun détail de pause enregistré.</div>`
              }
            </div>
          </div>

          <div class="section">
            <h2 class="section-title">Infos joueur</h2>

            <div class="grid">
              <div class="stat">
                <div class="stat-label">Inscription</div>
                <div class="stat-value">${joueur.inscription || "—"}</div>
              </div>

              <div class="stat">
                <div class="stat-label">Génération</div>
                <div class="stat-value">${joueur.gen !== undefined && joueur.gen !== null ? joueur.gen : "—"}</div>
              </div>

              <div class="stat">
                <div class="stat-label">Pseudo</div>
                <div class="stat-value">${joueur.nom}</div>
              </div>

              <div class="stat">
                <div class="stat-label">Mode affiché</div>
                <div class="stat-value">${modeLabel(mode)}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }
  }
}
</script>

</body>
</html>
