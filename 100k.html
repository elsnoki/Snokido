<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100K - Classement</title>

<link rel="stylesheet" href="style.css">
<script src="header.js" defer></script>
<script src="data.js" defer></script>

<style>
  body{
    margin:0;
    background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    font-family: Arial, sans-serif;
  }

  .box{
    width:1000px;
    max-width:calc(100% - 24px);
    margin:40px auto;
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
  }

  .title{
    background:#3a3a3a;
    color:#fff;
    padding:14px 18px;
    font-size:20px;
    font-weight:700;
  }

  .tableWrap{
    width:100%;
    overflow-x:visible;
  }

  table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    table-layout:fixed;
  }

  thead th{
    background:#fff;
    padding:10px 8px;
    text-align:left;
    font-size:13px;
    font-weight:700;
    border-bottom:1px solid #cfcfcf;
  }

  tbody td{
    padding:12px 8px;
    border-bottom:1px solid #cfcfcf;
    vertical-align:middle;
    font-size:14px;
  }

  tbody tr:nth-child(odd){ background:#f2f2f2; }

  .rank{
    font-weight:700;
    font-size:20px;
    width:44px;
    text-align:center;
    color:#444;
  }

  .avatar{
    width:72px;
    text-align:center;
  }

  .avatar .frame{
    width:52px;
    height:52px;
    margin:0 auto;
    background:#e9e9e9;
    border:1px solid #bdbdbd;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.6);
  }

  .avatar img{
    width:44px;
    height:44px;
    object-fit:cover;
    border:2px solid #8f8f8f;
    border-radius:6px;
    background:#ddd;
    display:block;
  }

  .name{
    width:26%;
    word-break:break-word;
  }

  .name a{
    color:#2c6fb7;
    font-weight:700;
    text-decoration:none;
  }

  .name a:hover{
    text-decoration:underline;
  }

  .center{
    text-align:center;
  }

  .col-days{ width:13%; }
  .col-date{ width:16%; }
  .col-pause{ width:23%; }

  .pauseCell{
    white-space:normal;
  }

  .pauseBadge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:6px 8px;
    border-radius:999px;
    font-weight:900;
    font-size:11px;
    border:1px solid rgba(0,0,0,.08);
    max-width:100%;
    text-align:center;
  }

  .pauseBadge.no{
    background:#e8f8ee;
    color:#187a39;
  }

  .pauseBadge.yes{
    background:#fff1f1;
    color:#b42318;
  }

  .pauseSub{
    margin-top:5px;
    font-size:11px;
    color:#555;
    line-height:1.25;
    white-space:normal;
  }

  .hint{
    padding:10px 18px;
    font-size:13px;
    color:#555;
    border-top:1px solid #e5e5e5;
    background:#fafafa;
  }

  @media (max-width: 700px){
    .title{
      font-size:18px;
      padding:12px 14px;
    }

    thead th,
    tbody td{
      padding:8px 6px;
      font-size:12px;
    }

    .rank{
      width:34px;
      font-size:16px;
    }

    .avatar{
      width:56px;
    }

    .avatar .frame{
      width:42px;
      height:42px;
    }

    .avatar img{
      width:34px;
      height:34px;
    }

    .name{
      width:24%;
      font-size:12px;
    }

    .col-days{ width:14%; }
    .col-date{ width:16%; }
    .col-pause{ width:28%; }

    .pauseBadge{
      font-size:10px;
      padding:5px 7px;
    }

    .pauseSub{
      font-size:10px;
    }
  }
</style>
</head>

<body>

<div class="box">
  <div class="title">Rank 100K — par rapidité</div>

  <div class="tableWrap">
    <table id="leaderboard">
      <thead>
        <tr>
          <th class="rank"></th>
          <th class="avatar"></th>
          <th class="name">Nom du joueur</th>
          <th class="center col-days">100K en</th>
          <th class="center col-date">Date d'arrivée</th>
          <th class="center col-pause">Pause</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="hint">
    Classement trié du plus rapide au plus lent. Les temps inconnus sont affichés à la fin.
  </div>
</div>

<script>
  function slugify2(name){
    return String(name || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  function formatPauseInfo(pauses_total){
    if(
      !pauses_total ||
      pauses_total.nb === null ||
      pauses_total.nb === undefined
    ){
      return {
        badgeClass: "no",
        badgeText: "Pause inconnue",
        subText: ""
      };
    }

    if(!pauses_total.nb){
      return {
        badgeClass: "no",
        badgeText: "Aucune pause",
        subText: ""
      };
    }

    const nb = pauses_total.nb || 0;
    const mois = pauses_total.mois || 0;
    const jours = pauses_total.jours || 0;

    let txt = [];
    if(mois) txt.push(mois + " mois");
    if(jours) txt.push(jours + " jours");
    if(!txt.length) txt.push("durée inconnue");

    return {
      badgeClass: "yes",
      badgeText: nb + " pause" + (nb > 1 ? "s" : ""),
      subText: txt.join(" • ")
    };
  }

  window.addEventListener("DOMContentLoaded", () => {
    const tbody = document.querySelector("#leaderboard tbody");

    if(typeof joueurs === "undefined" || !Array.isArray(joueurs)){
      tbody.innerHTML = `<tr><td colspan="6" style="padding:16px;font-weight:900">Erreur : data.js ne s'est pas chargé.</td></tr>`;
      return;
    }

    const list = joueurs
      .map(p => ({ p, s: p.modes?.["100k"] || null }))
      .filter(x => x.s);

    list.sort((a,b) => {
      const ax = (a.s.jours == null) ? Infinity : a.s.jours;
      const bx = (b.s.jours == null) ? Infinity : b.s.jours;
      return ax - bx;
    });

    tbody.innerHTML = "";

    list.forEach((x, i) => {
      const p = x.p;
      const s = x.s;
      const pauseInfo = formatPauseInfo(s.pauses_total);

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank">${i+1}</td>
        <td class="avatar">
          <div class="frame"><img src="${p.avatar || "avatar/1.jpg"}" alt="${p.nom}"></div>
        </td>
        <td class="name">
          <a href="profil.html?mode=100k&u=${encodeURIComponent(slugify2(p.nom))}">${p.nom}</a>
        </td>
        <td class="center">${s.jours == null ? "?" : (s.jours + " j")}</td>
        <td class="center">${s.atteint_le ?? "—"}</td>
        <td class="pauseCell center">
          <div class="pauseBadge ${pauseInfo.badgeClass}">${pauseInfo.badgeText}</div>
          ${pauseInfo.subText ? `<div class="pauseSub">${pauseInfo.subText}</div>` : ""}
        </td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
