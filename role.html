<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Rôles des gangs</title>

<link rel="stylesheet" href="style.css">
<script src="gangdata.js" defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0b3551,#062638);
  color:#fff;
}

.wrap{
  max-width:1100px;
  margin:30px auto;
  padding:10px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.roleTitle{
  font-size:20px;
  font-weight:900;
  margin:20px 0 10px;
  border-bottom:2px solid rgba(255,255,255,.2);
  padding-bottom:5px;
}

.membersGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
}

.memberCard{
  background:#fff;
  color:#000;
  border-radius:12px;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 6px 15px rgba(0,0,0,.3);
}

.memberCard img{
  width:50px;
  height:50px;
  border-radius:10px;
  object-fit:cover;
}

.memberName{
  font-weight:900;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Rôles des gangs</h1>
  <div id="content"></div>
</div>

<script>

// 🔥 LISTE DES RÔLES (ORDRE IMPORTANT)
const ROLES = [
"🥉 Ξ Recrue",
"🥈 Ξ Soldat",
"🥈 Ξ Colonel",
"🥈 Ξ Sergent",
"🥈 Ξ Caporal",
"🥇 Ξ Lieutenant",
"🥇 Ξ Adjoint",
"💎 Ξ Commandant",
"🗺 Ξ Conquérant",

"⭐ Ξ Étoile Dorée",
"🚬 Ξ Gangster",
"♠ Ξ Gangstar Confirmé",
"👿 Ξ Guerrier Ultime",

"💸 Ξ Guerrier Suprême",
"👽 Ξ Aventurier Tenace",
"🐉 Ξ Empereur",
"🏆 Ξ Maître de l'exp",
"🦖 Ξ Grand Colosse",
"🐙 Ξ Kraken Mythologique",
"🐯 Ξ Titan",
"🦕 Ξ Warrior Extrême",
"👹 Ξ Satan",
"🔱 Ξ Champion de l'exp",
"🦇 Ξ Seigneur de l'exp",
"👺 Ξ Lucifer",
"🌚 Ξ Dirigeant du Mal",
"⌛ Ξ Maître du Temps",
"👾 Ξ Léviathan",
"⬛ Ξ Légende de Snokido",
"🚀 Ξ Destructeur Temporel",
"🤺 Ξ Combattant Unique",
"🧭 Ξ Voyageur Dimensionnel",
"💨 Ξ Tempête Apocalyptique",
"🕶 Ξ Parrain de Mafia",
"♦️ Ξ As de l'exp",

"⬜ Ξ Athèna",
"🌋 Ξ Hadès",
"🦉 Ξ Prophète",
"🌗 Ξ Justicier de l'Apocalypse",
"👨‍🚀 Ξ Galaxy Traveller",
"🪐 Ξ Planets Conqueror",
"♟ Ξ Last Menace"
];

// ⚡ ATTRIBUTION DES RÔLES (À MODIFIER)
const rolesByMember = {
"Talk Takashi": "⬜ Ξ Athèna",
"Ko0pa": "🦇 Ξ Seigneur de l'exp",
"Alexis279": "👿 Ξ Guerrier Ultime",
"Venom_": "🚬 Ξ Gangster",

"alex.c2109": "💎 Ξ Commandant",
"TheGladiator": "🥇 Ξ Lieutenant",
"Pingu": "🥈 Ξ Soldat",
"Abelard": "🥉 Ξ Recrue"
};

// 🔧 UTIL
function slugify(s){
  return s.normalize("NFD")
  .replace(/[\u0300-\u036f]/g,"")
  .replace(/[^a-zA-Z0-9]/g,"")
  .toLowerCase();
}

window.addEventListener("DOMContentLoaded",()=>{

  const allowed = ["athenagangster","lospollosgangsta"];

  const gangs = window.gangsData.filter(g =>
    allowed.includes(slugify(g.name))
  );

  let members = [];

  gangs.forEach(g=>{
    g.members.forEach(m=>{
      members.push({
        nom:m.nom,
        avatar:m.avatar || "avatar/1.jpg",
        role:rolesByMember[m.nom] || "🥉 Ξ Recrue"
      });
    });
  });

  // Grouper
  const grouped = {};
  ROLES.forEach(r=>grouped[r]=[]);

  members.forEach(m=>{
    grouped[m.role].push(m);
  });

  // Affichage
  const container = document.getElementById("content");

  container.innerHTML = ROLES.map(role=>{

    if(grouped[role].length===0) return "";

    return `
      <div class="roleTitle">${role}</div>
      <div class="membersGrid">
        ${grouped[role].map(m=>`
          <div class="memberCard">
            <img src="${m.avatar}">
            <div class="memberName">${m.nom}</div>
          </div>
        `).join("")}
      </div>
    `;
  }).join("");

});

</script>

</body>
</html>
