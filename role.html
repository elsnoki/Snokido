<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rôles du gang</title>

<script src="gangdata.js" defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#0f2027,#203a43,#2c5364);
  color:#fff;
}

.wrap{
  max-width:1200px;
  margin:30px auto;
  padding:10px;
}

.title{
  font-size:28px;
  font-weight:900;
  margin-bottom:20px;
}

.members{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:18px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#1e293b,#0f172a);
  border-radius:18px;
  padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  transition:.25s;
  position:relative;
}

.card:hover{
  transform:translateY(-5px) scale(1.02);
}

/* TOP */
.top{
  display:flex;
  gap:12px;
  align-items:center;
}

.avatar{
  width:70px;
  height:70px;
  border-radius:14px;
  border:2px solid #3b82f6;
}

.name{
  font-size:18px;
  font-weight:900;
}

.xp{
  font-size:13px;
  opacity:.8;
}

/* ROLE */
.role{
  margin-top:10px;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  display:inline-block;
  background:#111827;
  border:1px solid rgba(255,255,255,.1);
}

/* XP BAR */
.bar{
  margin-top:12px;
  height:8px;
  background:#111;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#4ade80);
}

/* GANG LOGO */
.gangLogo{
  position:absolute;
  top:10px;
  right:10px;
  width:40px;
  height:40px;
  border-radius:10px;
  opacity:.9;
}

/* GOLD STYLE */
.gold{
  background:linear-gradient(90deg,#facc15,#fde68a);
  color:#000;
}

/* LEGEND STYLE */
.legend{
  background:linear-gradient(90deg,#a855f7,#ec4899);
}
</style>
</head>

<body>

<div class="wrap">
  <div class="title" id="title">Chargement...</div>
  <div class="members" id="members"></div>
</div>

<script>
/* ========= LOAD JSON ========= */
let players = [];

fetch("data/players_pages.json")
  .then(r => r.json())
  .then(data => {
    players = data;
    init();
  });

function slugify(s){
  return String(s).toLowerCase().replace(/[^a-z0-9]/g,"");
}

/* ========= ROLES ========= */
const ROLES = [
  {xp:1300000, name:"As de l'exp"},
  {xp:1250000, name:"Parrain de Mafia"},
  {xp:1200000, name:"Tempête Apocalyptique"},
  {xp:1100000, name:"Combattant Unique"},
  {xp:1000000, name:"Légende de Snokido"},
  {xp:900000, name:"Maître du Temps"},
  {xp:800000, name:"Lucifer"},
  {xp:700000, name:"Champion de l'exp"},
  {xp:600000, name:"Warrior Extrême"},
  {xp:500000, name:"Grand Colosse"},
  {xp:400000, name:"Empereur"},
  {xp:300000, name:"Aventurier Tenace"},
  {xp:200000, name:"Samuraï Féroce"},
  {xp:100000, name:"Guerrier Ultime"},
  {xp:50000, name:"Gangster"},
  {xp:10000, name:"Sergent"},
  {xp:0, name:"Recrue"}
];

function getRole(xp){
  for(let r of ROLES){
    if(xp >= r.xp) return r.name;
  }
  return "Recrue";
}

/* ========= INIT ========= */
function init(){
  const params = new URLSearchParams(location.search);
  const slug = params.get("g");

  const gang = window.gangsData.find(g => slugify(g.name) === slug);

  if(!gang) return;

  document.getElementById("title").textContent = "Gang : " + gang.name;

  const members = gang.members.map(m => {
    const p = players.find(pl => slugify(pl.nom) === slugify(m.nom));
    return {
      name: m.nom,
      xp: p ? p.xp : 0,
      avatar: p ? p.avatar : "avatar/1.jpg"
    };
  });

  /* TRI IMPORTANT */
  members.sort((a,b)=>b.xp - a.xp);

  render(members, gang.img);
}

/* ========= RENDER ========= */
function render(list, gangImg){
  const maxXp = 1300000;

  document.getElementById("members").innerHTML =
    list.map(m => {

      const percent = Math.min(100,(m.xp/maxXp)*100);
      const role = getRole(m.xp);

      let roleClass = "";
      if(m.xp > 1000000) roleClass="legend";
      else if(m.xp > 500000) roleClass="gold";

      return `
      <div class="card">
        <img class="gangLogo" src="${gangImg}">
        
        <div class="top">
          <img class="avatar" src="${m.avatar}">
          <div>
            <div class="name">${m.name}</div>
            <div class="xp">${m.xp.toLocaleString()} xp</div>
          </div>
        </div>

        <div class="role ${roleClass}">
          ${role}
        </div>

        <div class="bar">
          <div class="fill" style="width:${percent}%"></div>
        </div>
      </div>
      `;
    }).join("");
}
</script>

</body>
</html>
