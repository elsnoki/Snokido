<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Classement des gangs</title>

<script src="gangdata.js" defer></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle at top,#1a4d6b,#041e2d);
  color:#fff;
}

.wrap{
  max-width:1200px;
  margin:30px auto;
  padding:10px;
}

h1{
  text-align:center;
  margin-bottom:25px;
}

/* SECTION */
.roleSection{ margin-bottom:30px; }

.roleTitle{
  font-size:20px;
  font-weight:900;
  padding:10px;
  border-radius:12px;
  margin-bottom:12px;
  background:linear-gradient(90deg,#ffd700,#ffae00);
  color:#000;
}

/* GRID */
.membersGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:14px;
}

/* CARD */
.memberCard{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  border-radius:16px;
  padding:12px;
  display:flex;
  gap:12px;
  align-items:center;
  backdrop-filter:blur(6px);
  box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.avatar{
  width:60px;
  height:60px;
  border-radius:12px;
}

.memberInfo{ flex:1; }

.memberName{
  font-weight:900;
}

.memberXp{
  font-size:13px;
  opacity:.85;
}

.memberRole{
  margin-top:5px;
  font-size:12px;
  padding:4px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.15);
}

.gangLogo{
  width:22px;
  height:22px;
  margin-left:6px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="wrap">
  <h1>🔥 Classement des gangs</h1>
  <div id="content">Chargement...</div>
</div>

<script>

// 🔥 ROLES DESC
const ROLES = [
{xp:1200000,label:"💨 Tempête Apocalyptique"},
{xp:1000000,label:"⬛ Légende de Snokido"},
{xp:800000,label:"👺 Lucifer"},
{xp:700000,label:"🔱 Champion de l'exp"},
{xp:600000,label:"🦕 Warrior Extrême"},
{xp:500000,label:"🦖 Grand Colosse"},
{xp:400000,label:"🐉 Empereur"},
{xp:300000,label:"👽 Aventurier Tenace"},
{xp:250000,label:"💸 Guerrier Suprême"},
{xp:200000,label:"🛡 Samuraï Féroce"},
{xp:150000,label:"🗺 Conquérant"},
{xp:100000,label:"👿 Guerrier Ultime"},
{xp:50000,label:"🚬 Gangster"},
{xp:20000,label:"♠ Gangstar Confirmé"},
{xp:10000,label:"🥈 Sergent"},
{xp:0,label:"🥉 Recrue"}
];

function getRole(xp){
  for(let r of ROLES){
    if(xp >= r.xp) return r.label;
  }
  return "🥉 Recrue";
}

function fmt(n){
  return new Intl.NumberFormat("fr-FR").format(n);
}

function slugify(s){
  return String(s||"")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9]/g,"")
    .toLowerCase();
}

async function init(){

  const res = await fetch("data/players_pages.json");
  const players = await res.json();

  // map joueurs
  const map = new Map();
  players.forEach(p=>{
    map.set(slugify(p.nom), p);
  });

  const allowed = ["athenagangster","lospollosgangsta"];

  const gangs = window.gangsData.filter(g =>
    allowed.includes(slugify(g.name))
  );

  let members = [];

  gangs.forEach(g=>{
    g.members.forEach(m=>{

      const player = map.get(slugify(m.nom));

      members.push({
        nom:m.nom,
        xp:player?.xp || 0,
        avatar:player?.avatar || "avatar/1.jpg",
        gangImg:g.img
      });

    });
  });

  // TRI
  members.sort((a,b)=>b.xp-a.xp);

  // GROUP
  const grouped = {};
  ROLES.forEach(r=>grouped[r.label]=[]);

  members.forEach(m=>{
    grouped[getRole(m.xp)].push(m);
  });

  const container = document.getElementById("content");

  container.innerHTML = ROLES.map(r=>{

    const list = grouped[r.label];
    if(!list.length) return "";

    return `
    <div class="roleSection">
      <div class="roleTitle">${r.label}</div>

      <div class="membersGrid">
        ${list.map(m=>`
          <div class="memberCard">

            <img class="avatar" src="${m.avatar}">

            <div class="memberInfo">
              <div class="memberName">
                ${m.nom}
                <img class="gangLogo" src="${m.gangImg}">
              </div>

              <div class="memberXp">${fmt(m.xp)} XP</div>
              <div class="memberRole">${getRole(m.xp)}</div>
            </div>

          </div>
        `).join("")}
      </div>
    </div>
    `;

  }).join("");
}

window.addEventListener("DOMContentLoaded", init);

</script>

</body>
</html>
