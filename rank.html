<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classement des joueurs</title>

<link rel="stylesheet" href="style.css">
<script src="header.js" defer></script>
<script src="data.js" defer></script>

<style>
  body{
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
  }
  .box{
    width:1000px;
    max-width: calc(100% - 40px);
    margin:60px auto;
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,.35);
  }
  .title{
    background:#3a3a3a;
    color:#fff;
    padding:14px 16px;
    font-size:20px;
    font-weight:700;
  }
  table{ width:100%; border-collapse:separate; border-spacing:0; }
  thead th{
    background:#fff;
    padding:12px 10px;
    text-align:left;
    font-size:13px;
    font-weight:700;
    border-bottom:1px solid #cfcfcf;
  }
  tbody td{
    padding:16px 10px;
    border-bottom:1px solid #cfcfcf;
    vertical-align:middle;
    font-size:14px;
  }
  tbody tr:nth-child(odd){ background:#f2f2f2; }
  .rank{ font-weight:700; font-size:22px; width:60px; text-align:center; color:#444; }
  .avatar{ width:90px; text-align:center; }
  .avatar .frame{
    width:64px; height:64px; margin:0 auto;
    background:#e9e9e9; border:1px solid #bdbdbd; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
  }
  .avatar img{
    width:56px; height:56px; object-fit:cover;
    border:2px solid #8f8f8f; border-radius:6px; background:#ddd; display:block;
  }
  .name a{ color:#2c6fb7; font-weight:700; text-decoration:none; }
  .name a:hover{ text-decoration:underline; }
  .center{ text-align:center; white-space:nowrap; }
</style>
</head>

<body>
<div class="box">
  <div class="title">Classement des joueurs — NV100</div>

  <table id="leaderboard">
    <thead>
      <tr>
        <th></th>
        <th></th>
        <th>Nom du joueur</th>
        <th class="center">Niveau 100</th>
        <th class="center">Date d'inscription</th>
        <th class="center">Date d'arrivée</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  function slugify2(name){
    return String(name || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  window.addEventListener("DOMContentLoaded", () => {
    if(typeof joueurs === "undefined" || !Array.isArray(joueurs)){
      document.querySelector("#leaderboard tbody").innerHTML =
        `<tr><td colspan="6" style="padding:16px;font-weight:900">Erreur : data.js ne s'est pas chargé.</td></tr>`;
      return;
    }

    const list = joueurs
      .map(p => {
        const s = p.modes?.nv100 || null;
        return { p, s };
      })
      .filter(x => x.s); // seulement ceux qui ont nv100

    list.sort((a,b) => {
      const ax = (a.s.jours == null) ? Infinity : a.s.jours;
      const bx = (b.s.jours == null) ? Infinity : b.s.jours;
      return ax - bx;
    });

    const tbody = document.querySelector("#leaderboard tbody");
    tbody.innerHTML = "";

    list.forEach((x, i) => {
      const p = x.p;
      const s = x.s;

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank">${i+1}</td>
        <td class="avatar">
          <div class="frame"><img src="${p.avatar || "avatar/1.jpg"}" alt="${p.nom}"></div>
        </td>
        <td class="name">
          <a href="profil.html?mode=nv100&u=${encodeURIComponent(slugify2(p.nom))}">
            ${p.nom}
          </a>
        </td>
        <td class="center">${s.jours == null ? "—" : (s.jours + " jours")}</td>
        <td class="center">${p.inscription ?? "—"}</td>
        <td class="center">${p.arrivee ?? "—"}</td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
