<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classement des joueurs</title>

<link rel="stylesheet" href="style.css">
<script src="header.js" defer></script>
<script src="data.js" defer></script>
<script src="xp_widget.js" defer></script>

<style>
  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
  }

  .box{
    width:1000px;
    max-width:calc(100% - 24px);
    margin:30px auto;
    background:#fff;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.35);
  }

  .title{
    background:#3a3a3a;
    color:#fff;
    padding:14px 16px;
    font-size:20px;
    font-weight:700;
  }

  .tableWrap{
    width:100%;
    overflow-x:visible; /* plus de scroll horizontal */
  }

  table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed; /* force le tableau à tenir dans la largeur */
  }

  thead th{
    background:#fff;
    padding:12px 8px;
    text-align:left;
    font-size:13px;
    font-weight:700;
    border-bottom:1px solid #cfcfcf;
    word-wrap:break-word;
  }

  tbody td{
    padding:14px 8px;
    border-bottom:1px solid #cfcfcf;
    vertical-align:middle;
    font-size:14px;
    word-wrap:break-word;
    overflow-wrap:break-word;
  }

  tbody tr:nth-child(odd){
    background:#f2f2f2;
  }

  .rank{
    font-weight:700;
    font-size:22px;
    width:60px;
    text-align:center;
    color:#444;
  }

  .avatar{
    width:90px;
    text-align:center;
  }

  .avatar .frame{
    width:64px;
    height:64px;
    margin:0 auto;
    background:#e9e9e9;
    border:1px solid #bdbdbd;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .avatar img{
    width:56px;
    height:56px;
    object-fit:cover;
    border:2px solid #8f8f8f;
    border-radius:6px;
    background:#ddd;
    display:block;
  }

  .name a{
    color:#2c6fb7;
    font-weight:700;
    text-decoration:none;
  }

  .name a:hover{
    text-decoration:underline;
  }

  .center{
    text-align:center;
  }

  .pauseCell{
    min-width:0;
  }

  .pauseBadge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:7px 10px;
    border-radius:999px;
    font-weight:900;
    font-size:12px;
    border:1px solid rgba(0,0,0,.08);
    max-width:100%;
    text-align:center;
    white-space:normal;
  }

  .pauseBadge.no{
    background:#e8f8ee;
    color:#187a39;
  }

  .pauseBadge.yes{
    background:#fff1f1;
    color:#b42318;
  }

  .pauseSub{
    margin-top:6px;
    font-size:12px;
    color:#555;
    line-height:1.35;
    white-space:normal;
  }

  /* Ajustement tablette */
  @media (max-width: 900px){
    .title{
      font-size:18px;
    }

    thead th,
    tbody td{
      font-size:13px;
      padding:10px 6px;
    }

    .rank{
      font-size:18px;
      width:46px;
    }

    .avatar{
      width:72px;
    }

    .avatar .frame{
      width:54px;
      height:54px;
    }

    .avatar img{
      width:46px;
      height:46px;
    }
  }

  /* Version mobile sans scroll horizontal */
  @media (max-width: 700px){
    .box{
      max-width:calc(100% - 16px);
      margin:16px auto;
      border-radius:10px;
    }

    table,
    thead,
    tbody,
    th,
    td,
    tr{
      display:block;
      width:100%;
    }

    thead{
      display:none;
    }

    tbody tr{
      background:#fff !important;
      margin:0;
      padding:12px;
      border-bottom:1px solid #d8d8d8;
    }

    tbody tr:nth-child(odd){
      background:#fff !important;
    }

    tbody td{
      border:none;
      padding:8px 0;
      text-align:left !important;
    }

    .rank,
    .avatar,
    .name,
    .pauseCell{
      width:100%;
    }

    .rank{
      font-size:20px;
      padding-bottom:6px;
      color:#222;
    }

    .avatar{
      text-align:left;
      margin-bottom:6px;
    }

    .avatar .frame{
      margin:0;
    }

    tbody td::before{
      content:attr(data-label);
      display:block;
      font-size:12px;
      font-weight:700;
      color:#666;
      margin-bottom:4px;
      text-transform:uppercase;
      letter-spacing:.3px;
    }

    .rank::before,
    .avatar::before,
    .name::before{
      display:none;
    }

    .name{
      padding-bottom:10px;
      border-bottom:1px solid #ececec;
      margin-bottom:4px;
    }

    .name a{
      font-size:16px;
    }

    .pauseBadge{
      justify-content:center;
    }
  }
</style>
</head>

<body>
<div class="box">
  <div class="title">Classement des joueurs — NV100</div>

  <div class="tableWrap">
    <table id="leaderboard">
      <thead>
        <tr>
          <th></th>
          <th></th>
          <th>Nom du joueur</th>
          <th class="center">Niveau 100</th>
          <th class="center">Date d'inscription</th>
          <th class="center">Date d'arrivée</th>
          <th class="center">Pause</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  function slugify2(name){
    return String(name || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  function formatPauseInfo(pauses_total){
    if(
      !pauses_total ||
      pauses_total.nb === null ||
      pauses_total.nb === undefined
    ){
      return {
        badgeClass: "no",
        badgeText: "Pause inconnue",
        subText: ""
      };
    }

    if(!pauses_total.nb){
      return {
        badgeClass: "no",
        badgeText: "Aucune pause",
        subText: ""
      };
    }

    const nb = pauses_total.nb || 0;
    const mois = pauses_total.mois || 0;
    const jours = pauses_total.jours || 0;

    let txt = [];
    if(mois) txt.push(mois + " mois");
    if(jours) txt.push(jours + " jours");
    if(!txt.length) txt.push("durée inconnue");

    return {
      badgeClass: "yes",
      badgeText: nb + " pause" + (nb > 1 ? "s" : ""),
      subText: txt.join(" • ")
    };
  }

  window.addEventListener("DOMContentLoaded", () => {
    if(typeof joueurs === "undefined" || !Array.isArray(joueurs)){
      document.querySelector("#leaderboard tbody").innerHTML =
        `<tr><td colspan="7" style="padding:16px;font-weight:900">Erreur : data.js ne s'est pas chargé.</td></tr>`;
      return;
    }

    const list = joueurs
      .map(p => {
        const s = p.modes?.nv100 || null;
        return { p, s };
      })
      .filter(x => x.s);

    list.sort((a,b) => {
      const ax = (a.s.jours == null) ? Infinity : a.s.jours;
      const bx = (b.s.jours == null) ? Infinity : b.s.jours;
      return ax - bx;
    });

    const tbody = document.querySelector("#leaderboard tbody");
    tbody.innerHTML = "";

    list.forEach((x, i) => {
      const p = x.p;
      const s = x.s;
      const pauseInfo = formatPauseInfo(s.pauses_total);

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank">${i+1}</td>
        <td class="avatar">
          <div class="frame"><img src="${p.avatar || "avatar/1.jpg"}" alt="${p.nom}"></div>
        </td>
        <td class="name">
          <a href="profil.html?mode=nv100&u=${encodeURIComponent(slugify2(p.nom))}">
            ${p.nom}
          </a>
        </td>
        <td class="center" data-label="Niveau 100">${s.jours == null ? "—" : (s.jours + " jours")}</td>
        <td class="center" data-label="Date d'inscription">${p.inscription ?? "—"}</td>
        <td class="center" data-label="Date d'arrivée">${s.atteint_le ?? "—"}</td>
        <td class="pauseCell center" data-label="Pause">
          <div class="pauseBadge ${pauseInfo.badgeClass}">${pauseInfo.badgeText}</div>
          ${pauseInfo.subText ? `<div class="pauseSub">${pauseInfo.subText}</div>` : ""}
        </td>
      `;
      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
