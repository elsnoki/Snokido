<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>200K - Classement</title>

<link rel="stylesheet" href="style.css">

<style>
  body{
    margin:0;
    background: radial-gradient(1100px 600px at 25% 15%, #2a88ad 0%, #0b3551 60%, #062638 100%);
    font-family: Arial, sans-serif;
  }

  .box{
    width: 1000px;
    max-width: calc(100% - 24px);
    margin: 40px auto;
    background:#ffffff;
    border-radius:8px;
    overflow:hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,.25);
  }

  .title{
    background:#3a3a3a;
    color:white;
    padding:14px 18px;
    font-size:20px;
    font-weight:700;
  }

  table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
  }

  thead th{
    background:#ffffff;
    padding:12px 10px;
    text-align:left;
    font-size:13px;
    font-weight:700;
    border-bottom:1px solid #cfcfcf;
  }

  tbody td{
    padding:16px 10px;
    border-bottom:1px solid #cfcfcf;
    vertical-align:middle;
    font-size:14px;
  }

  tbody tr:nth-child(odd){ background:#f2f2f2; }
  tbody tr:nth-child(even){ background:#ffffff; }

  .rank{
    font-weight:700;
    font-size:22px;
    width:60px;
    text-align:center;
    color:#444;
  }

  .avatar{
    width:90px;
    text-align:center;
  }

  .avatar .frame{
    width:64px;
    height:64px;
    margin:0 auto;
    background:#e9e9e9;
    border:1px solid #bdbdbd;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.6);
  }

  .avatar img{
    width:56px;
    height:56px;
    object-fit:cover;
    border:2px solid #8f8f8f;
    border-radius:6px;
    background:#ddd;
    display:block;
  }

  .name a{
    color:#2c6fb7;
    font-weight:700;
    text-decoration:none;
  }
  .name a:hover{ text-decoration:underline; }

  .center{
    text-align:center;
    white-space:nowrap;
  }

  .hint{
    padding: 10px 18px;
    font-size: 13px;
    color:#555;
    border-top: 1px solid #e5e5e5;
    background:#fafafa;
  }
</style>
</head>

<body>

<script src="header.js"></script>

<div class="box">
  <div class="title">Rank 200K — par rapidité</div>

  <table id="leaderboard">
    <thead>
      <tr>
        <th></th>
        <th></th>
        <th>Nom du joueur</th>
        <th class="center">200K en</th>
        <th class="center">Atteint le</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="hint">
    Cliquer sur un pseudo ouvre le profil 200K.
  </div>
</div>

<script>
  function slugify(name){
    return name
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9]/g, "")
      .toLowerCase();
  }

  // Données d'après ton graphe + tes dates
  const joueurs = [
    {nom:"TheGladiator", jours:84,  atteint:"17-11-2020", avatar:"avatar/4.jpg"},
    {nom:"alex.c2109",   jours:232, atteint:"13-03-2020", avatar:"avatar/2.jpg"},
    {nom:"Talk Takashi", jours:420, atteint:"15-12-2018", avatar:"avatar/1.jpg"},
    {nom:"Jordan.io", jours:877, atteint:"05-04-2023", avatar:"avatar/6.jpg"},
    {nom:"francoeur",    jours:994, atteint:"16-08-2022", avatar:"avatar/3.jpg"},
    {nom:"Abelard", jours:1811, atteint:"31-08-2022", avatar:"avatar/5.jpg"},
  ];

  // Tri (jours croissant)
  joueurs.sort((a,b)=>a.jours-b.jours);

  const tbody = document.querySelector("#leaderboard tbody");

  joueurs.forEach((j,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="rank">${i+1}</td>
      <td class="avatar">
        <div class="frame">
          <img src="${j.avatar}" alt="${j.nom}">
        </div>
      </td>
      <td class="name">
        <a href="profil.html?mode=200k&u=${slugify(j.nom)}">${j.nom}</a>
      </td>
      <td class="center">${j.jours} jours</td>
      <td class="center">${j.atteint ?? "—"}</td>
    `;
    tbody.appendChild(tr);
  });
</script>

</body>

</html>
