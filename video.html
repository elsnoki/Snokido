<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vidéos</title>
<link rel="stylesheet" href="style.css">
<script src="header.js" defer></script>

<style>

.videoPage{
  max-width:1000px;
  margin:60px auto;
  font-family:Arial, Helvetica, sans-serif;
}

.videoBlock{
  margin-bottom:60px;
}

.videoTitle{
  font-size:24px;
  font-weight:700;
  margin-bottom:15px;
}

.videoFrame{
  width:100%;
  aspect-ratio:16/9;
}

.videoFrame iframe{
  width:100%;
  height:100%;
  border:none;
}

.source{
  margin-top:10px;
  font-size:14px;
}

.source a{
  color:#1a73e8;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="videoPage">

<div class="videoBlock">

<div class="videoTitle">
Evolution du top 50 Snokido 2013 - 2016
</div>

<div class="videoFrame">
<iframe src="https://www.youtube.com/embed/4ASqBgf3jzs"
allowfullscreen></iframe>
</div>

<div class="source">
Source :
<a href="https://alienart.io/projects/6969dd1c7378b0d176601fa3" target="_blank">
alienart.io
</a>
</div>

</div>


<div class="videoBlock">

<div class="videoTitle">
Evolution du top 10 des joueurs de Snokido 2013 - 2026
</div>

<div class="videoFrame">

</div>

<div class="source">
Source :

</a>

</div>

</html>
